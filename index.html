          <button key={oz} onClick={()=>addWater(oz)} style={{
            flex:1,padding:"10px 4px",borderRadius:6,fontSize:15,fontWeight:700,cursor:"pointer",
            background:C.pl,border:`1px solid ${C.p}`,color:C.p,fontFamily:"inherit",minHeight:44,
          }}>+{oz}oz</button>
        ))}
      </div>
      {showWaterHist&&(()=>{
        const entries=Object.entries(data.water||{}).filter(([d])=>d!==viewDate).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
        const avg=entries.length?Math.round(entries.reduce((s,[_,v])=>s+v,0)/entries.length):0;
        return(<div style={{marginTop:8,borderTop:`1px solid ${C.bl}`,paddingTop:6}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t3,marginBottom:4}}>Last 7 days — avg {avg} oz</div>
          {entries.map(([d,v])=>(<div key={d} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}}>
            <span style={{fontSize:12,color:C.t2}}>{fmt(d)}</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:60}}><Br v={v} max={waterGoal} color={v>=waterGoal?C.g:C.p} h={4}/></div>
              <span style={{fontSize:12,fontWeight:600,color:v>=waterGoal?C.g:C.t,width:40,textAlign:"right"}}>{v}oz</span>
            </div>
          </div>))}
        </div>);
      })()}
    </X>
    </S>

    {MEAL_TYPES.map(mt=>{
      const meals=grouped[mt];
      if(meals.length===0)return null;
      const mtCal=meals.reduce((s,m)=>s+(m.cal||0),0);
      return(
        <S key={mt} title={`${mt} (${meals.length}) — ${mtCal} cal`}>
          {meals.map((m)=>(<X key={m._idx} onClick={()=>setSelM(m._idx)} style={{padding:10,marginBottom:3,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:14,fontWeight:600,color:C.t,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.description}</span>
                {(m.source==="mfp"||m.source==="cronometer")&&<span style={{fontSize:8,fontWeight:700,color:C.g,background:C.gl,padding:"1px 4px",borderRadius:4,textTransform:"uppercase",flexShrink:0}}>{m.source==="mfp"?"SYNC":"CRON"}</span>}
              </div>
                <div style={{fontSize:12,color:C.t2,marginTop:1}}>{m.cal} · {m.protein}gP · {m.carbs}gC · {m.fat}gF{m.fiber?` · ${m.fiber}gFib`:""}</div></div>
              <span style={{color:C.t3,fontSize:13}}>→</span>
            </div>
          </X>))}
        </S>
      );
    })}
    {tl.meals.length===0&&<div style={{color:C.t3,fontSize:13,padding:12,textAlign:"center"}}>No meals logged today</div>}
  </div>);
};

// ═══ WEIGHT ═══
const Weight=({data,setData})=>{
  const [nw,setNw]=useState("");const t=td();
  const st=data.settings||DEFAULTS;
  const entries=Object.entries(data.wt).sort((a,b)=>b[0].localeCompare(a[0]));
  const latest=entries[0]?.[1],oldest=entries[entries.length-1]?.[1];
  const tc=latest&&oldest?(latest-oldest).toFixed(1):null;
  const ch=entries.slice(0,14).reverse().map(([d,v])=>({v,d:d.slice(5)}));
  const wTrend=getWeightTrend(data.wt);
  const wtTDEE=calcAdaptiveTDEE(data.wt,data.nut,st,data.travelDays,data.tdeeExclude||{});
  const trendWeights=wtTDEE&&wtTDEE.trendWeights?wtTDEE.trendWeights.slice(-14):null;
  const todayLogged=data.wt[t]!=null;
  const add=()=>{if(!nw)return;const v=Number(nw);const nd={...data,wt:{...data.wt,[t]:v}};setData(nd);sv(nd);svSB.weight(t,v);setNw("");};
  return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div>
      <div style={{fontSize:18,fontWeight:800,color:C.t}}>Morning scale</div>
      <div style={{fontSize:13,color:C.t3}}>One number. The trend/review stays tucked away.</div>
    </div>

    <X style={{borderLeft:`3px solid ${todayLogged?C.g:C.p}`}}>
      <L>{todayLogged?"Logged today":"Fast log — "+fmt(t)}</L>
      {todayLogged?(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10}}>
            <div><span style={{fontSize:34,fontWeight:850,color:C.t}}>{data.wt[t].toFixed(1)}</span><span style={{fontSize:14,color:C.t3}}> lbs</span></div>
            <button onClick={()=>setNw(String(data.wt[t]))} style={{border:`1px solid ${C.bd}`,background:C.bg,color:C.t2,borderRadius:10,padding:"8px 12px",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
          </div>
          {nw!==""&&<div style={{display:"flex",gap:6,marginTop:10}}><N value={nw} onChange={setNw} placeholder="185.0" style={{flex:1,fontSize:20,fontWeight:800}}/><B onClick={add}>Update</B></div>}
        </div>
      ):(
        <div>
          <div style={{fontSize:13,color:C.t2,marginBottom:8}}>Log before food/water if possible. This anchors the weekly cut call.</div>
          <div style={{display:"flex",gap:6}}><N value={nw} onChange={setNw} placeholder="185.0" style={{flex:1,fontSize:22,fontWeight:800}}/><B onClick={add}>Log</B></div>
        </div>
      )}
    </X>

    {wTrend&&(<X style={{padding:12,borderLeft:`3px solid ${C.a}`}}>
      <div style={{fontSize:11,fontWeight:800,color:C.a,textTransform:"uppercase",letterSpacing:"0.06em"}}>Cut pace</div>
      <div style={{fontSize:14,color:C.t,fontWeight:750,marginTop:2}}>{wTrend.direction==="gaining"?"Gaining":"Losing"} {Math.abs(wTrend.rate)} lbs/week</div>
      <div style={{fontSize:12,color:C.t2,marginTop:3}}>{wTrend.advice}</div>
    </X>)}

    <S title="Scale review" collapsible defaultOpen={false}>
      <div style={{display:"grid",gridTemplateColumns:trendWeights?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr",gap:4}}>
        <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:C.t}}>{latest?latest.toFixed(1):"—"}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Current</div></X>
        {trendWeights&&<X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:C.g}}>{wtTDEE.trendWeight}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Trend</div></X>}
        <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:tc&&tc<0?C.g:C.a}}>{tc?`${tc>0?"+":""}${tc}`:"—"}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Total</div></X>
        <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:C.v}}>{entries.length}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Entries</div></X>
      </div>
      {trendWeights&&trendWeights.length>=2?(()=>{
        const rawPts=trendWeights.map(tw=>({v:tw.raw,d:tw.d.slice(5)}));
        const trendPts=trendWeights.map(tw=>({v:tw.v,d:tw.d.slice(5)}));
        const allVals=[...rawPts.map(p=>p.v),...trendPts.map(p=>p.v)];
        const mn=Math.min(...allVals),mx=Math.max(...allVals),rng=mx-mn||1,pad=rng*0.12;
        const w=rawPts.length*32,h=52;
        const toY=v=>h-6-((v-(mn-pad))/(rng+pad*2))*(h-16);
        const rawLine=rawPts.map((p,i)=>`${i*(w/(rawPts.length-1))},${toY(p.v)}`).join(" ");
        const trendLine=trendPts.map((p,i)=>`${i*(w/(trendPts.length-1))},${toY(p.v)}`).join(" ");
        return(
          <X style={{padding:"10px 14px",marginTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em"}}>Weight + Trend</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:10,color:C.t3}}>· raw</span>
                <span style={{fontSize:10,color:C.g}}>— trend</span>
                <span style={{fontSize:13,fontWeight:700,color:C.g}}>{wtTDEE.trendWeight} lbs</span>
              </div>
            </div>
            <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:h}} preserveAspectRatio="none">
              <polyline points={rawLine} fill="none" stroke={C.bd} strokeWidth="1" strokeDasharray="3,3" strokeLinecap="round"/>
              {rawPts.map((p,i)=><circle key={i} cx={i*(w/(rawPts.length-1))} cy={toY(p.v)} r="2.5" fill={C.cd} stroke={C.t3} strokeWidth="1"/>)}
              <polyline points={trendLine} fill="none" stroke={C.g} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.t3,marginTop:2}}>
              <span>{rawPts[0]?.d}</span><span>{rawPts[rawPts.length-1]?.d}</span>
            </div>
            {wtTDEE.weeklyChange!==0&&(
              <div style={{marginTop:6,fontSize:11,color:wtTDEE.weeklyChange<0?C.g:C.a,fontWeight:600}}>
                Trend: {wtTDEE.weeklyChange>0?"+":""}{wtTDEE.weeklyChange.toFixed(1)} lbs/wk
              </div>
            )}
          </X>
        );
      })():<Ch data={ch} color={C.p} label="Trend" yUnit=" lbs" empty="Log weight to see trend"/>}
    </S>

    <S title="Weight history" collapsible defaultOpen={false}>
      {entries.slice(0,20).map(([d,w],i)=>{const prev=entries[i+1]?.[1];const diff=prev?(w-prev).toFixed(1):null;
        const del=()=>{if(confirm(`Delete ${w.toFixed(1)} lbs on ${fmt(d)}?`)){const nwt={...data.wt};delete nwt[d];const nd={...data,wt:nwt};setData(nd);sv(nd);svSB.delWeight(d);}};
        return(<div key={d} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.bl}`,fontSize:14,alignItems:"center"}}>
          <span style={{color:C.t2}}>{fmt(d)}</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontWeight:600,color:C.t}}>{w.toFixed(1)} {diff&&<span style={{color:diff>0?C.r:C.g,fontSize:12}}>{diff>0?"+":""}{diff}</span>}</span>
            <button onClick={del} style={{background:"none",border:"none",color:C.r,fontSize:14,cursor:"pointer",padding:"2px 4px",opacity:0.6}}>✕</button>
          </div>
        </div>);})}
    </S>
  </div>);
};

// ═══ RECOVERY ═══
const Habits=({data,setData})=>{
  const t=td();
  const tr=data.rec[t]||{};
  const h=data.habits[t]||{};
  const st=data.settings||DEFAULTS;
  const customHabits=st.customHabits||[];
  const [showMgmt,setShowMgmt]=useState(false);
  const [newHabit,setNewHabit]=useState("");
  const [f,setF]=useState({rs:tr.recoveryScore||"",hrv:tr.hrv||"",rhr:tr.rhr||"",sh:tr.sleepHours||"",steps:data.steps?.[t]||"",wt:data.wt?.[t]||""});

  const systemHabits=[
    {field:"alcohol",label:"Alcohol",target:false,goodLabel:"None",badLabel:"Had it"},
    {field:"cannabis",label:"Cannabis",target:false,goodLabel:"None",badLabel:"Had it"},
    {field:"screensOff",label:"Screens",target:true,goodLabel:"Off",badLabel:"Late"},
    {field:"bedBy1030",label:"Bedtime",target:true,goodLabel:"On time",badLabel:"Late"},
    {field:"supplements",label:"Supplements",target:true,goodLabel:"Done",badLabel:"Missed"},
    {field:"sunlight",label:"Sunlight",target:true,goodLabel:"Done",badLabel:"Missed"},
    {field:"readBeforeBed",label:"Read",target:true,goodLabel:"Done",badLabel:"Skipped"},
  ];
  const calcScore=(hab)=>{if(!hab)return 0;let c=0;systemHabits.forEach(x=>{if(hab[x.field]===x.target)c++;});c+=Object.values(hab.custom||{}).filter(v=>v).length;return c;};
  const tot=systemHabits.length+customHabits.length;
  const todayScore=calcScore(h),todayPct=tot?Math.round(todayScore/tot*100):0;
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return lds(d);});
  const avg7=(()=>{const vals=last7.map(d=>data.habits[d]?calcScore(data.habits[d])/tot*100:null).filter(v=>v!=null);return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;})();
  const recScore=+f.rs||null;
  const steps=+f.steps||data.steps?.[t]||0;
  const stepsTarget=cutStepsTarget(st);
  const sleep=+f.sh||null;
  const protein=(data.nut?.[t]?.totalProtein)||0;
  const proteinTarget=getDayProTarget(t,st,data.travelDays,data.socialWeekend);
  const cardioDone=!!data.cardio?.[t]?.done;
  const foodClosed=protein>=proteinTarget;
  const closeoutGood=todayPct>=70&&foodClosed&&(steps>=stepsTarget||cardioDone)&&(!recScore||recScore>=55);
  const tomorrow=(()=>{
    if(recScore&&recScore<55)return{label:"Recovery-biased",why:"Reduce cardio/stress before cutting food.",color:C.r};
    if(!foodClosed)return{label:"Protein-first",why:`Finish ${Math.max(0,proteinTarget-protein)}g protein or start tomorrow with protein.`,color:C.a};
    if(steps<stepsTarget&&!cardioDone)return{label:"Movement-first",why:`Get steps/cardio back on plan before changing calories.`,color:C.a};
    if(sleep&&sleep<6.5)return{label:"Sleep repair",why:"Protect recovery before adding more cut pressure.",color:C.a};
    return{label:"Normal cut day",why:"Stay the course. No target changes needed.",color:C.g};
  })();

  const saveMetrics=()=>{
    const rec={...tr,recoveryScore:+f.rs||null,hrv:+f.hrv||null,rhr:+f.rhr||null,sleepHours:+f.sh||null};
    const nd={...data,rec:{...data.rec,[t]:rec},steps:{...data.steps,...(f.steps?{[t]:+f.steps}:{})},wt:{...data.wt,...(f.wt?{[t]:+f.wt}:{})}};
    setData(nd);sv(nd);svSB.recovery(t,rec);if(f.steps)svSB.steps(t,+f.steps);if(f.wt)svSB.weight(t,+f.wt);
  };
  const setHabit=(field,val,isCustom=false)=>{
    const nh=isCustom?{...h,custom:{...(h.custom||{}),[field]:val}}:{...h,[field]:val};
    const nd={...data,habits:{...data.habits,[t]:nh}};setData(nd);sv(nd);svSB.habits(t,nh);
  };
  const markCleanDay=()=>{
    const nh={...h};systemHabits.forEach(x=>nh[x.field]=x.target);customHabits.forEach(x=>{nh.custom={...(nh.custom||{}),[x.id]:true};});
    const nd={...data,habits:{...data.habits,[t]:nh}};setData(nd);sv(nd);svSB.habits(t,nh);
  };
  const addCustom=()=>{const name=newHabit.trim();if(!name)return;const id=name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/-+$/,"");if(customHabits.some(c=>c.id===id))return;const nd={...data,settings:{...st,customHabits:[...customHabits,{id,label:name}]}};setData(nd);sv(nd);svSB.settings(nd.settings);setNewHabit("");};
  const removeCustom=(id)=>{const nd={...data,settings:{...st,customHabits:customHabits.filter(c=>c.id!==id)}};setData(nd);sv(nd);svSB.settings(nd.settings);};
  const Pill=({children,onClick,active,color=C.p})=><button onClick={onClick} style={{border:`1.5px solid ${active?color:C.bd}`,background:active?(color===C.g?C.gl:color===C.r?C.rl:C.pl):"#fff",color:active?color:C.t3,borderRadius:12,padding:"10px 12px",fontSize:13,fontWeight:850,fontFamily:"inherit",cursor:"pointer",minHeight:44}}>{children}</button>;

  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div>
      <div style={{fontSize:18,fontWeight:850,color:C.t}}>Recovery Closeout</div>
      <div style={{fontSize:13,color:C.t3}}>{fmt(t)} · decide tomorrow, then be done</div>
    </div>

    <X style={{borderLeft:`4px solid ${tomorrow.color}`,padding:16}}>
      <div style={{fontSize:11,fontWeight:850,color:tomorrow.color,textTransform:"uppercase",letterSpacing:"0.08em"}}>Tomorrow</div>
      <div style={{fontSize:21,fontWeight:900,color:C.t,marginTop:2}}>{tomorrow.label}</div>
      <div style={{fontSize:13,color:C.t2,marginTop:4,lineHeight:1.4}}>{tomorrow.why}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginTop:12}}>
        {[{l:"Habits",v:`${todayScore}/${tot}`,ok:todayPct>=70},{l:"Protein",v:`${protein}/${proteinTarget}`,ok:foodClosed},{l:"Steps",v:`${Math.round(steps/1000)}k`,ok:steps>=stepsTarget},{l:"Cardio",v:cardioDone?"Done":"Open",ok:cardioDone}].map(x=>(
          <div key={x.l} style={{padding:"8px 3px",borderRadius:10,textAlign:"center",background:x.ok?C.gl:C.bg,border:`1px solid ${x.ok?C.g:C.bd}`}}>
            <div style={{fontSize:9,fontWeight:850,color:C.t3,textTransform:"uppercase"}}>{x.l}</div>
            <div style={{fontSize:12,fontWeight:900,color:x.ok?C.g:C.t2,marginTop:2}}>{x.v}</div>
          </div>
        ))}
      </div>
    </X>

    <X style={{padding:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div><div style={{fontSize:14,fontWeight:850,color:C.t}}>Quick metrics</div><div style={{fontSize:12,color:C.t3}}>Only what changes tomorrow's call.</div></div>
        <B small onClick={saveMetrics}>Save</B>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
        <div><L>Recovery</L><N value={f.rs} onChange={v=>setF({...f,rs:v})} placeholder="72" max={100}/></div>
        <div><L>Sleep</L><N value={f.sh} onChange={v=>setF({...f,sh:v})} placeholder="7.5"/></div>
        <div><L>Steps</L><N value={f.steps} onChange={v=>setF({...f,steps:v})} placeholder="15000"/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:6}}>
        <div><L>Weight</L><N value={f.wt} onChange={v=>setF({...f,wt:v})} placeholder="185"/></div>
        <div><L>HRV</L><N value={f.hrv} onChange={v=>setF({...f,hrv:v})} placeholder="68"/></div>
        <div><L>RHR</L><N value={f.rhr} onChange={v=>setF({...f,rhr:v})} placeholder="42"/></div>
      </div>
    </X>

    <X style={{padding:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div><div style={{fontSize:14,fontWeight:850,color:C.t}}>Closeout checks</div><div style={{fontSize:12,color:C.t3}}>Tap the truth. No charts.</div></div>
        <button onClick={()=>setShowMgmt(true)} style={{background:"transparent",border:`1px solid ${C.bd}`,borderRadius:10,padding:"8px 10px",fontSize:12,fontWeight:800,color:C.t2,fontFamily:"inherit"}}>Edit</button>
      </div>
      <B full color={closeoutGood?C.g:C.p} onClick={markCleanDay}>{closeoutGood?"Closed for today":"Mark clean day"}</B>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:10}}>
        {systemHabits.map(x=>{const good=h[x.field]===x.target;const bad=h[x.field]!==undefined&&h[x.field]!==x.target;return(
          <div key={x.field} style={{padding:9,borderRadius:12,border:`1px solid ${good?C.g:bad?C.r:C.bd}`,background:good?C.gl:bad?C.rl:C.bg}}>
            <div style={{fontSize:13,fontWeight:850,color:C.t,marginBottom:6}}>{x.label}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <Pill active={good} color={C.g} onClick={()=>setHabit(x.field,x.target)}>{x.goodLabel}</Pill>
              <Pill active={bad} color={C.r} onClick={()=>setHabit(x.field,!x.target)}>{x.badLabel}</Pill>
            </div>
          </div>
        );})}
        {customHabits.map(x=>{const val=(h.custom||{})[x.id];return(
          <div key={x.id} style={{padding:9,borderRadius:12,border:`1px solid ${val?C.g:C.bd}`,background:val?C.gl:C.bg}}>
            <div style={{fontSize:13,fontWeight:850,color:C.t,marginBottom:6}}>{x.label}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <Pill active={val===true} color={C.g} onClick={()=>setHabit(x.id,true,true)}>Done</Pill>
              <Pill active={val===false} color={C.r} onClick={()=>setHabit(x.id,false,true)}>Missed</Pill>
            </div>
          </div>
        );})}
      </div>
    </X>

    <X style={{padding:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div><div style={{fontSize:14,fontWeight:850,color:C.t}}>Last 7 days</div><div style={{fontSize:12,color:C.t3}}>Average {avg7}% · today {todayPct}%</div></div>
        <div style={{fontSize:24,fontWeight:900,color:avg7>=70?C.g:avg7>=40?C.a:C.r}}>{avg7}%</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {last7.slice().reverse().map(d=>{const hb=data.habits[d];const pct=hb?Math.round(calcScore(hb)/tot*100):0;return <div key={d} style={{height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:850,color:pct>=70?C.g:pct>0?C.a:C.t3,background:pct>=70?C.gl:pct>0?C.al:C.bg,border:`1px solid ${pct>=70?C.g:pct>0?C.a:C.bd}`}}>{pct||"—"}</div>;})}
      </div>
    </X>

    {showMgmt&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.cd,borderRadius:14,padding:16,width:"100%",maxWidth:360,maxHeight:"80vh",overflowY:"auto",border:`1px solid ${C.bd}`}}>
        <div style={{fontSize:16,fontWeight:850,color:C.t,marginBottom:10}}>Edit custom checks</div>
        {customHabits.map(ch=>(<div key={ch.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bl}`}}><span style={{fontSize:13,color:C.t,fontWeight:700}}>{ch.label}</span><button onClick={()=>removeCustom(ch.id)} style={{background:"none",border:"none",fontSize:16,color:C.r,cursor:"pointer",padding:"2px 6px"}}>✕</button></div>))}
        <div style={{display:"flex",gap:6,marginTop:10}}><T value={newHabit} onChange={setNewHabit} placeholder="New custom check" style={{flex:1}}/><B small onClick={addCustom} disabled={!newHabit.trim()}>Add</B></div>
        <B full style={{marginTop:12}} onClick={()=>setShowMgmt(false)}>Done</B>
      </div>
    </div>)}
  </div>);
};

// ═══ SETTINGS ═══
const Settings=({data,setData})=>{
  const t=td();
  const st=data.settings||DEFAULTS;
  const [f,setF]=useState({calories:""+st.calories,protein:""+st.protein,water:""+st.water,steps:""+cutStepsTarget(st),sleep:""+st.sleep,fiber:""+(st.fiber||30),
    trainingCal:""+(st.trainingCal||1800),wednesdayCal:""+(st.wednesdayCal||900),weekendCal:""+(st.weekendCal||1700),syncToken:st.syncToken||""});
  const [saved,setSaved]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [importText,setImportText]=useState("");
  const [importStatus,setImportStatus]=useState("");
  const isTravel=!!(data.travelDays||{})[t];

  const toggleTravel=()=>{
    const newVal=!isTravel;
    const nd={...data,travelDays:{...data.travelDays,[t]:newVal}};
    setData(nd);sv(nd);svSB.travelDay(t,newVal);
  };
  const bcFileRef=useRef(null);
  const [bcLoading,setBcLoading]=useState(false);
  const [bcResult,setBcResult]=useState(null);
  const [showBcHistory,setShowBcHistory]=useState(false);

  const analyzeBodyComp=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setBcLoading(true);setBcResult(null);
    try{
      const reader=new FileReader();
      const base64=await new Promise((resolve)=>{reader.onload=()=>resolve(reader.result);reader.readAsDataURL(file);});
      const [header,dataStr]=base64.split(",");
      const mediaType=header.match(/data:(.*?);/)?.[1]||"image/jpeg";
      // Find previous assessment for comparison
      const prevEntries=Object.entries(data.bodyComp||{}).filter(([d,v])=>d!==t&&v&&typeof v==="object"&&v.analysis).sort((a,b)=>b[0].localeCompare(a[0]));
      const prev=prevEntries[0];
      const context={currentWeight:data.wt[t]||Object.entries(data.wt).sort((a,b)=>b[0].localeCompare(a[0]))[0]?.[1]};
      if(prev){context.previousAssessment=prev[1].analysis;context.previousDate=prev[0];}
      const resp=await fetch("/api/bodycomp",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({image:{mediaType,data:dataStr},context})});
      const result=await resp.json();
      if(resp.ok){
        setBcResult(result);
        const nd={...data,bodyComp:{...data.bodyComp,[t]:{photoTaken:true,analysis:result}}};setData(nd);sv(nd);svSB.bodyComp(t,{analysis:result});
      }else{setBcResult({error:result.error||"Analysis failed"});}
    }catch(err){setBcResult({error:err.message});}
    setBcLoading(false);if(bcFileRef.current)bcFileRef.current.value="";
  };

  const saveSettings=()=>{
    const nd={...data,settings:{calories:+f.calories||DEFAULTS.calories,protein:+f.protein||DEFAULTS.protein,
      water:+f.water||DEFAULTS.water,steps:+f.steps||DEFAULTS.steps,sleep:+f.sleep||DEFAULTS.sleep,fiber:+f.fiber||DEFAULTS.fiber,
      trainingCal:+f.trainingCal||1800,wednesdayCal:+f.wednesdayCal||900,weekendCal:+f.weekendCal||1700,syncToken:f.syncToken||"",
      notifications:data.settings?.notifications||DEFAULTS.notifications}};
    setData(nd);sv(nd);svSB.settings(nd.settings);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`health-hub-export-${td()}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };
  const doImport=()=>{
    try{
      const parsed=parseHealthImport(importText);
      const counts={wt:Object.keys(parsed.wt).length,steps:Object.keys(parsed.steps).length,
        rhr:Object.values(parsed.rec).filter(r=>r.rhr).length,sleep:Object.values(parsed.rec).filter(r=>r.sleepHours).length,
        cal:Object.keys(parsed.nut).length};
      const nd={...data,
        wt:{...parsed.wt,...data.wt},steps:{...parsed.steps,...data.steps},
        rec:Object.keys({...parsed.rec,...data.rec}).reduce((acc,k)=>{acc[k]={...(parsed.rec[k]||{}),...(data.rec[k]||{})};return acc;},{}),
        nut:{...parsed.nut,...data.nut},
      };
      setData(nd);sv(nd);setImportStatus(`Imported ${counts.wt} weights, ${counts.steps} step days, ${counts.rhr} RHR, ${counts.sleep} sleep, ${counts.cal} calorie days`);setImportText("");
      Object.entries(parsed.wt).forEach(([d,v])=>svSB.weight(d,v));Object.entries(parsed.steps).forEach(([d,v])=>svSB.steps(d,v));
      Object.entries(parsed.rec).forEach(([d,v])=>svSB.recovery(d,v));Object.entries(parsed.nut).forEach(([d,v])=>svSB.nutrition(d,v));
    }catch(e){setImportStatus("Error: "+e.message);}
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{fontSize:17,fontWeight:700,color:C.t}}>Settings</div>

    <X style={{borderLeft:`3px solid ${C.p}`}}>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:8}}>Daily Targets</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><L>Avg Calories</L><N value={f.calories} onChange={v=>setF({...f,calories:v})} placeholder="1800"/></div>
        <div><L>Protein (g)</L><N value={f.protein} onChange={v=>setF({...f,protein:v})} placeholder="200"/></div>
        <div><L>Water (oz)</L><N value={f.water} onChange={v=>setF({...f,water:v})} placeholder="128"/></div>
        <div><L>Steps</L><N value={f.steps} onChange={v=>setF({...f,steps:v})} placeholder="15000"/></div>
        <div><L>Sleep (hrs)</L><N value={f.sleep} onChange={v=>setF({...f,sleep:v})} placeholder="7.5"/></div>
        <div><L>Fiber (g)</L><N value={f.fiber} onChange={v=>setF({...f,fiber:v})} placeholder="30"/></div>
      </div>
      <div style={{fontSize:12,fontWeight:700,color:C.t2,marginTop:10,marginBottom:4}}>Day-Type Calorie Targets</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        <div><L>Training</L><N value={f.trainingCal} onChange={v=>setF({...f,trainingCal:v})} placeholder="1800"/></div>
        <div><L>Wednesday</L><N value={f.wednesdayCal} onChange={v=>setF({...f,wednesdayCal:v})} placeholder="900"/></div>
        <div><L>Weekend</L><N value={f.weekendCal} onChange={v=>setF({...f,weekendCal:v})} placeholder="1700"/></div>
      </div>
      <B full style={{marginTop:10}} onClick={saveSettings} color={saved?C.g:C.p}>{saved?"Saved!":"Save Targets"}</B>
    </X>

    {/* ═══ NOTIFICATIONS ═══ */}
    <S title="Notifications">
      <X style={{padding:10}}>
        {typeof Notification!=="undefined"&&Notification.permission==="denied"?(
          <div style={{fontSize:12,color:C.r}}>Notifications blocked. Enable in browser settings.</div>
        ):(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:14,fontWeight:600,color:C.t}}>Enable Notifications</span>
              <button onClick={async()=>{
                const ns=data.settings.notifications||{};
                if(!ns.enabled){
                  const perm=await Notification.requestPermission();
                  if(perm!=="granted")return;
                }
                const nd={...data,settings:{...data.settings,notifications:{...ns,enabled:!ns.enabled}}};
                setData(nd);sv(nd);svSB.settings(nd.settings);
              }} style={{padding:"6px 16px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                border:`1px solid ${(data.settings.notifications||{}).enabled?C.g:C.bd}`,
                background:(data.settings.notifications||{}).enabled?C.gl:"transparent",
                color:(data.settings.notifications||{}).enabled?C.g:C.t3}}>
                {(data.settings.notifications||{}).enabled?"On":"Off"}
              </button>
            </div>
            {(data.settings.notifications||{}).enabled&&(
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {[{key:"habits",label:"Morning habits reminder"},{key:"water",label:"Water reminders"},{key:"stretch",label:"Evening stretch reminder"},{key:"workout",label:"Training day reminder"}].map(n=>{
                  const ns=data.settings.notifications||{};
                  const on=ns[n.key]!==false;
                  return(<div key={n.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:`1px solid ${C.bl}`}}>
                    <span style={{fontSize:12,color:C.t}}>{n.label}</span>
                    <button onClick={()=>{
                      const nd={...data,settings:{...data.settings,notifications:{...ns,[n.key]:!on}}};
                      setData(nd);sv(nd);svSB.settings(nd.settings);
                    }} style={{padding:"3px 10px",borderRadius:3,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                      border:`1px solid ${on?C.g:C.bd}`,background:on?C.gl:"transparent",color:on?C.g:C.t3}}>
                      {on?"On":"Off"}
                    </button>
                  </div>);
                })}
              </div>
            )}
          </>
        )}
      </X>
    </S>

    {/* ═══ NUTRITION SYNC ═══ */}
    <X style={{borderLeft:`3px solid ${C.v}`}}>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:4}}>Nutrition Sync (via Apple Health)</div>
      <div style={{fontSize:12,color:C.t3,marginBottom:8}}>Auto-sync nutrition from Cronometer via Apple Health Shortcut. Set the same token in Vercel env var SYNC_TOKEN.</div>
      <div><L>Sync Token</L><input value={f.syncToken} onChange={e=>setF({...f,syncToken:e.target.value})} placeholder="Set a secret token"
        style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:6,fontSize:13,fontFamily:"inherit",background:"#fff",color:C.t,boxSizing:"border-box"}}/></div>
      <div style={{marginTop:8,padding:8,background:C.bl,borderRadius:6,fontSize:11,color:C.t2,lineHeight:1.6}}>
        <div style={{fontWeight:700,marginBottom:4}}>Apple Shortcut Setup:</div>
        1. Open Shortcuts → + → New Shortcut<br/>
        2. Add 5× "Find Health Samples" (Start: Today, Group: Day):<br/>
        &nbsp;&nbsp;&nbsp;Dietary Energy, Protein, Total Carbohydrates, Total Fat, Dietary Fiber<br/>
        3. Add "Get Contents of URL" — paste URL below, tap each placeholder to insert the matching Health Sample variable:<br/>
        <span style={{fontFamily:"monospace",fontSize:10,wordBreak:"break-all",display:"block",marginTop:4,padding:"4px 6px",background:"#fff",borderRadius:3,border:`1px solid ${C.bd}`}}>
          https://your-domain.vercel.app/api/sync-nutrition?token=YOUR_TOKEN&cal=&#123;Energy&#125;&protein=&#123;Protein&#125;&carbs=&#123;Carbs&#125;&fat=&#123;Fat&#125;&fiber=&#123;Fiber&#125;
        </span>
        4. Automation tab → Time of Day → 9 PM → Run Shortcut
      </div>
    </X>

    {/* ═══ TRAVEL DAY ═══ */}
    <X style={{borderLeft:`3px solid ${C.a}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:C.t}}>Travel Day</div>
          <div style={{fontSize:12,color:C.t3}}>Toggle for travel/social weekends</div>
        </div>
        <button onClick={toggleTravel} style={{padding:"8px 16px",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
          background:isTravel?C.al:"transparent",border:`1px solid ${isTravel?C.a:C.bd}`,color:isTravel?C.a:C.t3}}>{isTravel?"ON":"OFF"}</button>
      </div>
      {isTravel&&(<div style={{marginTop:8,padding:8,background:C.al,borderRadius:4}}>
        <div style={{fontSize:11,fontWeight:700,color:C.a,textTransform:"uppercase",marginBottom:4}}>Travel Protocol</div>
        <div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>
          • Hydrate aggressively: 20-32 oz water + electrolytes before bed<br/>
          • Take magnesium glycinate regardless of time<br/>
          • Skip melatonin if drinking<br/>
          • Wake at 6 AM — get sunlight immediately<br/>
          • Prioritize protein when eating. Light movement &gt; nothing<br/>
          • Don't nap past 1 PM. Normal bedtime that night.
        </div>
      </div>)}
    </X>

    {/* ═══ BODY COMP ═══ */}
    <X>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={{fontSize:14,fontWeight:700,color:C.t}}>Progress Photos</div>
        {Object.keys(data.bodyComp||{}).length>0&&<button onClick={()=>setShowBcHistory(!showBcHistory)} style={{background:"none",border:"none",color:C.p,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>{showBcHistory?"Hide":"History"}</button>}
      </div>
      <div style={{fontSize:12,color:C.t3,marginBottom:8}}>Upload a progress photo for AI body composition analysis. Same lighting, same time, every 2-3 weeks.</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          {(()=>{const photoDates=Object.entries(data.bodyComp||{}).filter(([_,v])=>v).sort((a,b)=>b[0].localeCompare(a[0]));
            const lastPhoto=photoDates[0]?.[0];
            const daysSince=lastPhoto?Math.round((new Date()-new Date(lastPhoto+"T12:00:00"))/864e5):null;
            return(<div style={{fontSize:12,color:daysSince&&daysSince>=14?C.a:C.t2}}>
              {lastPhoto?`Last: ${fmt(lastPhoto)} (${daysSince}d ago)`:"No photos logged yet"}
              {daysSince&&daysSince>=14?<span style={{color:C.a,fontWeight:600}}> — time for new photos</span>:null}
            </div>);
          })()}
        </div>
        <input ref={bcFileRef} type="file" accept="image/*" capture="environment" onChange={analyzeBodyComp} style={{display:"none"}}/>
        {bcLoading?<span style={{fontSize:12,color:C.p,fontWeight:600}}>Analyzing...</span>
          :<B small onClick={()=>bcFileRef.current?.click()}>Upload Photo</B>}
      </div>
      {(bcResult||data.bodyComp?.[t]?.analysis)&&!bcResult?.error&&(()=>{
        const a=bcResult||data.bodyComp[t].analysis;
        return(<div style={{marginTop:8,padding:10,background:C.bg,borderRadius:6,border:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:15,fontWeight:700,color:C.p}}>{a.bodyFatRange}</span>
            <span style={{fontSize:11,color:C.t3}}>estimated BF%</span>
          </div>

      })()}
    </X>

    <X>
      <S title="Body Measurements">
        {(()=>{
          const today=t;
          const cur=data.bodyMeas&&data.bodyMeas[today]||{};
          const prev=Object.entries(data.bodyMeas||{}).filter(([d])=>d<today).sort((a,b)=>b[0].localeCompare(a[0]))[0];
          const fields=[{k:"chest",l:"Chest"},{k:"waist",l:"Waist"},{k:"armL",l:"Left Arm"},{k:"armR",l:"Right Arm"},{k:"thighL",l:"Left Thigh"},{k:"thighR",l:"Right Thigh"}];
          const saveMeas=(k,v)=>{const nd={...data,bodyMeas:{...data.bodyMeas,[today]:{...(data.bodyMeas[today]||{}),[k]:v?parseFloat(v):null}}};setData(nd);sv(nd);};
          return (<div>
            <div style={{fontSize:12,color:C.t2,marginBottom:8}}>Measure in inches. Log every 2 weeks for best trend data.</div>
            {fields.map(f=>(
              <div key={f.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <L>{f.l}</L>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <N value={cur[f.k]||""} onChange={v=>saveMeas(f.k,v)} style={{width:70}} placeholder="in"/>
                  {prev&&prev[1][f.k]&&cur[f.k]?(()=>{const d=(cur[f.k]-prev[1][f.k]).toFixed(1);return d!=0?<span style={{fontSize:11,color:f.k==="waist"?(d<0?C.g:C.r):(d>0?C.g:C.r)}}>{d>0?"+":""}{d}"</span>:null;})():null}

            {prev&&<div style={{fontSize:11,color:C.t3,marginTop:4}}>Last logged: {fmt(prev[0])}</div>}

      </S>
    </X>

    <X>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:8}}>Data</div>
      <div style={{display:"flex",gap:6}}>
        <B full outline onClick={exportData}>Export Data (JSON)</B>
      </div>
      <div style={{fontSize:11,color:C.t3,marginTop:6}}>Download all your health data as a JSON file for backup.</div>
      <S title="Admin data tools" collapsible defaultOpen={false}>
        <div style={{fontSize:12,color:C.t2,marginBottom:6}}>Import HealthKit exports or reset data. These controls stay here so daily cut review stays focused.</div>
        <button onClick={()=>setShowImport(!showImport)} style={{background:"none",border:"none",color:C.p,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700,padding:0,marginBottom:8}}>
          {showImport?"Hide Import":"Import Health Data"}
        </button>
        {showImport&&(
          <div style={{marginBottom:8}}>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)}
              placeholder="Paste HealthKit data export here..."
              style={{width:"100%",minHeight:80,background:"#fff",border:`1px solid ${C.bd}`,borderRadius:6,
                padding:10,color:C.t,fontSize:13,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
            <B full onClick={doImport} disabled={!importText.trim()} style={{marginTop:4}}>Import Data</B>
            {importStatus&&<div style={{fontSize:12,color:importStatus.startsWith("Error")?C.r:C.g,marginTop:6,fontWeight:600}}>{importStatus}</div>}
          </div>
        )}
        <button onClick={async()=>{if(confirm("This will erase ALL data. Are you sure?")){const nd=bl();setData(nd);sv(nd);const tables=["weight","steps","water","recovery","habits","workouts","nutrition","progression","mobility","stepper","debrief","cardio","body_comp","travel_days","settings","program"];for(const t of tables){await sb.deleteAll(t);}}}}
          style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:11,fontFamily:"inherit",marginTop:4,opacity:0.7,padding:0}}>
          Reset All Data
        </button>
      </S>
    </X>

    <X>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:4}}>Program</div>
      <div style={{fontSize:13,color:C.t2}}>{PROG.name}</div>
      <div style={{fontSize:12,color:C.t3}}>Week {wkn(td())}/{PROG.weeks} · Started {fmt(PROG.start)}</div>
    </X>

    <div style={{textAlign:"center",padding:"12px 0",fontSize:11,color:C.t3,opacity:0.5}}>Health Hub v2026.04.09</div>
  </div>);
};

// ═══ TOAST ═══
const ToastStack=({toasts})=>{
  if(!toasts.length)return null;
  return(<div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:6,maxWidth:440,width:"90%"}}>
    {toasts.map(t=>(<div key={t.id} style={{background:t.type==="success"?C.g:C.v,color:"#fff",padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,.15)",animation:"toastIn .3s ease"}}>{t.message}</div>))}
  </div>);
};

// ═══ APPLY PROGRAM UPDATES ═══
const applyProgramUpdates=async(currentData)=>{
  const applied=[];
  try{
    const rows=await sb.select("program_updates","created_at","asc",50);
    const pending=rows.filter(r=>!r.applied);
    if(!pending.length)return{data:currentData,applied:[]};
    const nd=JSON.parse(JSON.stringify(currentData));
    for(const row of pending){
      const c=typeof row.payload==="string"?JSON.parse(row.payload):row.payload;
      try{
        if(c.type==="settings"&&c.field){
          const old=nd.settings[c.field];
          nd.settings={...nd.settings,[c.field]:c.value};
          applied.push(`${c.field}: ${old||"unset"} → ${c.value}`);
        }else if(c.type==="exercise"){
          if(c.action==="update"&&c.exerciseId){
            for(const day of Object.values(nd.program)){
              const ex=day.exercises?.find(e=>e.id===c.exerciseId);
              if(ex&&c.fields){Object.assign(ex,c.fields);applied.push(`Updated ${ex.name}: ${Object.keys(c.fields).join(", ")}`);}
            }
          }else if(c.action==="swap"&&c.oldExerciseId&&c.newExercise){
            for(const day of Object.values(nd.program)){
              const idx=day.exercises?.findIndex(e=>e.id===c.oldExerciseId);
              if(idx>=0){const oldName=day.exercises[idx].name;day.exercises[idx]=c.newExercise;applied.push(`Swapped ${oldName} → ${c.newExercise.name}`);}
            }
          }else if(c.action==="add"&&c.day&&c.exercise){
            if(nd.program[c.day]){nd.program[c.day].exercises.push(c.exercise);applied.push(`Added ${c.exercise.name} to ${c.day}`);}
          }else if(c.action==="remove"&&c.day&&c.exerciseId){
            if(nd.program[c.day]){
              const idx=nd.program[c.day].exercises.findIndex(e=>e.id===c.exerciseId);
              if(idx>=0){const name=nd.program[c.day].exercises[idx].name;nd.program[c.day].exercises.splice(idx,1);applied.push(`Removed ${name} from ${c.day}`);}
            }
          }
        }
        // Mark applied in Supabase
        await fetch(`${SB_URL}/rest/v1/program_updates?id=eq.${row.id}`,{method:"PATCH",headers:{...sbh,"Prefer":"return=minimal"},body:JSON.stringify({applied:true})});
      }catch(e){console.error("[update] Failed to apply:",e);}
    }
    return{data:nd,applied};
  }catch(e){console.error("[update] Error fetching updates:",e);return{data:currentData,applied:[]};}
};

// ═══ APP ═══
window.App = function App(){
  const [tab,setTab]=useState("dashboard");
  const [data,setData]=useState(()=>{const raw=ld();return seedHistorical(raw?migrate(raw):bl());});
  const [workout,setWorkoutRaw]=useState(()=>{try{const w=localStorage.getItem("dhub6_workout");return w?JSON.parse(w):null;}catch{return null;}});
  const setWorkout=(v)=>{setWorkoutRaw(prev=>{const next=typeof v==="function"?v(prev):v;try{if(next)localStorage.setItem("dhub6_workout",JSON.stringify(next));else localStorage.removeItem("dhub6_workout");}catch{}return next;});};
  const [sbLoaded,setSbLoaded]=useState(false);
  const [syncStatus,setSyncStatus]=useState("");
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((message,type="info")=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  },[]);

  useEffect(()=>{
    (async()=>{
      const sbData=await loadFromSB();
      let finalData;
      if(sbData){
        const local=ld();
        if(local){
          const merged=migrate(local);
          const final={...merged};
          // Smart merge: Supabase wins for date-keyed data (external syncs like Oura/Cronometer
          // write directly to Supabase, so it is always authoritative). Local-only dates
          // (offline entries not yet in Supabase) are preserved because sbData won't have that key.
          const dateKeyed=new Set(["wt","nut","wk","rec","steps","water","habits","mob","stp","debrief","cardio","bodyComp","travelDays","tdeeExclude"]);
          Object.keys(sbData).forEach(k=>{
            if(dateKeyed.has(k)&&typeof sbData[k]==="object"&&!Array.isArray(sbData[k])&&sbData[k]!==null){
              // For date-keyed data: start with local, then overlay Supabase (Supabase wins)
              final[k]={...merged[k],...sbData[k]};
            }else if(k==="prog"&&typeof sbData[k]==="object"&&sbData[k]!==null){
              // Progression: local wins (most recent workout actions)
              final[k]={...sbData[k],...merged[k]};
            }else if(typeof sbData[k]==="object"&&!Array.isArray(sbData[k])&&sbData[k]!==null){
              final[k]={...merged[k],...sbData[k]};
            }else if(Array.isArray(sbData[k])&&sbData[k].length>0){
              final[k]=sbData[k];
            }else if(sbData[k]&&(!merged[k]||Object.keys(merged[k]).length===0)){
              final[k]=sbData[k];
            }
          });
          finalData=final;
          const localHasData=Object.keys(merged.wk).length>0||Object.keys(merged.wt).length>0||Object.keys(merged.nut).length>0;
          const sbEmpty=Object.keys(sbData.wk).length===0&&Object.keys(sbData.wt).length===0;
          if(localHasData&&sbEmpty){
            setSyncStatus("Migrating local data...");
            await syncToSB(final);
            setSyncStatus("Migration complete");
            setTimeout(()=>setSyncStatus(""),3000);
          }
        }else{
          finalData=sbData;
        }
      }else{
        finalData=data;
      }
      // Apply pending program updates from Supabase queue
      const{data:updated,applied}=await applyProgramUpdates(finalData);
      backfillData(updated);repairDeloadProgression(updated);setData(updated);sv(updated);
      Object.entries(updated.prog).forEach(([exId,p])=>{if(p.currentWeight)svSB.progression(exId,p);});
      applied.forEach(msg=>addToast(msg,"success"));
      setSbLoaded(true);
    })();
    // Register service worker for notifications
    if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js',{updateViaCache:'none'}).then(r=>r.update()).catch(()=>{});}
  },[]);

  useEffect(()=>{
    if(!data.settings?.notifications?.enabled)return;
    const checkNotifications=()=>{
      if(Notification.permission!=="granted")return;
      const now=new Date();const hour=now.getHours();
      const ns=data.settings.notifications;
      const t=td();

      // Morning habit reminder (8-9 AM, if habits not logged today)
      if(ns.habits&&hour>=8&&hour<9&&!data.habits?.[t]){
        const lastNotif=localStorage.getItem("dhub6_notif_habits");
        if(lastNotif!==t){
          new Notification("Health Hub",{body:"Time to log your habits and metrics for today",tag:"habits",icon:"/icon-192.png"});
          localStorage.setItem("dhub6_notif_habits",t);
        }
      }

      // Water reminder (every 3 hours, 10AM-8PM, if under 50% of target)
      if(ns.water&&hour>=10&&hour<=20&&hour%3===1){
        const waterNow=data.water?.[t]||0;
        const waterGoal=data.settings?.water||128;
        if(waterNow<waterGoal*0.5){
          const lastNotif=localStorage.getItem("dhub6_notif_water_hr");
          if(lastNotif!==""+hour){
            new Notification("Health Hub",{body:`${waterNow}/${waterGoal}oz water — keep hydrating!`,tag:"water",icon:"/icon-192.png"});
            localStorage.setItem("dhub6_notif_water_hr",""+hour);
          }
        }
      }

      // Evening stretch reminder (8-9 PM, if stretch not done today)
      if(ns.stretch&&hour>=20&&hour<21&&!(data.mob?.[t]?.done||data.mob?.[t]===true)){
        const lastNotif=localStorage.getItem("dhub6_notif_stretch");
        if(lastNotif!==t){
          new Notification("Health Hub",{body:"Time for your evening stretch routine",tag:"stretch",icon:"/icon-192.png"});
          localStorage.setItem("dhub6_notif_stretch",t);
        }
      }

      // Training day reminder (7-8 AM on training days)
      if(ns.workout&&hour>=7&&hour<8){
        const dayName=dw(t);
        const sess=data.program?.[dayName];
        if(sess&&!data.wk?.[t]){
          const lastNotif=localStorage.getItem("dhub6_notif_workout");
          if(lastNotif!==t){
            new Notification("Health Hub",{body:`${sess.name} today`,tag:"workout",icon:"/icon-192.png"});
            localStorage.setItem("dhub6_notif_workout",t);
          }
        }
      }
    };

    checkNotifications();
    const iv=setInterval(checkNotifications,30*60*1000);
    return()=>clearInterval(iv);
  },[data.settings?.notifications?.enabled]);

  useEffect(()=>{
    sv(data);
    if(sbLoaded)syncToSB(data);
  },[data,sbLoaded]);

  return(
    <div style={{background:C.bg,color:C.t,minHeight:"100dvh",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,sans-serif",display:"flex",flexDirection:"column",maxWidth:520,margin:"0 auto"}}>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}`}</style>
      {syncStatus&&<div style={{background:C.pl,padding:"6px 14px",fontSize:12,color:C.p,fontWeight:600,textAlign:"center"}}>{syncStatus}</div>}
      {workout&&tab!=="training"&&<WorkoutTimerBar workout={workout} onTap={()=>setTab("training")} programDays={data.program}/>}
      <div style={{flex:1,padding:"18px 14px",overflowY:"auto",paddingBottom:88}}>
        {tab==="dashboard"&&<Dashboard data={data} setData={setData} setTab={setTab}/>}
        {tab==="training"&&<Training data={data} setData={setData} workout={workout} setWorkout={setWorkout} setTab={setTab} addToast={addToast}/>}
        {tab==="nutrition"&&<Nutrition data={data} setData={setData}/>}
        {tab==="weight"&&<Weight data={data} setData={setData}/>}
        {tab==="habits"&&<Habits data={data} setData={setData}/>}
        {tab==="settings"&&<Settings data={data} setData={setData}/>}
      </div>
      <TabBar active={tab} set={setTab} hasActiveWorkout={!!workout}/>
      <ToastStack toasts={toasts}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
