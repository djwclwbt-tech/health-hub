    try{
      const q=conflict?`?on_conflict=${encodeURIComponent(conflict)}`:"";
      const r=await fetch(`${SB_URL}/rest/v1/${table}${q}`,{method:"POST",headers:{...sbh,"Prefer":"resolution=merge-duplicates"},
        body:JSON.stringify(data)});
      return r.ok;
    }catch{return false;}
  },
  async select(table,order="date",dir="desc",limit=500){
    try{
      const r=await fetch(`${SB_URL}/rest/v1/${table}?select=*&order=${order}.${dir}&limit=${limit}`,{headers:sbh});
      return r.ok?await r.json():[];
    }catch{return[];}
  },
  async deleteRow(table,col,val){
    try{
      await fetch(`${SB_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`,{method:"DELETE",headers:sbh});
    }catch{}
  },
  async deleteAll(table){
    try{
      await fetch(`${SB_URL}/rest/v1/${table}?id=gt.0`,{method:"DELETE",headers:{...sbh,"Prefer":""}});
      await fetch(`${SB_URL}/rest/v1/${table}?date=gt.2000-01-01`,{method:"DELETE",headers:{...sbh,"Prefer":""}});
    }catch{}
  }
};

// Sync entire data object TO supabase (debounced, non-blocking)
let syncTimer=null;
const syncToSB=async(d)=>{
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    try{
      for(const[date,value]of Object.entries(d.wt||{})){await sb.upsert("weight",{date,value});}
      for(const[date,value]of Object.entries(d.steps||{})){await sb.upsert("steps",{date,value:Math.round(value)});}
      for(const[date,oz]of Object.entries(d.water||{})){await sb.upsert("water",{date,oz:Math.round(oz)});}
      for(const[date,r]of Object.entries(d.rec||{})){
        await sb.upsert("recovery",{date,recovery_score:r.recoveryScore||null,hrv:r.hrv||null,rhr:r.rhr||null,
          respiratory_rate:r.respiratoryRate||null,sleep_hours:r.sleepHours||null,sleep_performance:r.sleepPerformance||null,
          strain:r.strain||null,wake_time:r.wakeTime||null,notes:r.notes||null});
      }
      for(const[date,h]of Object.entries(d.habits||{})){
        if(!h)continue;
        await sb.upsert("habits",{date,alcohol:h.alcohol,cannabis:h.cannabis,screens_off:h.screensOff,
          sunlight:h.sunlight,bed_by_1030:h.bedBy1030,read_before_bed:h.readBeforeBed,supplements:h.supplements,custom:h.custom||null});
      }
      for(const[date,w]of Object.entries(d.wk||{})){
        await sb.upsert("workouts",{date,day_name:w.day,exercises:w.exercises||[],duration_min:w.dur||null});
      }
      for(const[date,n]of Object.entries(d.nut||{})){
        await sb.upsert("nutrition",{date,meals:n.meals||[],total_cal:n.totalCal||0,total_protein:n.totalProtein||0,
          total_carbs:n.totalCarbs||0,total_fat:n.totalFat||0,total_fiber:n.totalFiber||0});
      }
      for(const[exId,p]of Object.entries(d.prog||{})){
        await sb.upsert("progression",{exercise_id:exId,current_weight:p.currentWeight,last_reps:p.lastReps||null,
          last_date:p.lastDate||null,progressed:p.progressed||false,pr:p.pr||null,e1rm_history:p.e1rmHistory||null},"exercise_id");
      }
      for(const[date,v]of Object.entries(d.mob||{})){const dur=v&&typeof v==="object"?v.dur:null;await sb.upsert("mobility",{date,completed:true,duration_secs:dur||null});}
      for(const[date]of Object.entries(d.stp||{})){await sb.upsert("stepper",{date,completed:true});}
      for(const[date]of Object.entries(d.debrief||{})){await sb.upsert("debrief",{date,completed:true});}
      for(const[date,c]of Object.entries(d.cardio||{})){await svSB.cardio(date,c);}
      for(const[date,b]of Object.entries(d.bodyComp||{})){if(!b)continue;const rec=typeof b==="object"?b:{};
        await sb.upsert("body_comp",{date,photo_taken:true,analysis:rec.analysis||null});}
      for(const[date,v]of Object.entries(d.travelDays||{})){if(v)await sb.upsert("travel_days",{date,active:true});}
      for(const[date,v]of Object.entries(d.tdeeExclude||{})){if(v)await sb.upsert("tdee_exclude",{date,active:true});}
      if(d.settings)await sb.upsert("settings",{id:"user",...d.settings},"id");
      if(d.program)await sb.upsert("program",{id:"user",data:d.program},"id");
      console.log("[SB] Full sync complete");
    }catch(e){console.error("[SB] Sync error:",e);}
  },2000);
};

const parseHealthImport=(text)=>{
  const d={wt:{},steps:{},rec:{},nut:{}};
  const lines=text.split("\n");
  let section="";
  for(const line of lines){
    if(line.includes("WEIGHT"))section="wt";
    else if(line.includes("STEPS"))section="steps";
    else if(line.includes("RESTING HEART RATE"))section="rhr";
    else if(line.includes("SLEEP"))section="sleep";
    else if(line.includes("CALORIES"))section="cal";
    else if(line.includes("PROTEIN"))section="pro";
    else if(line.includes("CARBOHYDRATE"))section="carb";
    else if(line.includes("FAT"))section="fat";
    else if(line.includes("FIBER"))section="fib";
    const m=line.match(/\|(\d{4}-\d{2}-\d{2})\s*\|(.+?)\|/);
    if(!m)continue;
    const date=m[1],val=m[2].replace(/,/g,"").trim();
    const num=parseFloat(val);
    if(isNaN(num))continue;
    if(section==="wt")d.wt[date]=num;
    else if(section==="steps")d.steps[date]=num;
    else if(section==="rhr"){if(!d.rec[date])d.rec[date]={};d.rec[date].rhr=num;}
    else if(section==="cal"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalCal=num;d.nut[date].meals=[{description:"MFP Import",cal:num,protein:0,carbs:0,fat:0,fiber:0,source:"mfp"}];
    }else if(section==="pro"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalProtein=num;if(d.nut[date].meals.length)d.nut[date].meals[0].protein=num;
    }else if(section==="carb"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalCarbs=num;if(d.nut[date].meals.length)d.nut[date].meals[0].carbs=num;
    }else if(section==="fat"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalFat=num;if(d.nut[date].meals.length)d.nut[date].meals[0].fat=num;
    }else if(section==="fib"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalFiber=num;if(d.nut[date].meals.length)d.nut[date].meals[0].fiber=num;
    }
  }
  let inSleep=false;
  for(const line of lines){
    if(line.includes("SLEEP"))inSleep=true;
    if(line.includes("CALORIES"))inSleep=false;
    if(!inSleep)continue;
    const sm=line.match(/\|(\d{4}-\d{2}-\d{2})\s*\|.+?\|.+?\|\s*~?([\d.]+)/);
    if(sm){const date=sm[1],hrs=parseFloat(sm[2]);
      if(!d.rec[date])d.rec[date]={};d.rec[date].sleepHours=hrs;}
  }
  return d;
};

const lds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const td=()=>lds(new Date());
const yd=()=>{const d=new Date();d.setDate(d.getDate()-1);return lds(d)};
const dw=s=>["sunday","monday","tuesday","wednesday","thursday","friday","saturday"][new Date(s+"T12:00:00").getDay()];
const fmt=s=>new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const wkn=s=>{const a=new Date(PROG.start+"T12:00:00"),b=new Date(s+"T12:00:00");return Math.max(1,Math.floor((b-a)/6048e5)+1);};
const estTime=(sess)=>{if(!sess)return"";
  const wu=5+(sess.warmup?.moves?.length||0)*1+(sess.warmup?.ramp?3:0);
  const wuSets=sess.exercises.reduce((t,ex)=>t+(WU(ex.sw).length||0)*0.75,0);
  const work=sess.exercises.reduce((t,ex)=>t+ex.sets*0.5+(ex.sets-1)*(ex.rest/60),0);
  const stretch=(PROG.mobility?._default||PROG.mobility?.[Object.keys(PROG.mobility)[0]]||[]).reduce((t,s)=>t+((s.dur||60)*(s.sets||2))/60,0);
  return Math.round(wu+wuSets+work+stretch);
};

const fmtTime=(v)=>{
  const digits=v.replace(/\D/g,"");
  if(digits.length<=2)return digits;
  if(digits.length===3)return digits[0]+":"+digits.slice(1);
  if(digits.length>=4)return digits.slice(0,-2)+":"+digits.slice(-2);
  return digits;
};

const fmtElapsed=(secs)=>{
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0)return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
};

// ═══ DAY-TYPE HELPERS ═══
const getDayType=(dateStr,travelDays)=>{
  if(travelDays?.[dateStr])return"travel";
  const day=dw(dateStr);
  if(day==="wednesday")return"wednesday";
  if(["monday","tuesday","thursday","friday"].includes(day))return"training";
  return"weekend";
};
// ═══ SOCIAL WEEKEND ═══
const getWeekMonday=(dateStr)=>{
  const d=new Date(dateStr+"T12:00:00");const dow=d.getDay();
  const diff=dow===0?-6:1-dow;d.setDate(d.getDate()+diff);return lds(d);
};
const isSocialWeekendActive=(dateStr,socialWeekend)=>{
  if(!socialWeekend?.active)return false;
  return getWeekMonday(dateStr)===socialWeekend.weekOf;
};
const SOCIAL_CAL={monday:1500,tuesday:1500,wednesday:800,thursday:1500};

const getDayCalTarget=(dateStr,settings,travelDays,socialWeekend)=>{
  const dt=getDayType(dateStr,travelDays);
  if(dt==="travel")return settings?.trainingCal||1800;
  const sw=isSocialWeekendActive(dateStr,socialWeekend);
  if(sw){
    const day=dw(dateStr);
    if(["friday","saturday","sunday"].includes(day))return null;
    return SOCIAL_CAL[day]||1500;
  }
  if(dt==="wednesday")return settings?.wednesdayCal||900;
  if(dt==="training")return settings?.trainingCal||1800;
  return settings?.weekendCal||1700;
};
const getDayProTarget=(dateStr,settings,travelDays,socialWeekend)=>{
  const dt=getDayType(dateStr,travelDays);
  if(dt==="travel")return settings?.protein||200;
  const sw=isSocialWeekendActive(dateStr,socialWeekend);
  if(sw&&["friday","saturday","sunday"].includes(dw(dateStr)))return 180;
  if(dt==="wednesday")return 150;
  if(dt==="training")return settings?.protein||200;
  if(["saturday","sunday"].includes(dw(dateStr)))return 180;
  return 150;
};

// ═══ AUTOREGULATION ═══
const getWeeklyRecoveryAvg=(rec)=>{
  const now=new Date();const entries=[];
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=lds(d);
    if(rec[ds]?.recoveryScore)entries.push(rec[ds].recoveryScore);}
  return entries.length>=3?Math.round(entries.reduce((a,b)=>a+b,0)/entries.length):null;
};
const getAutoregulation=(avgRec)=>{
  if(avgRec===null)return null;
  if(avgRec>=70)return{level:"green",msg:"Run full plan. Progress only if earned.",action:"All lifts as planned. Keep cardio steady; no extra stress chasing PRs."};
  if(avgRec>=55)return{level:"yellow",msg:"Recovery dipping. Reduce cardio stress first.",action:"Keep lifting. Drop to 1 Peloton session and check sleep/food before changing calories."};
  return{level:"red",msg:"Recovery low. Protect lifting and pull back cardio.",action:"Skip Peloton/stairmaster. Use minimum effective lifting only until recovery rebounds."};
};
const getConsecutiveRedDays=(rec)=>{
  let count=0;const now=new Date();
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=lds(d);
    if(rec[ds]?.recoveryScore&&rec[ds].recoveryScore<34)count++;else break;}
  return count;
};

// ═══ VOLUME & E1RM ═══
const e1rm=(w,r)=>r<=0||w<=0?0:r===1?w:Math.round(w*(1+r/30));
const calcVolume=(exercises)=>exercises.reduce((t,ex)=>t+ex.sets.filter(s=>s.done).reduce((s,set)=>s+(set.weight||0)*set.reps,0),0);

const backfillData=(d)=>{if(d.prog["seated-leg-curl"]&&!d.prog["lying-leg-curl"]){d.prog["lying-leg-curl"]=d.prog["seated-leg-curl"];delete d.prog["seated-leg-curl"];}Object.entries(d.wk||{}).forEach(([date,w])=>{if(!w.volume&&w.exercises){try{w.volume=calcVolume(w.exercises);}catch(e){}}});const allDays={...PROG.days,...(d.program||{})};Object.entries(d.wk||{}).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,w])=>{if(!w.exercises||!w.day)return;const dayDef=allDays[w.day];if(!dayDef||!dayDef.exercises)return;w.exercises.forEach((ex,i)=>{const pe=dayDef.exercises[i];if(!pe||!ex.sets)return;const cs=ex.sets.filter(s=>s.done&&s.weight>0&&s.reps>0);if(!cs.length)return;const bestSet=cs.reduce((best,s)=>e1rm(s.weight||0,s.reps)>e1rm(best.weight||0,best.reps)?s:best,cs[0]);const newE1rm=e1rm(bestSet.weight||0,bestSet.reps);if(newE1rm<=0)return;if(!d.prog[pe.id])d.prog[pe.id]={currentWeight:bestSet.weight,lastReps:cs.map(s=>s.reps),lastDate:date,progressed:false};if(!d.prog[pe.id].e1rmHistory)d.prog[pe.id].e1rmHistory=[];d.prog[pe.id].e1rmHistory.push({date,e1rm:newE1rm});d.prog[pe.id].e1rmHistory=d.prog[pe.id].e1rmHistory.slice(-12);if(!d.prog[pe.id].pr||newE1rm>d.prog[pe.id].pr.e1rm){d.prog[pe.id].pr={name:pe.name,weight:bestSet.weight,reps:bestSet.reps,e1rm:newE1rm,date};}});});return d;};

const repairDeloadProgression=(d)=>{const allDays={...PROG.days,...(d.program||{})};const allEx=Object.values(allDays).flatMap(day=>day.exercises||[]);for(const pe of allEx){const dates=Object.entries(d.wk||{}).filter(([date])=>wkn(date)!==PROG.deload).sort((a,b)=>b[0].localeCompare(a[0]));for(const[date,w]of dates){const wex=w.exercises?.find(e=>e.id===pe.id);if(!wex)continue;const cs=wex.sets?.filter(s=>s.done&&s.weight>0);if(!cs?.length)continue;const cw=cs[0].weight;const hit=cs.length===pe.sets&&cs.every(s=>s.reps>=pe.rr[1]);const correctWeight=pe.inc===0?cw:(hit?cw+pe.inc:cw);if(d.prog[pe.id]?.currentWeight&&d.prog[pe.id].currentWeight<correctWeight*0.75){d.prog[pe.id].currentWeight=correctWeight;}else if(!d.prog[pe.id]){d.prog[pe.id]={currentWeight:correctWeight,lastReps:cs.map(s=>s.reps),lastDate:date,progressed:false};}break;}}return d;};

// ═══ STALL DETECTION ═══
const getStalls=(prog,wk,programDays)=>{
  // Cut mode: flag when weight DROPS on same lift for 2 consecutive sessions
  const days=programDays||PROG.days;
  const stalls=[];
  const programExIds=new Set(Object.values(days).flatMap(d=>d.exercises).map(e=>e.id));
  Object.entries(prog).forEach(([id,p])=>{
    if(!p.lastDate)return;
    const baseId=p.exerciseId||id.split("__")[0];
    if(!programExIds.has(baseId))return;
    const sessions=Object.entries(wk)
      .filter(([_,w])=>w.exercises?.some(e=>e.id===baseId||e.progKey===id))
      .map(([d,w])=>{const ex=w.exercises.find(e=>e.id===baseId||e.progKey===id);const cs=ex?.sets?.filter(s=>s.done&&s.weight>0)||[];return cs.length?{date:d,weight:Math.max(...cs.map(s=>s.weight))}:null;})
      .filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date));
    if(sessions.length<3)return;
    // Check if last 2 sessions both dropped weight vs the session before them
    const baseline=sessions[2].weight;
    if(sessions[0].weight<baseline&&sessions[1].weight<baseline){
      const exDef=Object.values(days).flatMap(d=>d.exercises).find(e=>e.id===baseId);
      const drop=baseline-sessions[0].weight;
      stalls.push({id,name:exDef?.name||p.name||baseId,weeks:2,currentWeight:sessions[0].weight,drop});
    }
  });
  return stalls;
};

const getWeightTrend=(wt)=>{
  const entries=Object.entries(wt).sort((a,b)=>a[0].localeCompare(b[0]));
  if(entries.length<2)return null;
  const now=new Date();const weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);
  const weekStr=lds(weekAgo);
  const recent=entries.filter(([d])=>d>=weekStr);
  const older=entries.filter(([d])=>d<weekStr);
  if(recent.length<1||older.length<1)return null;
  const recentAvg=recent.reduce((s,[_,v])=>s+v,0)/recent.length;
  const olderLast=older[older.length-1][1];
  const weeklyRate=+(recentAvg-olderLast).toFixed(1);
  if(Math.abs(weeklyRate)>1)return{rate:weeklyRate,direction:weeklyRate>0?"gaining":"losing",
    advice:weeklyRate>0?"Pull back weekend portions slightly. You are in surplus.":"Add 200 cal to training days from carbs. You are cutting; protect performance."};
  return null;
};

const getTopProteinMeals=(data,limit=5)=>{
  const map={};
  for(const[d,n] of Object.entries(data.nut||{})){
    for(const m of(n.meals||[])){
      if(!m.description||(m.cal||0)<50)continue;
      const k=m.description.toLowerCase().trim();
      if(!map[k])map[k]={desc:m.description,tp:0,tc:0,n:0};
      map[k].tp+=(m.protein||0);map[k].tc+=(m.cal||0);map[k].n++;
    }
  }
  return Object.values(map).filter(m=>m.tp/m.n>=20)
    .map(m=>({desc:m.desc,pro:Math.round(m.tp/m.n),cal:Math.round(m.tc/m.n),n:m.n}))
    .sort((a,b)=>b.pro-a.pro).slice(0,limit);
};

const getInsights=(data)=>{
  const ins=[];
  const dates=Object.keys(data.nut||{}).sort().reverse().slice(0,30);
  let pH=0,pD=0;
  for(const d of dates){
    const pt=getDayProTarget(d,data.settings||DEFAULTS,data.travelDays,data.socialWeekend);
    const p=data.nut[d]?.totalProtein||0;
    if(p>0){pD++;if(p>=pt)pH++;}
  }
  if(pD>=5){const r=Math.round(pH/pD*100);
    ins.push({type:r>=70?"win":"gap",text:`Protein target hit ${r}% of tracked days (${pH}/${pD})`});}
  const sr=[];
  for(const[d,r] of Object.entries(data.rec||{})){
    if(r.sleepHours&&r.recoveryScore)sr.push({s:r.sleepHours,r:r.recoveryScore});}
  if(sr.length>=7){
    const gs=sr.filter(x=>x.s>=7.5),ps=sr.filter(x=>x.s<7);
    if(gs.length>=3&&ps.length>=3){
      const ga=Math.round(gs.reduce((s,d)=>s+d.r,0)/gs.length);
      const pa=Math.round(ps.reduce((s,d)=>s+d.r,0)/ps.length);
      if(ga-pa>=5)ins.push({type:"insight",text:`7.5h+ sleep averages ${ga}% recovery vs ${pa}% on <7h nights`});
    }
  }
  let cH=0,cD=0;
  for(const d of dates){
    const ct=getDayCalTarget(d,data.settings||DEFAULTS,data.travelDays,data.socialWeekend);
    if(!ct)continue;
    const c=data.nut[d]?.totalCal||0;
    if(c>0){cD++;if(Math.abs(c-ct)<=ct*0.1)cH++;}
  }
  if(cD>=5){const r=Math.round(cH/cD*100);
    ins.push({type:r>=60?"win":"gap",text:`Calories within 10% of target ${r}% of days`});}
  const recWkPairs=Object.entries(data.rec||{}).filter(([d,r])=>r.recoveryScore&&data.wk[d]).map(([d,r])=>{
    const wk=data.wk[d];const progDay=wk.exercises?wk.exercises.filter(ex=>ex.sets&&ex.sets.some(s=>s.done)).length:0;
    return{rec:r.recoveryScore,trained:progDay>0,volume:wk.volume||0};
  });
  if(recWkPairs.length>=3){
    const highRec=recWkPairs.filter(p=>p.rec>=55);
    const lowRec=recWkPairs.filter(p=>p.rec<55);
    const highVol=highRec.length?Math.round(highRec.reduce((s,p)=>s+p.volume,0)/highRec.length):0;
    const lowVol=lowRec.length?Math.round(lowRec.reduce((s,p)=>s+p.volume,0)/lowRec.length):0;
    if(highVol>0&&lowVol>0){
      const pct=Math.round((highVol-lowVol)/lowVol*100);
      ins.push({type:pct>10?"win":"insight",text:`High recovery days (55+): ${highVol.toLocaleString()} lbs avg volume vs ${lowVol.toLocaleString()} lbs on low days (${pct>0?"+":""}${pct}%)`});
    }
  }
  return ins.slice(0,4);
};

const getCutRetentionScore=(data)=>{
  const planStart=PROG.start;
  const wEntries=Object.entries(data.wt||{}).filter(([d])=>d>=planStart).sort((a,b)=>a[0].localeCompare(b[0]));
  if(wEntries.length<3)return null;
  const mid=Math.floor(wEntries.length/2);
  const firstHalf=wEntries.slice(0,mid),secondHalf=wEntries.slice(mid);
  if(secondHalf.length<1||firstHalf.length<1)return null;
  const rAvg=secondHalf.reduce((s,[_,v])=>s+v,0)/secondHalf.length;
  const oAvg=firstHalf.reduce((s,[_,v])=>s+v,0)/firstHalf.length;
  const weeks=Math.max(1,(new Date(wEntries[wEntries.length-1][0])-new Date(wEntries[0][0]))/6048e5);
  const wkChange=Math.abs(rAvg-oAvg)/weeks;
  const wScore=wkChange<=0.5?100:wkChange<=1?85:wkChange<=1.5?65:wkChange<=2?45:20;
  const progEntries=Object.values(data.prog||{});
  const totalL=progEntries.length;
  const heldL=progEntries.filter(p=>p.lastDate).length;
  const lScore=totalL>0?Math.round(heldL/totalL*100):50;
  const nutDates=Object.keys(data.nut||{}).filter(d=>d>=planStart).sort();
  let pH=0,pDays=0;
  for(const d of nutDates){
    const pt=getDayProTarget(d,data.settings||DEFAULTS,data.travelDays,data.socialWeekend);
    const p=data.nut[d]?.totalProtein||0;
    if(p>0){pDays++;if(p>=pt)pH++;}
  }
  const pScore=pDays>0?Math.round(pH/pDays*100):50;
  const total=Math.round(wScore*0.4+lScore*0.4+pScore*0.2);
  return{score:total,weight:{score:wScore,change:+((rAvg-oAvg)/weeks).toFixed(1)},
    lifts:{score:lScore,held:heldL,total:totalL},protein:{score:pScore,hit:pH,days:pDays}};
};

const calcEWMA=(values,alpha=0.1)=>{
  if(!values.length)return[];
  const result=[values[0]];
  for(let i=1;i<values.length;i++)result.push(alpha*values[i]+(1-alpha)*result[i-1]);
  return result;
};

const linReg=(ys)=>{
  const n=ys.length;if(n<2)return{slope:0};
  const mx=(n-1)/2;
  const my=ys.reduce((s,v)=>s+v,0)/n;
  let num=0,den=0;
  for(let i=0;i<n;i++){num+=(i-mx)*(ys[i]-my);den+=(i-mx)**2;}
  return{slope:den?num/den:0};
};

const calcAdaptiveTDEE=(wt,nut,settings,travelDays,tdeeExclude={})=>{
  const planStart=PROG.start;
  const allDates=[];
  const today=td();
  let d=new Date(planStart+"T12:00:00");
  while(lds(d)<=today){allDates.push(lds(d));d.setDate(d.getDate()+1);}
  const paired=allDates.filter(dt=>wt[dt]!=null&&(nut[dt]?.totalCal||0)>=1200&&!tdeeExclude[dt]);
  if(paired.length<3)return{daysUsed:paired.length,daysNeeded:7,phase:"collecting"};
  const weights=paired.map(dt=>wt[dt]);
  const calories=paired.map(dt=>nut[dt].totalCal);
  const trendW=calcEWMA(weights,0.1);
  const avgCal=Math.round(calories.reduce((s,v)=>s+v,0)/calories.length);
  const weeklyChange=linReg(weights).slope*7;
  const tdeeRaw=Math.round(avgCal-(weeklyChange*3500/7));
  const tdee=Math.max(Math.round(avgCal*0.5),Math.min(Math.round(avgCal*1.5),tdeeRaw));
  const confidence=Math.min(95,Math.round(paired.length*4.5));
  const calT=getDayCalTarget(today,settings,travelDays,null);
  const deficit=tdee-calT;
  const trendWeight=+trendW[trendW.length-1].toFixed(1);
  return{tdee,confidence,avgCalories:avgCal,weeklyChange:+weeklyChange.toFixed(2),
    daysUsed:paired.length,phase:paired.length<7?"collecting":confidence<60?"early":"confident",
    deficit,trendWeight,trendWeights:paired.map((dt,i)=>({d:dt,v:+trendW[i].toFixed(1),raw:weights[i]}))};
};

const getDailyCutAdherence=(data,date,settings=data.settings||DEFAULTS)=>{
  const nut=data.nut?.[date]||{};
  const calT=getDayCalTarget(date,settings,data.travelDays,data.socialWeekend);
  const proT=getDayProTarget(date,settings,data.travelDays,data.socialWeekend);
  const cal=nut.totalCal||0,pro=nut.totalProtein||0;
  const logged=cal>0||pro>0||(nut.meals||[]).length>0;
  return{date,logged,calTarget:calT,proteinTarget:proT,calories:cal,protein:pro,
    calorieHit:calT===null?logged:(logged&&Math.abs(cal-calT)<=calT*0.12),
    proteinHit:logged&&pro>=proT*0.9,
    weightLogged:data.wt?.[date]!=null,
    workoutDone:!!data.wk?.[date],
    cardioDone:!!data.cardio?.[date]?.done};
};

const getWeeklyCutSummary=(data,today=td())=>{
  const settings=data.settings||DEFAULTS;
  const dates=[];for(let i=6;i>=0;i--){const d=new Date(today+"T12:00:00");d.setDate(d.getDate()-i);dates.push(lds(d));}
  const adherence=dates.map(d=>getDailyCutAdherence(data,d,settings));
  const loggedDays=adherence.filter(a=>a.logged).length;
  const proteinHits=adherence.filter(a=>a.proteinHit).length;
  const calorieHits=adherence.filter(a=>a.calorieHit).length;
  const weightDays=adherence.filter(a=>a.weightLogged).length;
  const plannedTraining=dates.filter(d=>!!data.program?.[dw(d)]);
  const trainingDone=plannedTraining.filter(d=>!!data.wk?.[d]).length;
  const cardioDone=adherence.filter(a=>a.cardioDone).length;
  const weights=dates.filter(d=>data.wt?.[d]!=null).map(d=>({date:d,weight:data.wt[d]}));
  let weightTrend={label:"Missing",status:"unknown",weeklyChange:null,days:weights.length};
  if(weights.length>=4){
    const start=new Date(weights[0].date+"T12:00:00");
    const xs=weights.map(x=>(new Date(x.date+"T12:00:00")-start)/864e5);
    const ys=weights.map(x=>x.weight);
    const mx=xs.reduce((s,v)=>s+v,0)/xs.length,my=ys.reduce((s,v)=>s+v,0)/ys.length;
    let num=0,den=0;for(let i=0;i<xs.length;i++){num+=(xs[i]-mx)*(ys[i]-my);den+=(xs[i]-mx)**2;}
    const weeklyChange=+(den?(num/den*7):0).toFixed(2);
    weightTrend={label:weeklyChange<-1.5?"Dropping fast":weeklyChange<-0.25?"Dropping":weeklyChange<=0.25?"Flat":"Up",status:weeklyChange<-1.5?"fast":weeklyChange<-0.25?"onPace":weeklyChange<=0.25?"flat":"up",weeklyChange,days:weights.length};
  }
  const recValues=dates.map(d=>data.rec?.[d]?.recoveryScore).filter(v=>v!=null);
  const recoveryAvg=recValues.length>=3?Math.round(recValues.reduce((s,v)=>s+v,0)/recValues.length):getWeeklyRecoveryAvg(data.rec||{});
  const tdee=calcAdaptiveTDEE(data.wt||{},data.nut||{},settings,data.travelDays,data.tdeeExclude||{});
  return{dates,adherence,loggedDays,proteinHits,calorieHits,weightDays,
    nutritionAdherence:loggedDays?Math.round(((proteinHits+calorieHits)/(loggedDays*2))*100):0,
    proteinRate:loggedDays?Math.round(proteinHits/loggedDays*100):0,
    calorieRate:loggedDays?Math.round(calorieHits/loggedDays*100):0,
    weightTrend,recoveryAvg,recoveryDays:recValues.length,trainingDone,plannedTraining:plannedTraining.length,
    cardioDone,tdee,stalls:getStalls(data.prog||{},data.wk||{},data.program||PROG.days)};
};

const getTonightCloseout=(data,date=td())=>{
  const settings=data.settings||DEFAULTS;
  const a=getDailyCutAdherence(data,date,settings);
  const steps=data.steps?.[date]||0;
  const stepsTarget=cutStepsTarget(settings);
  const rec=data.rec?.[date]?.recoveryScore??null;
  const cardioDone=!!data.cardio?.[date]?.done;
  const workoutDone=!!data.wk?.[date];
  const sess=typeof getSess==="function"?getSess(dw(date),null):null;
  const tomorrow=new Date(date+"T12:00:00");tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr=lds(tomorrow);
  const tomorrowType=getDayType(tomorrowStr,data.travelDays||{});
  const proteinLeft=Math.max(0,(a.proteinTarget||0)-(a.protein||0));
  const caloriesLeft=a.calTarget===null?null:(a.calTarget||0)-(a.calories||0);
  const foodOk=a.logged&&a.proteinHit&&(a.calTarget===null||a.calorieHit);
  const stepsOk=steps>=stepsTarget;
  const liftOk=!sess||workoutDone;
  const recoveryRisk=rec!=null&&rec<55;
  let tomorrowMode="Normal cut day";
  let action="Close habits, then stop adding friction.";
  let tone="good";
  if(!a.logged){tomorrowMode="Data-first morning";action="Log food before changing any target.";tone="warn";}
  else if(proteinLeft>25){tomorrowMode="Protein-first day";action=`Get ${proteinLeft}g protein before bed or make tomorrow protein-first.`;tone="warn";}
  else if(caloriesLeft!=null&&caloriesLeft<-150){tomorrowMode="Tighten food";action="No target change. Keep tomorrow cleaner and hit protein early.";tone="warn";}
  else if(recoveryRisk){tomorrowMode="Recovery-biased";action="Reduce cardio/stress before cutting food. Protect lifting.";tone="bad";}
  else if(!cardioDone){tomorrowMode="Cardio catch-up";action="Do planned Zone 2 tomorrow; don't cut calories to compensate.";tone="warn";}
  else if(!stepsOk){tomorrowMode="Steps bias";action=`Finish steps if practical; otherwise make tomorrow a ${Math.round(stepsTarget/1000)}k step day.`;tone="warn";}
  else if(!liftOk){tomorrowMode="Training priority";action="Lift is the priority before adding extra cardio.";tone="warn";}
  return{tomorrow:tomorrowStr,tomorrowMode,action,tone,foodOk,proteinLeft,caloriesLeft,steps,stepsTarget,stepsOk,cardioDone,liftOk,habitsLogged:!!data.habits?.[date],recovery:rec};
};

const getWeeklyCutRecommendation=(data,today=td())=>{
  const s=getWeeklyCutSummary(data,today);
  const deload=wkn(today)===PROG.deload;
  const adherencePoor=s.loggedDays<4||s.weightDays<3||s.nutritionAdherence<60;
  const lowRecovery=s.recoveryAvg!=null&&s.recoveryAvg<55;
  const veryLowRecovery=s.recoveryAvg!=null&&s.recoveryAvg<45;
  const stalls=s.stalls.length;
  let rec;
  if(deload){
    rec={key:"deload",action:"Run this as a recovery-biased deload week.",why:"Program cycle says deload, so completion, sleep, mobility, and easy Zone 2 matter more than forcing more deficit.",confidence:s.loggedDays>=3||s.recoveryDays>=3?"Medium":"Low"};
  }else if(adherencePoor){
    rec={key:"adherence",action:"Tighten logging and hit protein before changing targets.",why:`Only ${s.loggedDays}/7 days have nutrition logs and ${s.weightDays}/7 have weigh-ins. The app needs better inputs before recommending calorie/cardio changes.`,confidence:s.loggedDays>=3||s.weightDays>=3?"Medium":"Low"};
  }else if(veryLowRecovery){
    rec={key:"recover",action:"Reduce cardio/stress first; keep food targets steady.",why:`Weekly recovery is ${s.recoveryAvg}%. Protect lifting and sleep before cutting calories further.`,confidence:s.recoveryDays>=3?"High":"Medium"};
  }else if(lowRecovery&&s.weightTrend.status!=="flat"){
    rec={key:"stress",action:"Keep calories steady and make cardio easier this week.",why:`Weight is ${s.weightTrend.label.toLowerCase()} while recovery averages ${s.recoveryAvg}%, so the safer lever is stress/cardio, not less food.`,confidence:s.recoveryDays>=3&&s.weightTrend.days>=4?"High":"Medium"};
  }else if(s.weightTrend.status==="fast"){
    rec={key:"too-fast",action:"Stay fed around training; do not add more deficit.",why:`Trend is about ${Math.abs(s.weightTrend.weeklyChange)} lb/week down. That is fast enough to threaten recovery/performance on a cut.`,confidence:s.weightTrend.days>=4?"Medium":"Low"};
  }else if(s.weightTrend.status==="flat"||s.weightTrend.status==="up"){
    rec={key:"adjust",action:"Adjust one lever only: add 10–15 min Zone 2 twice this week or trim ~100 calories on rest days.",why:`Adherence is ${s.nutritionAdherence}% and weight is ${s.weightTrend.label.toLowerCase()}, so one small lever is enough. Targets stay unchanged until you choose it.`,confidence:s.weightTrend.days>=4&&s.tdee.phase!=="collecting"?"High":"Medium"};
  }else if(stalls>=2){
    rec={key:"training",action:"Hold the deficit steady and prioritize sleep/carbs around lifting.",why:`${stalls} lifts are showing stalls/drops. Preserve training output before making the cut more aggressive.`,confidence:"Medium"};
  }else{
    rec={key:"stay",action:"Stay the course this week.",why:`Weight trend, nutrition adherence (${s.nutritionAdherence}%), and recovery are good enough. Do not change multiple levers.`,confidence:s.weightTrend.days>=4&&s.loggedDays>=5?"High":"Medium"};
  }
  return{...rec,summary:s,signals:[
    {label:"Weight",value:s.weightTrend.weeklyChange==null?s.weightTrend.label:`${s.weightTrend.weeklyChange>0?"+":""}${s.weightTrend.weeklyChange} lb/wk`,tone:s.weightTrend.status==="onPace"?"good":s.weightTrend.status==="fast"||s.weightTrend.status==="flat"||s.weightTrend.status==="up"?"warn":"muted"},
    {label:"Adherence",value:`${s.nutritionAdherence}%`,tone:s.nutritionAdherence>=70?"good":s.nutritionAdherence>=60?"warn":"bad"},
    {label:"Recovery",value:s.recoveryAvg==null?"Missing":`${s.recoveryAvg}%`,tone:s.recoveryAvg==null?"muted":s.recoveryAvg>=65?"good":s.recoveryAvg>=55?"warn":"bad"},
    {label:"Training",value:s.plannedTraining?`${s.trainingDone}/${s.plannedTraining}`:"Rest",tone:s.plannedTraining&&s.trainingDone<s.plannedTraining?"warn":"good"},
    {label:"Cardio",value:`${s.cardioDone}/7`,tone:s.cardioDone>=2?"good":s.cardioDone>=1?"warn":"muted"}
  ]};
};

const N=({value,onChange,placeholder,style={},min=0,max})=>{
  const handleChange=(e)=>{
    const v=e.target.value;
    if(v===""||v==="."){onChange(v);return;}
    const num=parseFloat(v);
    if(isNaN(num))return;
    if(num<min)return;
    if(max!==undefined&&num>max)return;
    onChange(v);
  };
  return(
  <input type="text" inputMode="decimal" pattern="[0-9.]*" value={value} onChange={handleChange}
    placeholder={placeholder} style={{background:"rgba(255,255,255,.95)",border:`1px solid ${C.bd}`,borderRadius:10,padding:"10px 10px",
    color:C.t,fontSize:16,width:"100%",boxSizing:"border-box",outline:"none",textAlign:"center",fontFamily:"inherit",boxShadow:"inset 0 1px 2px rgba(23,32,51,.04)",...style}}/>
);};
const TimeInput=({value,onChange,placeholder,style={}})=>{
  const handleChange=(e)=>{
    const raw=e.target.value.replace(/\D/g,"");
    if(raw.length<=4)onChange(fmtTime(raw));
  };
  return(<input type="text" inputMode="numeric" value={value} onChange={handleChange}
    placeholder={placeholder} style={{background:"rgba(255,255,255,.95)",border:`1px solid ${C.bd}`,borderRadius:10,padding:"10px 10px",
    color:C.t,fontSize:16,width:"100%",boxSizing:"border-box",outline:"none",textAlign:"center",fontFamily:"inherit",boxShadow:"inset 0 1px 2px rgba(23,32,51,.04)",...style}}/>);
};

// ═══ CHART ═══
const Ch=({data,color=C.p,height=52,label,yUnit="",empty})=>{
  if(!data||data.length<2){
    if(!empty)return null;
    return(<X style={{padding:"10px 14px"}}>{label&&<div style={{fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{label}</div>}
      <div style={{height,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:13,color:C.t3}}>{empty}</span>
      </div></X>);
  }
  const vals=data.map(d=>d.v),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,pad=rng*0.12;
  const w=data.length*32,h=height;
  const pts=data.map((d,i)=>[i*(w/(data.length-1)),h-6-((d.v-(mn-pad))/(rng+pad*2))*(h-16)]);
  const line=pts.map(p=>p.join(",")).join(" ");
  return(
    <X style={{padding:"10px 14px"}}>
      {label&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>
        <span style={{fontSize:13,fontWeight:700,color}}>{vals[vals.length-1]}{yUnit}</span>
      </div>}
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}} preserveAspectRatio="none">
        <defs><linearGradient id={`f${color.slice(1)}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.08"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient></defs>
        <polygon points={`0,${h} ${line} ${w},${h}`} fill={`url(#f${color.slice(1)})`}/>
        <polyline points={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="2" fill={C.cd} stroke={color} strokeWidth="1.5"/>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.t3,marginTop:2}}>
        <span>{data[0].d||""}</span><span>{data[data.length-1].d||""}</span>
      </div>
    </X>
  );
};

// ═══ ANALYSIS SECTION ═══
const AnalysisSection=({data})=>{
  const [range,setRange]=useState("7d");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");

  const runAnalysis=async()=>{
    setLoading(true);setResult(null);setError("");
    try{
      const days=range==="7d"?7:range==="14d"?14:30;
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
      const cutStr=lds(cutoff);

      // Summarize data within range
      const wkEntries=Object.entries(data.wk||{}).filter(([d])=>d>=cutStr);
      const nutEntries=Object.entries(data.nut||{}).filter(([d])=>d>=cutStr);
      const recEntries=Object.entries(data.rec||{}).filter(([d])=>d>=cutStr);
      const wtEntries=Object.entries(data.wt||{}).filter(([d])=>d>=cutStr).sort((a,b)=>a[0].localeCompare(b[0]));
      const stepsEntries=Object.entries(data.steps||{}).filter(([d])=>d>=cutStr);
      const habitsEntries=Object.entries(data.habits||{}).filter(([d])=>d>=cutStr);
      const waterEntries=Object.entries(data.water||{}).filter(([d])=>d>=cutStr);

      // Nutrition averages
      const nutAvg=nutEntries.length?{
        cal:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalCal||0),0)/nutEntries.length),
        protein:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalProtein||0),0)/nutEntries.length),
        carbs:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalCarbs||0),0)/nutEntries.length),
        fat:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalFat||0),0)/nutEntries.length),
        fiber:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalFiber||0),0)/nutEntries.length),
        days:nutEntries.length,
      }:null;

      // Recovery averages
      const recWithScore=recEntries.filter(([,r])=>r.recoveryScore);
      const recAvg=recWithScore.length?{
        recovery:Math.round(recWithScore.reduce((s,[,r])=>s+r.recoveryScore,0)/recWithScore.length),
        hrv:Math.round(recEntries.filter(([,r])=>r.hrv).reduce((s,[,r])=>s+r.hrv,0)/(recEntries.filter(([,r])=>r.hrv).length||1)),
        rhr:Math.round(recEntries.filter(([,r])=>r.rhr).reduce((s,[,r])=>s+r.rhr,0)/(recEntries.filter(([,r])=>r.rhr).length||1)),
        sleep:+(recEntries.filter(([,r])=>r.sleepHours).reduce((s,[,r])=>s+r.sleepHours,0)/(recEntries.filter(([,r])=>r.sleepHours).length||1)).toFixed(1),
        days:recWithScore.length,
      }:null;

      // Weight trend
      const wtTrend=wtEntries.length>=2?{
        start:wtEntries[0][1],end:wtEntries[wtEntries.length-1][1],
        change:+(wtEntries[wtEntries.length-1][1]-wtEntries[0][1]).toFixed(1),
        entries:wtEntries.length,
      }:wtEntries.length===1?{current:wtEntries[0][1],entries:1}:null;

      // Steps avg
      const stepsAvg=stepsEntries.length?Math.round(stepsEntries.reduce((s,[,v])=>s+v,0)/stepsEntries.length):null;

      // Workout summary
      const wkSummary={count:wkEntries.length,days:wkEntries.map(([d,w])=>w.day),
        progressions:Object.entries(data.prog||{}).filter(([,p])=>p.lastDate&&p.lastDate>=cutStr&&p.progressed).length};

      // Habits summary
      const chLen=(data.settings.customHabits||[]).length;
      const habScores=habitsEntries.map(([,h])=>{if(!h)return null;
        let c=0;const tot=7+chLen;
        if(h.alcohol===false)c++;if(h.cannabis===false)c++;if(h.screensOff===true)c++;
        if(h.sunlight===true)c++;if(h.bedBy1030===true)c++;if(h.readBeforeBed===true)c++;if(h.supplements===true)c++;
        c+=Object.values(h.custom||{}).filter(v=>v).length;
        return c/tot;}).filter(v=>v!==null);
      const habAvg=habScores.length?Math.round(habScores.reduce((a,b)=>a+b,0)/habScores.length*100):null;

      // Water avg
      const waterAvg=waterEntries.length?Math.round(waterEntries.reduce((s,[,v])=>s+v,0)/waterEntries.length):null;

      // Body comp assessments in window
      const bcEntries=Object.entries(data.bodyComp||{}).filter(([d,v])=>d>=cutStr&&v&&typeof v==="object"&&v.analysis).sort((a,b)=>b[0].localeCompare(a[0]));

      const payload={
        range,days,
        workouts:wkSummary,
        nutrition:nutAvg,
        recovery:recAvg,
        weight:wtTrend,
        steps:stepsAvg,
        habits:habAvg,
        water:waterAvg,
        program:{name:PROG.name,week:wkn(td()),totalWeeks:PROG.weeks},
        targets:data.settings||DEFAULTS,
        bodyComp:bcEntries.length?{assessments:bcEntries.map(([d,v])=>({date:d,bfRange:v.analysis.bodyFatRange,muscleDev:v.analysis.muscleDevelopment,progress:v.analysis.areasOfProgress,focus:v.analysis.focusAreas,notes:v.analysis.notes})),count:bcEntries.length,lastPhotoDate:bcEntries[0][0],daysSincePhoto:Math.round((new Date()-new Date(bcEntries[0][0]+"T12:00:00"))/864e5)}:null,
      };

      const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const resp=await r.json();
      if(resp.error)throw new Error(resp.error);
      setResult(resp);
    }catch(e){setError(e.message||"Analysis failed. Check your connection and try again.");}
    setLoading(false);
  };

  const ScoreBar=({label,score,color})=>(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
        <span style={{color:C.t2,fontWeight:600}}>{label}</span>
        <span style={{color,fontWeight:700}}>{score}/100</span>
      </div>
      <Br v={score} max={100} color={color} h={6}/>
    </div>
  );

  const scoreColor=(s)=>s>=70?C.g:s>=45?C.a:C.r;

  return(
    <div style={{marginTop:8,borderTop:`1px solid ${C.bl}`,paddingTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:14,fontWeight:700,color:C.t}}>AI Analysis</div>
        <div style={{display:"flex",gap:3}}>
          {["7d","14d","30d"].map(r=>(
            <button key={r} onClick={()=>setRange(r)} style={{
              padding:"5px 10px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
              border:`1px solid ${range===r?C.p:C.bd}`,background:range===r?C.pl:"transparent",color:range===r?C.p:C.t3,
            }}>{r}</button>
          ))}
        </div>
      </div>

      <B full onClick={runAnalysis} disabled={loading} color={C.v} style={{marginBottom:8}}>
        {loading?"Analyzing...":"⚡ Run Analysis"}
      </B>

      {error&&<div style={{fontSize:13,color:C.r,padding:"8px 10px",background:C.rl,borderRadius:6,marginBottom:8}}>{error}</div>}

      {result&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {/* Scores */}
          {result.scores&&(
            <X style={{padding:12}}>
              <div style={{fontSize:12,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Scores — Last {range}</div>
              {result.scores.overall!=null&&<ScoreBar label="Overall" score={result.scores.overall} color={scoreColor(result.scores.overall)}/>}
              {result.scores.training!=null&&<ScoreBar label="Training" score={result.scores.training} color={scoreColor(result.scores.training)}/>}
              {result.scores.nutrition!=null&&<ScoreBar label="Nutrition" score={result.scores.nutrition} color={scoreColor(result.scores.nutrition)}/>}
              {result.scores.recovery!=null&&<ScoreBar label="Recovery" score={result.scores.recovery} color={scoreColor(result.scores.recovery)}/>}
              {result.scores.habits!=null&&<ScoreBar label="Habits" score={result.scores.habits} color={scoreColor(result.scores.habits)}/>}
            </X>
          )}

          {/* Summary */}
          {result.summary&&(
            <X style={{padding:12,borderLeft:`3px solid ${C.v}`}}>
              <div style={{fontSize:13,color:C.t,lineHeight:1.6}}>{result.summary}</div>
            </X>
          )}

          {/* Wins & Gaps */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {result.wins&&result.wins.length>0&&(
              <X style={{padding:10,borderTop:`3px solid ${C.g}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.g,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Wins</div>
                {result.wins.map((w,i)=>(
                  <div key={i} style={{fontSize:12,color:C.t2,marginBottom:4,paddingLeft:8,borderLeft:`2px solid ${C.gl}`}}>{w}</div>
                ))}
              </X>
            )}
            {result.gaps&&result.gaps.length>0&&(
              <X style={{padding:10,borderTop:`3px solid ${C.r}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.r,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Gaps</div>
                {result.gaps.map((g,i)=>(
                  <div key={i} style={{fontSize:12,color:C.t2,marginBottom:4,paddingLeft:8,borderLeft:`2px solid ${C.rl}`}}>{g}</div>
                ))}
              </X>
            )}
          </div>

          {/* Trends */}
          {result.trends&&result.trends.length>0&&(
            <X style={{padding:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Trends</div>
              {result.trends.map((t,i)=>(
                <div key={i} style={{fontSize:13,color:C.t2,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}>
                  <span style={{color:C.a,fontWeight:700,minWidth:14}}>→</span>
                  <span>{t}</span>
                </div>
              ))}
            </X>
          )}

          {/* Correlations */}
          {result.correlations&&result.correlations.length>0&&(
            <X style={{padding:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Correlations</div>
              {result.correlations.map((c,i)=>(
                <div key={i} style={{fontSize:13,color:C.t2,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}>
                  <span style={{color:C.v,fontWeight:700,minWidth:14}}>↔</span>
                  <span>{c}</span>
                </div>
              ))}
            </X>
          )}

          {/* Recommendations */}
          {result.recommendations&&result.recommendations.length>0&&(
            <X style={{padding:10,borderLeft:`3px solid ${C.p}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.p,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Recommendations</div>
              {result.recommendations.map((r,i)=>(
                <div key={i} style={{fontSize:13,color:C.t,marginBottom:6,paddingBottom:6,borderBottom:i<result.recommendations.length-1?`1px solid ${C.bl}`:"none"}}>
                  <span style={{fontWeight:700,color:C.p}}>{i+1}. </span>{r}
                </div>
              ))}
            </X>
          )}

          {/* Next Week Focus */}
          {result.nextWeekFocus&&(
            <X style={{padding:12,background:C.pl,border:`1px solid ${C.p}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.p,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Next Week Focus</div>
              <div style={{fontSize:14,color:C.t,fontWeight:600,lineHeight:1.5}}>{result.nextWeekFocus}</div>
            </X>
          )}

          {/* Body Composition */}
          {result.bodyComposition&&(
            <X style={{padding:10,borderLeft:`3px solid ${C.v}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.v,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Body Composition</div>
              {result.bodyComposition.bfTrend&&<div style={{fontSize:13,color:C.t2,marginBottom:4}}>BF% Trend: {result.bodyComposition.bfTrend}</div>}
              {result.bodyComposition.recompSignal&&<div style={{fontSize:13,color:C.t2,marginBottom:4}}>Cut Signal: {result.bodyComposition.recompSignal}</div>}
              {result.bodyComposition.muscleQuality&&<div style={{fontSize:13,color:C.t2,marginBottom:4}}>Muscle Quality: {result.bodyComposition.muscleQuality}</div>}
              {result.bodyComposition.photoReminder&&<div style={{fontSize:13,color:C.a}}>{"📸"} {result.bodyComposition.photoReminder}</div>}
            </X>
          )}
        </div>
      )}
    </div>
  );
};

const Dashboard=({data,setData,setTab})=>{
  const [showImport,setShowImport]=useState(false);
  const [showMeasForm,setShowMeasForm]=useState(false);
  const [showFullDashboard,setShowFullDashboard]=useState(false);
  const [measF,setMeasF]=useState({chest:"",waist:"",armL:"",armR:"",thighL:"",thighR:""});
  const [importText,setImportText]=useState("");
  const [importStatus,setImportStatus]=useState("");

  const doImport=()=>{
    try{
      const parsed=parseHealthImport(importText);
      const counts={wt:Object.keys(parsed.wt).length,steps:Object.keys(parsed.steps).length,
        rhr:Object.values(parsed.rec).filter(r=>r.rhr).length,sleep:Object.values(parsed.rec).filter(r=>r.sleepHours).length,
        cal:Object.keys(parsed.nut).length};
      const nd={...data,
        wt:{...parsed.wt,...data.wt},steps:{...parsed.steps,...data.steps},
        rec:Object.keys({...parsed.rec,...data.rec}).reduce((acc,k)=>{acc[k]={...(parsed.rec[k]||{}),...(data.rec[k]||{})};return acc;},{}),

  const [cardioTimerLeft,setCardioTimerLeft]=useState(0);

  const startCardioTimer=(dur)=>{const end=Date.now()+dur*60*1000;cardioEndRef.current=end;setCardioTimerLeft(dur*60);setCardioTimerRunning(true);setCardioTimerDone(false);
    cardioIvRef.current=setInterval(()=>{const left=Math.round((cardioEndRef.current-Date.now())/1000);if(left<=0){clearInterval(cardioIvRef.current);setCardioTimerLeft(0);setCardioTimerRunning(false);setCardioTimerDone(true);if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);}else{setCardioTimerLeft(left);}},500);};
  const stopCardioTimer=()=>{if(cardioIvRef.current)clearInterval(cardioIvRef.current);setCardioTimerRunning(false);setCardioTimerLeft(0);cardioEndRef.current=0;};

  const [showFinishConfirm,setShowFinishConfirm]=useState(false);
  const [showCancelConfirm,setShowCancelConfirm]=useState(false);
  const [aiQ,setAiQ]=useState("");
  const [aiA,setAiA]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiCooldown,setAiCooldown]=useState(false);
  const [aiExIdx,setAiExIdx]=useState(null);
  const [showAi,setShowAi]=useState(false);
  const [swapModal,setSwapModal]=useState(null);
  const [wuDone,setWuDone]=useState(false);
  const [activeVariant,setActiveVariant]=useState(()=>{try{return JSON.parse(localStorage.getItem("dhub6_variant"))||{};}catch{return {};}});
  const setVariant=(day,variant)=>{const nv=variant?{...activeVariant,[day]:variant}:{...activeVariant};if(!variant)delete nv[day];setActiveVariant(nv);try{localStorage.setItem("dhub6_variant",JSON.stringify(nv));}catch{}};
  const tr=useRef(null);
  const hasVariants=PROG.variants?.[sel];
  const getSess=(day,variant)=>(variant&&PROG.variants?.[day]?.[variant])||data.program[day];
  const sess=getSess(sel,activeVariant[sel]);

  const gw=(exOrId,def,slot=null)=>{
    const ex=typeof exOrId==="string"?{id:exOrId,sw:def,rr:slot?.rr}:exOrId;
    const key=progKey(ex,slot||ex);
    const p=data.prog[key]?.currentWeight;
    if(p!=null&&saneWeight(ex,p))return p;
    if(!legacyAmbiguousIds.has(ex.id)&&sameRepTrack(ex.rr,slot?.rr||ex.rr)){
      const legacy=data.prog[ex.id]?.currentWeight;
      if(legacy!=null&&saneWeight(ex,legacy))return legacy;
    }
    const dates=Object.keys(data.wk).sort().reverse();
    for(const d of dates){
      const w=data.wk[d];
      const wex=w.exercises?.find(e=>e.progKey===key||(!legacyAmbiguousIds.has(ex.id)&&e.id===ex.id));
      if(wex){const ds=wex.sets?.filter(saneSet);if(ds?.length&&saneWeight(ex,ds[0].weight))return ds[0].weight;}
    }
    return def;
  };

  const getSwapOptions=(slotEx,currentEx)=>{
    const base=exLibById[currentEx.id]||exLibById[slotEx.id]||slotEx;
    const pats=relatedPatterns[base.pattern]||[base.pattern].filter(Boolean);
    const used=new Set((workout?.exercises||[]).map(e=>e.id));
    return EXERCISE_LIBRARY
      .filter(opt=>opt.id!==currentEx.id&&pats.includes(opt.pattern))
      .map(opt=>{
        const key=progKey(opt,slotEx);
        const hasHistory=data.prog[key]?.currentWeight!=null||data.prog[opt.id]?.currentWeight!=null||Object.values(data.wk||{}).some(w=>w.exercises?.some(e=>e.progKey===key||e.id===opt.id));
        const score=(opt.pattern===base.pattern?40:20)+(opt.region===base.region?10:0)+(hasHistory?8:0)-(used.has(opt.id)?6:0);
        return {...opt,sets:slotEx.sets,rr:slotEx.rr,rest:slotEx.rest,notes:slotEx.notes,progKey:key,recommended:score>=48,score};
      })
      .sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name));
  };

  const isDeload=wkn(t)===PROG.deload;
  const startW=(day=sel)=>{const startVariant=activeVariant[day]||null;const startSess=getSess(day,startVariant);if(!startSess)return;
    setWorkout({day,variant:startVariant,exercises:startSess.exercises.map(ex=>{
      const key=progKey(ex,ex);const cw=gw(ex,ex.sw,ex);const wt=isDeload?Math.round(cw*0.5/5)*5:cw;
      return{id:ex.id,progKey:key,
      wu:WU(wt).map(w=>({...w,done:false})),
      sets:Array.from({length:ex.sets},()=>({weight:wt,reps:0,rir:"",done:false})),
    };}),start:Date.now(),isDeload});setWuDone(false);};

  const uS=(ei,si,f,v)=>setWorkout(p=>{const n=JSON.parse(JSON.stringify(p));n.exercises[ei].sets[si][f]=v;return n;});
  const dWU=(ei,wi,rest)=>{
    setWorkout(p=>{const n=JSON.parse(JSON.stringify(p));n.exercises[ei].wu[wi].done=true;return n;});
    if(rest&&rest>0){startRestTimer(Math.min(rest,60));}
  };
  const dS=(ei,si,rest)=>{
    const cur=workout?.exercises?.[ei]?.sets?.[si];
    if(!cur||Number(cur.reps)<=0){if(addToast)addToast("Enter reps before logging the set","error");return;}
    setWorkout(p=>{const n=JSON.parse(JSON.stringify(p));n.exercises[ei].sets[si].done=true;return n;});
    if(rest>0)startRestTimer(rest);
  };

  const startRestTimer=(rest)=>{
    if(tr.current)clearInterval(tr.current);
    const endTime=Date.now()+rest*1000;
    restEndRef.current=endTime;
    setRl(rest);setRt(rest);
    const tick=()=>{
      const left=Math.round((restEndRef.current-Date.now())/1000);
      if(left<=0){clearInterval(tr.current);setRt(0);setRl(0);
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }else{setRl(Math.max(0,left));}
    };
    tr.current=setInterval(tick,500);
  };

  useEffect(()=>{
    const onVis=()=>{
      if(document.visibilityState==="visible"){
        if(restEndRef.current>0){
          const left=Math.round((restEndRef.current-Date.now())/1000);
          if(left<=0){if(tr.current)clearInterval(tr.current);setRt(0);setRl(0);restEndRef.current=0;
            if(navigator.vibrate)navigator.vibrate([200,100,200]);
          }else{setRl(left);}
        }
        if(stretchEndRef.current>0){
          const left=Math.round((stretchEndRef.current-Date.now())/1000);
          if(left<=0){setStretchTimeLeft(0);}else{setStretchTimeLeft(left);}
        }
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[]);
  useEffect(()=>()=>{if(mobIvRef.current)clearInterval(mobIvRef.current);if(stretchIvRef.current)clearInterval(stretchIvRef.current);},[]);

  const finishWorkout=()=>{
    if(!workout)return;const nd={...data};
    nd.wk={...nd.wk,[t]:{day:workout.day,variant:workout.variant||null,exercises:workout.exercises,dur:Math.round((Date.now()-workout.start)/6e4)}};
    const s=getSess(workout.day,workout.variant);
    workout.exercises.forEach((ex,i)=>{const pe=s.exercises[i];if(!pe)return;
      const active=ex.swappedTo?{...ex.swappedTo,sets:pe.sets,rr:pe.rr,rest:pe.rest}:pe;
      const aid=ex.progKey||progKey(active,pe);
      const ainc=active.inc??pe.inc;
      const aname=active.name||pe.name;
      const asw=active.sw??pe.sw;
      const cs=ex.sets.filter(saneSet);
      if(!cs.length)return;
      const hit=cs.length===pe.sets&&cs.every(s=>Number(s.reps)>=pe.rr[1]);
      const cw=cs[0].weight>0?cs[0].weight:gw(active,asw,pe);
      const prevPr=(nd.prog[aid]||{}).pr;const prevHistory=(nd.prog[aid]||{}).e1rmHistory||[];
      const prevWeight=nd.prog[aid]?.currentWeight||gw(active,asw,pe);
      const shouldProgress=!CUT_HOLD_PROGRESSION&&!workout.isDeload&&hit&&ainc>0;
      const newWeight=workout.isDeload?prevWeight:(shouldProgress?cw+ainc:cw);
      nd.prog={...nd.prog,[aid]:{currentWeight:newWeight,lastReps:cs.map(s=>s.reps),lastDate:t,progressed:shouldProgress,pr:prevPr||null,e1rmHistory:prevHistory,exerciseId:active.id,repRange:pe.rr,name:aname}};
      if(!workout.isDeload){
      const bestSet=cs.reduce((best,s)=>e1rm(s.weight||0,s.reps)>e1rm(best.weight||0,best.reps)?s:best,cs[0]||{weight:0,reps:0});
      const newE1rm=e1rm(bestSet.weight||0,bestSet.reps);
      if(newE1rm>0){
        nd.prog[aid].e1rmHistory=[...prevHistory,{date:t,e1rm:newE1rm}].slice(-12);
        if(!prevPr||newE1rm>prevPr.e1rm)nd.prog[aid].pr={name:aname,weight:bestSet.weight,reps:bestSet.reps,e1rm:newE1rm,date:t};
      }
      }
    });
    nd.wk[t].volume=calcVolume(workout.exercises);
    setData(nd);sv(nd);svSB.workout(t,nd.wk[t]);workout.exercises.forEach(ex=>{const aid=ex.progKey;if(aid&&nd.prog[aid])svSB.progression(aid,nd.prog[aid]);});setWorkout(null);if(tr.current)clearInterval(tr.current);setRt(0);setRl(0);restEndRef.current=0;
    stopCardioTimer();setCardioTimerDone(false);setShowFinishConfirm(false);
