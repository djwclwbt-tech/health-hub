let syncTimer=null;
const syncToSB=async(d)=>{
  if(syncTimer)clearTimeout(syncTimer);

    try{
      for(const[date,value]of Object.entries(d.wt||{})){await sb.upsert("weight",{date,value});}

        await sb.upsert("recovery",{date,recovery_score:r.recoveryScore||null,hrv:r.hrv||null,rhr:r.rhr||null,
          respiratory_rate:r.respiratoryRate||null,sleep_hours:r.sleepHours||null,sleep_performance:r.sleepPerformance||null,
          strain:r.strain||null,wake_time:r.wakeTime||null,notes:r.notes||null});
      }
      for(const[date,h]of Object.entries(d.habits||{})){
        if(!h)continue;
        await sb.upsert("habits",{date,alcohol:h.alcohol,cannabis:h.cannabis,screens_off:h.screensOff,
          sunlight:h.sunlight,bed_by_1030:h.bedBy1030,read_before_bed:h.readBeforeBed,supplements:h.supplements});
      }
      for(const[date,w]of Object.entries(d.wk||{})){
        await sb.upsert("workouts",{date,day_name:w.day,exercises:w.exercises||[],duration_min:w.dur||null});
      }
      for(const[date,n]of Object.entries(d.nut||{})){
        await sb.upsert("nutrition",{date,meals:n.meals||[],total_cal:n.totalCal||0,total_protein:n.totalProtein||0,
          total_carbs:n.totalCarbs||0,total_fat:n.totalFat||0,total_fiber:n.totalFiber||0});
      }
      for(const[exId,p]of Object.entries(d.prog||{})){
        await sb.upsert("progression",{exercise_id:exId,current_weight:p.currentWeight,last_reps:p.lastReps||null,
          last_date:p.lastDate||null,progressed:p.progressed||false},"exercise_id");
      }
      if(d.qm&&d.qm.length>0){
        for(const q of d.qm){

      console.log("[SB] Full sync complete");
    }catch(e){console.error("[SB] Sync error:",e);}
  },2000);
};

const parseHealthImport=(text)=>{
  const d={wt:{},steps:{},rec:{},nut:{}};
  const lines=text.split("\n");
  let section="";
  for(const line of lines){
    if(line.includes("WEIGHT"))section="wt";
    else if(line.includes("STEPS"))section="steps";
    else if(line.includes("RESTING HEART RATE"))section="rhr";
    else if(line.includes("SLEEP"))section="sleep";
    else if(line.includes("CALORIES"))section="cal";
    else if(line.includes("PROTEIN"))section="pro";
    const m=line.match(/\|(\d{4}-\d{2}-\d{2})\s*\|(.+?)\|/);
    if(!m)continue;
    const date=m[1],val=m[2].replace(/,/g,"").trim();
    const num=parseFloat(val);
    if(isNaN(num))continue;
    if(section==="wt")d.wt[date]=num;
    else if(section==="steps")d.steps[date]=num;
    else if(section==="rhr"){if(!d.rec[date])d.rec[date]={};d.rec[date].rhr=num;}
    else if(section==="cal"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalCal=num;d.nut[date].meals=[{description:"MFP Import",cal:num,protein:0,carbs:0,fat:0,fiber:0,source:"import"}];
    }else if(section==="pro"){
      if(!d.nut[date])d.nut[date]={meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
      d.nut[date].totalProtein=num;if(d.nut[date].meals.length)d.nut[date].meals[0].protein=num;
    }
  }
  let inSleep=false;
  for(const line of lines){
    if(line.includes("SLEEP"))inSleep=true;
    if(line.includes("CALORIES"))inSleep=false;
    if(!inSleep)continue;
    const sm=line.match(/\|(\d{4}-\d{2}-\d{2})\s*\|.+?\|.+?\|\s*~?([\d.]+)/);
    if(sm){const date=sm[1],hrs=parseFloat(sm[2]);
      if(!d.rec[date])d.rec[date]={};d.rec[date].sleepHours=hrs;}
  }
  return d;
};

const fmtTime=(v)=>{
  const digits=v.replace(/\D/g,"");
  if(digits.length<=2)return digits;
  if(digits.length===3)return digits[0]+":"+digits.slice(1);
  if(digits.length>=4)return digits.slice(0,-2)+":"+digits.slice(-2);
  return digits;
};

const fmtElapsed=(secs)=>{
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0)return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
};

// ═══ CORRECTION & HISTORY COLLECTORS ═══
const getRecentCorrections=(data,limit=10)=>{
  const corr=[];
  const dates=Object.keys(data.nut||{}).sort().reverse();
  for(const d of dates){
    if(corr.length>=limit)break;
    for(const m of(data.nut[d]?.meals||[])){
      if(corr.length>=limit)break;
      if(m.source==="ai"&&m.aiOriginal){
        const changed=["cal","protein","carbs","fat","fiber"].some(k=>(m[k]||0)!==(m.aiOriginal[k]||0));
        if(changed)corr.push({description:m.description,raw:m.raw,aiEstimate:m.aiOriginal,
          userCorrection:{cal:m.cal,protein:m.protein,carbs:m.carbs,fat:m.fat,fiber:m.fiber}});
      }
    }
  }
  return corr;
};
const getRecentMeals=(data,limit=10)=>{

// ═══ AUTOREGULATION ═══
const getWeeklyRecoveryAvg=(rec)=>{
  const now=new Date();const entries=[];
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.toISOString().split("T")[0];
    if(rec[ds]?.recoveryScore)entries.push(rec[ds].recoveryScore);}
  return entries.length>=3?Math.round(entries.reduce((a,b)=>a+b,0)/entries.length):null;
};
const getAutoregulation=(avgRec)=>{
  if(avgRec===null)return null;
  if(avgRec>=70)return{level:"green",msg:"Full program. Push progression.",action:"All sessions + both Peloton + stairmaster."};
  if(avgRec>=55)return{level:"yellow",msg:"Recovery dipping. Drop to 1 Peloton session (weekend only).",action:"Keep all lifting. Check sleep and food first."};
  return{level:"red",msg:"Recovery low. Drop Peloton entirely. Reduce to 3 lifting sessions.",action:"Upper A, Lower A, Upper B only. Skip Lower B. Resume full when recovery > 65%."};
};
const getConsecutiveRedDays=(rec)=>{
  let count=0;const now=new Date();
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.toISOString().split("T")[0];
    if(rec[ds]?.recoveryScore&&rec[ds].recoveryScore<34)count++;else break;}
  return count;
};

// ═══ STALL DETECTION ═══
const getStalls=(prog,wk,programDays)=>{
  const days=programDays||PROG.days;
  const stalls=[];
  Object.entries(prog).forEach(([id,p])=>{
    if(!p.lastDate)return;
    const dates=Object.entries(wk).filter(([_,w])=>w.exercises?.some(e=>e.id===id)).map(([d])=>d).sort().reverse();
    if(dates.length<3)return;
    const recentDates=dates.slice(0,3);
    const allNotProgressed=recentDates.every(d=>{
      const wkEntry=wk[d];
      const ex=wkEntry?.exercises?.find(e=>e.id===id);
      if(!ex)return false;
      const pe=Object.values(days).flatMap(day=>day.exercises).find(e=>e.id===id);
      if(!pe)return false;
      const cs=ex.sets?.filter(s=>s.done)||[];
      return!(cs.length===pe.sets&&cs.every(s=>s.reps>=pe.rr[1]));
    });
    if(allNotProgressed){
      const exDef=Object.values(days).flatMap(d=>d.exercises).find(e=>e.id===id);
      stalls.push({id,name:exDef?.name||id,weeks:recentDates.length,currentWeight:p.currentWeight});
    }
  });
  return stalls;
};

// ═══ WEIGHT TREND ═══
const getWeightTrend=(wt)=>{
  const entries=Object.entries(wt).sort((a,b)=>a[0].localeCompare(b[0]));
  if(entries.length<2)return null;
  const now=new Date();const weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);
  const weekStr=weekAgo.toISOString().split("T")[0];
  const recent=entries.filter(([d])=>d>=weekStr);
  const older=entries.filter(([d])=>d<weekStr);
  if(recent.length<1||older.length<1)return null;
  const recentAvg=recent.reduce((s,[_,v])=>s+v,0)/recent.length;
  const olderLast=older[older.length-1][1];
  const weeklyRate=+(recentAvg-olderLast).toFixed(1);
  if(Math.abs(weeklyRate)>1)return{rate:weeklyRate,direction:weeklyRate>0?"gaining":"losing",
    advice:weeklyRate>0?"Pull back weekend portions slightly. You are in surplus.":"Add 200 cal to training days from carbs. You are cutting, not recomping."};
  return null;
};

const AnalysisSection=({data})=>{
  const [range,setRange]=useState("7d");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");

  const runAnalysis=async()=>{
    setLoading(true);setResult(null);setError("");
    try{
      const days=range==="7d"?7:range==="14d"?14:30;
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
      const cutStr=cutoff.toISOString().split("T")[0];

      // Summarize data within range
      const wkEntries=Object.entries(data.wk||{}).filter(([d])=>d>=cutStr);
      const nutEntries=Object.entries(data.nut||{}).filter(([d])=>d>=cutStr);
      const recEntries=Object.entries(data.rec||{}).filter(([d])=>d>=cutStr);
      const wtEntries=Object.entries(data.wt||{}).filter(([d])=>d>=cutStr).sort((a,b)=>a[0].localeCompare(b[0]));
      const stepsEntries=Object.entries(data.steps||{}).filter(([d])=>d>=cutStr);
      const habitsEntries=Object.entries(data.habits||{}).filter(([d])=>d>=cutStr);
      const waterEntries=Object.entries(data.water||{}).filter(([d])=>d>=cutStr);

      // Nutrition averages
      const nutAvg=nutEntries.length?{
        cal:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalCal||0),0)/nutEntries.length),
        protein:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalProtein||0),0)/nutEntries.length),
        carbs:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalCarbs||0),0)/nutEntries.length),
        fat:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalFat||0),0)/nutEntries.length),
        fiber:Math.round(nutEntries.reduce((s,[,n])=>s+(n.totalFiber||0),0)/nutEntries.length),
        days:nutEntries.length,
      }:null;

      // Recovery averages
      const recWithScore=recEntries.filter(([,r])=>r.recoveryScore);
      const recAvg=recWithScore.length?{
        recovery:Math.round(recWithScore.reduce((s,[,r])=>s+r.recoveryScore,0)/recWithScore.length),
        hrv:Math.round(recEntries.filter(([,r])=>r.hrv).reduce((s,[,r])=>s+r.hrv,0)/(recEntries.filter(([,r])=>r.hrv).length||1)),
        rhr:Math.round(recEntries.filter(([,r])=>r.rhr).reduce((s,[,r])=>s+r.rhr,0)/(recEntries.filter(([,r])=>r.rhr).length||1)),
        sleep:+(recEntries.filter(([,r])=>r.sleepHours).reduce((s,[,r])=>s+r.sleepHours,0)/(recEntries.filter(([,r])=>r.sleepHours).length||1)).toFixed(1),
        days:recWithScore.length,
      }:null;

      // Weight trend
      const wtTrend=wtEntries.length>=2?{
        start:wtEntries[0][1],end:wtEntries[wtEntries.length-1][1],
        change:+(wtEntries[wtEntries.length-1][1]-wtEntries[0][1]).toFixed(1),
        entries:wtEntries.length,
      }:wtEntries.length===1?{current:wtEntries[0][1],entries:1}:null;

      // Steps avg
      const stepsAvg=stepsEntries.length?Math.round(stepsEntries.reduce((s,[,v])=>s+v,0)/stepsEntries.length):null;

      // Workout summary
      const wkSummary={count:wkEntries.length,days:wkEntries.map(([d,w])=>w.day),
        progressions:Object.entries(data.prog||{}).filter(([,p])=>p.lastDate&&p.lastDate>=cutStr&&p.progressed).length};

      // Habits summary
      const habScores=habitsEntries.map(([,h])=>{if(!h)return null;
        let c=0;
        if(h.alcohol===false)c++;if(h.cannabis===false)c++;if(h.screensOff===true)c++;
        if(h.sunlight===true)c++;if(h.bedBy1030===true)c++;if(h.readBeforeBed===true)c++;if(h.supplements===true)c++;
        return c/7;}).filter(v=>v!==null);
      const habAvg=habScores.length?Math.round(habScores.reduce((a,b)=>a+b,0)/habScores.length*100):null;

      // Water avg
      const waterAvg=waterEntries.length?Math.round(waterEntries.reduce((s,[,v])=>s+v,0)/waterEntries.length):null;

      const payload={
        range,days,
        workouts:wkSummary,
        nutrition:nutAvg,
        recovery:recAvg,
        weight:wtTrend,
        steps:stepsAvg,
        habits:habAvg,
        water:waterAvg,
        program:{name:PROG.name,week:wkn(td()),totalWeeks:PROG.weeks},
        targets:data.settings||DEFAULTS,
      };

      const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const resp=await r.json();
      if(resp.error)throw new Error(resp.error);
      setResult(resp);
    }catch(e){setError(e.message||"Analysis failed. Check your connection and try again.");}
    setLoading(false);
  };

  const ScoreBar=({label,score,color})=>(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
        <span style={{color:C.t2,fontWeight:600}}>{label}</span>
        <span style={{color,fontWeight:700}}>{score}/100</span>
      </div>
      <Br v={score} max={100} color={color} h={6}/>
    </div>
  );

  const scoreColor=(s)=>s>=70?C.g:s>=45?C.a:C.r;

  return(
    <div style={{marginTop:8,borderTop:`1px solid ${C.bl}`,paddingTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:14,fontWeight:700,color:C.t}}>AI Analysis</div>
        <div style={{display:"flex",gap:3}}>
          {["7d","14d","30d"].map(r=>(
            <button key={r} onClick={()=>setRange(r)} style={{
              padding:"5px 10px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
              border:`1px solid ${range===r?C.p:C.bd}`,background:range===r?C.pl:"transparent",color:range===r?C.p:C.t3,
            }}>{r}</button>
          ))}
        </div>
      </div>

      <B full onClick={runAnalysis} disabled={loading} color={C.v} style={{marginBottom:8}}>
        {loading?"Analyzing...":"⚡ Run Analysis"}
      </B>

      {error&&<div style={{fontSize:13,color:C.r,padding:"8px 10px",background:C.rl,borderRadius:6,marginBottom:8}}>{error}</div>}

      {result&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {/* Scores */}
          {result.scores&&(
            <X style={{padding:12}}>
              <div style={{fontSize:12,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Scores — Last {range}</div>
              {result.scores.overall!=null&&<ScoreBar label="Overall" score={result.scores.overall} color={scoreColor(result.scores.overall)}/>}
              {result.scores.training!=null&&<ScoreBar label="Training" score={result.scores.training} color={scoreColor(result.scores.training)}/>}
              {result.scores.nutrition!=null&&<ScoreBar label="Nutrition" score={result.scores.nutrition} color={scoreColor(result.scores.nutrition)}/>}
              {result.scores.recovery!=null&&<ScoreBar label="Recovery" score={result.scores.recovery} color={scoreColor(result.scores.recovery)}/>}
              {result.scores.habits!=null&&<ScoreBar label="Habits" score={result.scores.habits} color={scoreColor(result.scores.habits)}/>}
            </X>
          )}

          {/* Summary */}
          {result.summary&&(
            <X style={{padding:12,borderLeft:`3px solid ${C.v}`}}>
              <div style={{fontSize:13,color:C.t,lineHeight:1.6}}>{result.summary}</div>
            </X>
          )}

          {/* Wins & Gaps */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {result.wins&&result.wins.length>0&&(
              <X style={{padding:10,borderTop:`3px solid ${C.g}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.g,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Wins</div>
                {result.wins.map((w,i)=>(
                  <div key={i} style={{fontSize:12,color:C.t2,marginBottom:4,paddingLeft:8,borderLeft:`2px solid ${C.gl}`}}>{w}</div>
                ))}
              </X>
            )}
            {result.gaps&&result.gaps.length>0&&(
              <X style={{padding:10,borderTop:`3px solid ${C.r}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.r,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Gaps</div>
                {result.gaps.map((g,i)=>(
                  <div key={i} style={{fontSize:12,color:C.t2,marginBottom:4,paddingLeft:8,borderLeft:`2px solid ${C.rl}`}}>{g}</div>
                ))}
              </X>
            )}
          </div>

          {/* Trends */}
          {result.trends&&result.trends.length>0&&(
            <X style={{padding:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Trends</div>
              {result.trends.map((t,i)=>(
                <div key={i} style={{fontSize:13,color:C.t2,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}>
                  <span style={{color:C.a,fontWeight:700,minWidth:14}}>→</span>
                  <span>{t}</span>
                </div>
              ))}
            </X>
          )}

          {/* Correlations */}
          {result.correlations&&result.correlations.length>0&&(
            <X style={{padding:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Correlations</div>
              {result.correlations.map((c,i)=>(
                <div key={i} style={{fontSize:13,color:C.t2,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}>
                  <span style={{color:C.v,fontWeight:700,minWidth:14}}>↔</span>
                  <span>{c}</span>
                </div>
              ))}
            </X>
          )}

          {/* Recommendations */}
          {result.recommendations&&result.recommendations.length>0&&(
            <X style={{padding:10,borderLeft:`3px solid ${C.p}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.p,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Recommendations</div>
              {result.recommendations.map((r,i)=>(
                <div key={i} style={{fontSize:13,color:C.t,marginBottom:6,paddingBottom:6,borderBottom:i<result.recommendations.length-1?`1px solid ${C.bl}`:"none"}}>
                  <span style={{fontWeight:700,color:C.p}}>{i+1}. </span>{r}
                </div>
              ))}
            </X>
          )}

          {/* Next Week Focus */}
          {result.nextWeekFocus&&(
            <X style={{padding:12,background:C.pl,border:`1px solid ${C.p}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.p,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Next Week Focus</div>
              <div style={{fontSize:14,color:C.t,fontWeight:600,lineHeight:1.5}}>{result.nextWeekFocus}</div>
            </X>
          )}
        </div>
      )}
    </div>
  );
};

// ═══ DASHBOARD ═══
const Dashboard=({data,setData})=>{
  const [showImport,setShowImport]=useState(false);
  const [importText,setImportText]=useState("");
  const [importStatus,setImportStatus]=useState("");

  const doImport=()=>{
    try{
      const parsed=parseHealthImport(importText);
      const counts={wt:Object.keys(parsed.wt).length,steps:Object.keys(parsed.steps).length,
        rhr:Object.values(parsed.rec).filter(r=>r.rhr).length,sleep:Object.values(parsed.rec).filter(r=>r.sleepHours).length,
        cal:Object.keys(parsed.nut).length};
      const nd={...data,
        wt:{...parsed.wt,...data.wt},steps:{...parsed.steps,...data.steps},
        rec:Object.keys({...parsed.rec,...data.rec}).reduce((acc,k)=>{acc[k]={...(parsed.rec[k]||{}),...(data.rec[k]||{})};return acc;},{}),
        nut:{...parsed.nut,...data.nut},
      };
      setData(nd);sv(nd);
      setImportStatus(`Imported: ${counts.wt} weight, ${counts.steps} steps, ${counts.rhr} RHR, ${counts.sleep} sleep, ${counts.cal} nutrition entries`);
      setImportText("");
    }catch(e){setImportStatus("Error parsing data. Make sure you pasted the full HealthKit export.");}
  };
  const t=td(),dn=dw(t),w=wkn(t);
  const sess=data.program[dn],nut=data.nut[t],rec=data.rec[t];
  const wts=Object.entries(data.wt).sort((a,b)=>b[0].localeCompare(a[0]));
  const lw=wts[0]?.[1],pw=wts[1]?.[1],wc=lw&&pw?(lw-pw).toFixed(1):null;
  const steps=data.steps?.[t]||0;
  const ws=rec?.recoveryScore;

  let streak=0;const sd=new Date();
  for(let i=0;i<60;i++){const ds=sd.toISOString().split("T")[0];const d=dw(ds);
    if(["saturday","sunday"].includes(d)){sd.setDate(sd.getDate()-1);continue;}
    if(data.wk[ds]||data.nut[ds]){streak++;sd.setDate(sd.getDate()-1);}else break;}

  const st=data.settings||DEFAULTS;
  const calT=getDayCalTarget(t,st),proT=getDayProTarget(t,st);
  const tCal=nut?.totalCal||0,tPro=nut?.totalProtein||0,tFib=nut?.totalFiber||0;
  const dayType=getDayType(t);
  const weeklyRecAvg=getWeeklyRecoveryAvg(data.rec);
  const autoreg=getAutoregulation(weeklyRecAvg);
  const redDays=getConsecutiveRedDays(data.rec);
  const fatPct=tCal>0?Math.round(((nut?.totalFat||0)*9/tCal)*100):0;
  const weightTrend=getWeightTrend(data.wt);
  const stalls=getStalls(data.prog,data.wk,data.program);

  const wCh=wts.slice(0,30).reverse().map(([d,v])=>({v,d:d.slice(5)}));
  const recCh=Object.entries(data.rec).filter(([_,v])=>v.recoveryScore).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30).map(([d,v])=>({v:v.recoveryScore,d:d.slice(5)}));
  const rhrCh=Object.entries(data.rec).filter(([_,v])=>v.rhr).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30).map(([d,v])=>({v:v.rhr,d:d.slice(5)}));
  const stCh=Object.entries(data.steps||{}).filter(([_,v])=>v>0).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30).map(([d,v])=>({v,d:d.slice(5)}));
  const slCh=Object.entries(data.rec).filter(([_,v])=>v.sleepHours).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30).map(([d,v])=>({v:v.sleepHours,d:d.slice(5)}));
  const lifts=Object.values(data.prog).filter(p=>p.progressed).length;
  const totalL=Object.keys(data.prog).length;

  const habitDays=Object.entries(data.habits||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
  const habitScore=habitDays.length?Math.round(habitDays.reduce((s,[_,h])=>{
    if(!h)return s;let c=0;
    if(h.alcohol===false)c++;if(h.cannabis===false)c++;if(h.screensOff===true)c++;
    if(h.sunlight===true)c++;if(h.bedBy1030===true)c++;if(h.readBeforeBed===true)c++;if(h.supplements===true)c++;
    return s+c/7;},0)/habitDays.length*100):null;

  const dks=["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div>
        <div style={{fontSize:18,fontWeight:700,color:C.t}}>Home</div>
        <div style={{fontSize:13,color:C.t3}}>{fmt(t)} — Wk {w}/{PROG.weeks}{w===PROG.deload?" — DELOAD":""}</div>
      </div>

      <X style={{borderLeft:`3px solid ${C.p}`,padding:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:C.p,textTransform:"uppercase",letterSpacing:"0.06em"}}>Today</div>
            <div style={{fontSize:16,fontWeight:700,color:C.t,marginTop:1}}>{sess?sess.name:"Rest Day"}</div>
            {sess&&<div style={{fontSize:13,color:C.t2}}>{sess.focus} — {sess.exercises.length} ex{sess.stepper?` — ${sess.stepper}m stepper`:""}</div>}
          </div>
          {data.wk[t]?<span style={{fontSize:13,fontWeight:600,color:C.g}}>Complete</span>
           :sess?<span style={{fontSize:13,fontWeight:600,color:C.p}}>Ready</span>:null}
        </div>
      </X>

      {/* ═══ AUTOREGULATION CARD ═══ */}
      {autoreg&&(<X style={{padding:10,borderLeft:`3px solid ${autoreg.level==="green"?C.g:autoreg.level==="yellow"?C.a:C.r}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:700,color:autoreg.level==="green"?C.g:autoreg.level==="yellow"?C.a:C.r,textTransform:"uppercase",letterSpacing:"0.06em"}}>
            Recovery Gate {weeklyRecAvg!=null?`— ${weeklyRecAvg}% avg`:""}
          </div>
        </div>
        <div style={{fontSize:13,fontWeight:600,color:C.t}}>{autoreg.msg}</div>
        <div style={{fontSize:12,color:C.t2,marginTop:2}}>{autoreg.action}</div>
        {redDays>=2&&<div style={{fontSize:12,color:C.r,fontWeight:700,marginTop:4}}>⚠ {redDays} consecutive red days — take a rest day. Shift the split forward.</div>}
      </X>)}

      {/* ═══ WEIGHT TREND ALERT ═══ */}
      {weightTrend&&(<X style={{padding:10,borderLeft:`3px solid ${C.a}`}}>
        <div style={{fontSize:11,fontWeight:700,color:C.a,textTransform:"uppercase",letterSpacing:"0.06em"}}>Weight Alert — {weightTrend.direction} {Math.abs(weightTrend.rate)} lbs/wk</div>
        <div style={{fontSize:12,color:C.t2,marginTop:2}}>{weightTrend.advice}</div>
      </X>)}

      {/* ═══ STALL WARNINGS ═══ */}
      {stalls.length>0&&(<X style={{padding:10,borderLeft:`3px solid ${C.a}`}}>
        <div style={{fontSize:11,fontWeight:700,color:C.a,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Stalled Lifts</div>
        {stalls.map(s=>(<div key={s.id} style={{fontSize:12,color:C.t2,marginBottom:2}}>
          <span style={{fontWeight:600,color:C.t}}>{s.name}</span> @ {s.currentWeight} lbs — {weeklyRecAvg>=65?
            "Recovery is green. Swap for a variation and reset progression.":
            "Recovery is low. Focus on recovery first."}
        </div>))}
      </X>)}

      {/* ═══ DAY TYPE INDICATOR ═══ */}
      <X style={{padding:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase"}}>{dayType==="monday"?"Monday (Light)":dayType==="training"?"Training Day":"Weekend"}</div>
        <div style={{fontSize:12,color:C.t2}}>{calT} cal · {proT}g protein target</div>
      </X>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        <X style={{padding:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
            <span style={{fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase"}}>Weight</span>
            <span style={{fontSize:18,fontWeight:700,color:C.t}}>{lw?lw.toFixed(1):"—"}</span>
          </div>
          {wc&&<div style={{fontSize:11,fontWeight:600,color:wc<0?C.g:C.r,marginBottom:4}}>{wc>0?"+":""}{wc} lbs</div>}
          {wCh.length>=2?(
            <svg viewBox={`0 0 ${wCh.length*20} 28`} style={{width:"100%",height:28}} preserveAspectRatio="none">
              {(()=>{const vals=wCh.map(d=>d.v),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
                const pts=wCh.map((d,i)=>[i*(wCh.length*20/(wCh.length-1)),28-4-((d.v-mn)/rng)*20]);
                const line=pts.map(p=>p.join(",")).join(" ");
                return <polyline points={line} fill="none" stroke={C.p} strokeWidth="2" strokeLinecap="round"/>;
              })()}
            </svg>
          ):<div style={{fontSize:12,color:C.t3,textAlign:"center",padding:"4px 0"}}>No data yet</div>}
        </X>

        <X style={{padding:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
            <span style={{fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase"}}>Steps</span>
            <span style={{fontSize:18,fontWeight:700,color:C.t}}>{steps?steps.toLocaleString():"—"}</span>
          </div>
          <Br v={steps} max={st.steps||10000} color={steps>=(st.steps||10000)?C.g:C.a} h={6}/>
          <div style={{fontSize:10,color:C.t3,marginTop:3,textAlign:"right"}}>{steps?Math.round(steps/(st.steps||10000)*100):0}% of {((st.steps||10000)/1000).toFixed(0)}k</div>
        </X>
      </div>

      {(()=>{const wt=data.water?.[t]||0;const waterG=st.water||128;return(
      <X style={{padding:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <span style={{fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase"}}>Water</span>
          <span style={{fontSize:16,fontWeight:700,color:wt>=waterG?C.g:C.p}}>{wt} <span style={{fontSize:12,color:C.t3,fontWeight:500}}>/ {waterG} oz</span></span>
        </div>
        <Br v={wt} max={waterG} color={wt>=waterG?C.g:C.p} h={6}/>
      </X>);})()}

      <X style={{padding:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:13,fontWeight:700,color:C.t}}>Nutrition</span>
          <span style={{fontSize:12,color:C.t3}}>{fmt(t)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
          <div style={{fontSize:28,fontWeight:700,color:tCal>calT?C.a:C.p}}>{tCal}</div>
          <div style={{fontSize:14,color:C.t3}}>/ {calT} cal</div>
        </div>
        <Br v={tCal} max={calT} color={tCal>calT?C.a:C.p} h={8}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginTop:10}}>
          {[{l:"Protein",v:tPro,x:proT,u:"g",c:tPro>=proT?C.g:C.r},
            {l:"Carbs",v:nut?.totalCarbs||0,x:null,u:"g",c:C.a},
            {l:"Fat",v:nut?.totalFat||0,x:null,u:"g",c:fatPct>25?C.r:C.t2},
            {l:"Fiber",v:tFib,x:st.fiber||30,u:"g",c:C.v}].map((m,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:m.c}}>{m.v}{m.u}</div>
              {m.x?<div style={{fontSize:10,color:C.t3}}>/ {m.x}{m.u}</div>:<div style={{fontSize:10,color:C.t3}}>&nbsp;</div>}
              <div style={{fontSize:10,fontWeight:600,color:C.t3,textTransform:"uppercase",marginTop:2}}>{m.l}</div>
              {m.x&&<Br v={m.v} max={m.x} color={m.c} h={4}/>}
            </div>
          ))}
        </div>
        {fatPct>25&&tCal>0&&(<div style={{marginTop:6,padding:"6px 8px",background:C.rl,borderRadius:4,fontSize:11,color:C.r,fontWeight:600}}>
          Fat at {fatPct}% of calories (target: 20-25%). Check cooking oil, cheese, sauces.
        </div>)}
        {dayType==="training"&&tPro>0&&tPro<100&&(<div style={{marginTop:4,padding:"6px 8px",background:C.al,borderRadius:4,fontSize:11,color:C.a,fontWeight:600}}>
          Protein checkpoint: {tPro}g so far — load remaining meals heavier on lean protein.
        </div>)}
      </X>

      {/* ═══ PROTEIN CHECKPOINTS ═══ */}
      {dayType==="training"&&(<X style={{padding:10}}>
        <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Protein Checkpoints</div>
        {PROTEIN_CHECKPOINTS.map((cp,i)=>{
          const hit=tPro>=cp.target;
          return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderTop:i>0?`1px solid ${C.bl}`:"none"}}>
            <span style={{fontSize:14,color:hit?C.g:C.t3}}>{hit?"✓":"○"}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:hit?C.g:C.t}}>{cp.label}</div>
              <div style={{fontSize:10,color:C.t3}}>{cp.time} · {cp.target}g</div>
            </div>
            <Br v={Math.min(tPro,cp.target)} max={cp.target} color={hit?C.g:C.a} h={4}/>
          </div>);
        })}
      </X>)}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        <X style={{padding:8,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:700,color:ws>=67?C.g:ws>=34?C.a:ws!=null?C.r:C.t3}}>{ws??"-"}{ws!=null?"%":""}</div>
          <div style={{fontSize:10,fontWeight:600,color:C.t3,textTransform:"uppercase"}}>Recovery</div>
        </X>
        <X style={{padding:8,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:700,color:streak>=5?C.g:C.a}}>{streak}<span style={{fontSize:12,fontWeight:600}}>d</span></div>
          <div style={{fontSize:10,fontWeight:600,color:C.t3,textTransform:"uppercase"}}>Streak</div>
        </X>
      </div>

      {habitScore!=null&&(
        <X style={{padding:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}>
            <span style={{fontWeight:600,color:C.t2}}>Habit Score (7d)</span>
            <span style={{fontWeight:700,color:habitScore>=70?C.g:habitScore>=40?C.a:C.r}}>{habitScore}%</span>
          </div>
          <Br v={habitScore} max={100} color={habitScore>=70?C.g:habitScore>=40?C.a:C.r}/>
        </X>
      )}

      <S title="Trends" collapsible defaultOpen={false}>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <Ch data={wCh} color={C.p} label="Weight" yUnit=" lbs" empty="Log weight to see trend"/>
          <Ch data={recCh} color={C.g} label="Recovery" yUnit="%" empty="Log recovery to see trend"/>
          <Ch data={rhrCh} color={C.v} label="RHR" yUnit=" bpm" empty="Log RHR to see trend"/>
          <Ch data={stCh} color={C.a} label="Steps" empty="Log steps to see trend"/>
          <Ch data={slCh} color={C.p} label="Sleep" yUnit=" hrs" empty="Log sleep to see trend"/>
        </div>
      </S>

      {totalL>0&&(
        <X style={{padding:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
            <span style={{color:C.t2,fontWeight:600}}>Lift Progressions</span>
            <span style={{color:C.g,fontWeight:700}}>{lifts}/{totalL}</span>
          </div>
          <Br v={lifts} max={totalL} color={C.g}/>
        </X>
      )}

      <div style={{display:"flex",gap:3}}>
        {dks.map((dk,i)=>{
          const isToday=dk===dn,done=Object.keys(data.wk).some(ws=>dw(ws)===dk&&wkn(ws)===w);
          return(<div key={dk} style={{flex:1,borderRadius:4,padding:"6px 2px",textAlign:"center",
            background:isToday?C.pl:C.cd,border:`1px solid ${done?C.g:isToday?C.p:C.bd}`}}>
            <div style={{fontSize:11,fontWeight:700,color:isToday?C.p:C.t2}}>{["M","T","W","T","F","S","S"][i]}</div>
            {done&&<div style={{width:6,height:6,borderRadius:3,background:C.g,margin:"2px auto 0"}}/>}
          </div>);
        })}
      </div>

      {/* ═══ AI ANALYSIS ═══ */}
      <AnalysisSection data={data}/>

      <div style={{marginTop:4,borderTop:`1px solid ${C.bl}`,paddingTop:8}}>
        <button onClick={()=>setShowImport(!showImport)} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600}}>
          {showImport?"Hide Import":"Import Health Data"}
        </button>
        {showImport&&(
          <div style={{marginTop:8}}>
            <div style={{fontSize:12,color:C.t2,marginBottom:6}}>
              Paste HealthKit export from Claude iOS (markdown table format). Existing data won't be overwritten.
            </div>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)}
              placeholder="Paste HealthKit data export here..."
              style={{width:"100%",minHeight:80,background:"#fff",border:`1px solid ${C.bd}`,borderRadius:6,
                padding:10,color:C.t,fontSize:13,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
            <B full onClick={doImport} disabled={!importText.trim()} style={{marginTop:4}}>Import Data</B>
            {importStatus&&<div style={{fontSize:12,color:importStatus.startsWith("Error")?C.r:C.g,marginTop:6,fontWeight:600}}>{importStatus}</div>}
            <button onClick={()=>{if(confirm("This will erase ALL data. Are you sure?")){const nd=bl();setData(nd);sv(nd);}}}
              style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:11,fontFamily:"inherit",marginTop:12,opacity:0.6}}>
              Reset All Data
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

// ═══ TRAINING ═══
const Training=({data,setData,workout,setWorkout,setTab,addToast})=>{
  const t=td(),dn=dw(t);
  const [sel,setSel]=useState(dn);
  const [rl,setRl]=useState(0);
  const [rt,setRt]=useState(0);
  const restEndRef=useRef(0);
  const [showMob,setShowMob]=useState(false);
  const mobEntry=data.mob?.[t];
  const [mobDone,setMobDone]=useState(mobEntry===true||!!mobEntry?.done);
  const [mobRunning,setMobRunning]=useState(false);
  const [mobTimer,setMobTimer]=useState(0);
  const mobStartRef=useRef(null);
  const mobIvRef=useRef(null);
  const [stpDone,setStpDone]=useState(!!data.stp?.[t]);
  const [showFinishConfirm,setShowFinishConfirm]=useState(false);
  const [showCancelConfirm,setShowCancelConfirm]=useState(false);
  const [aiQ,setAiQ]=useState("");
  const [aiA,setAiA]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiCooldown,setAiCooldown]=useState(false);
  const [aiExIdx,setAiExIdx]=useState(null);
  const [showAi,setShowAi]=useState(false);
  const [wuDone,setWuDone]=useState(false);
  const tr=useRef(null);
  const sess=data.program[sel];

  const gw=(id,def)=>data.prog[id]?.currentWeight??def;

  const isDeload=wkn(t)===PROG.deload;
  const startW=()=>{if(!sess)return;
    setWorkout({day:sel,exercises:sess.exercises.map(ex=>{
      const cw=gw(ex.id,ex.sw);const wt=isDeload?Math.round(cw*0.5/5)*5:cw;
      return{id:ex.id,
      wu:isDeload?[]:WU(wt).map(w=>({...w,done:false})),
      sets:Array.from({length:ex.sets},()=>({weight:wt,reps:0,rir:"",done:false})),
    };}),start:Date.now(),isDeload});setWuDone(false);};

  const uS=(ei,si,f,v)=>setWorkout(p=>{const n=JSON.parse(JSON.stringify(p));n.exercises[ei].sets[si][f]=v;return n;});
  const dWU=(ei,wi,rest)=>{
    setWorkout(p=>{const n=JSON.parse(JSON.stringify(p));n.exercises[ei].wu[wi].done=true;return n;});
    if(rest&&rest>0){startRestTimer(Math.min(rest,60));}
  };
  const dS=(ei,si,rest)=>{
    setWorkout(p=>{const n=JSON.parse(JSON.stringify(p));n.exercises[ei].sets[si].done=true;return n;});
    if(rest>0)startRestTimer(rest);
  };

  const startRestTimer=(rest)=>{
    if(tr.current)clearInterval(tr.current);
    const endTime=Date.now()+rest*1000;
    restEndRef.current=endTime;
    setRl(rest);setRt(rest);
    const tick=()=>{
      const left=Math.round((restEndRef.current-Date.now())/1000);
      if(left<=0){clearInterval(tr.current);setRt(0);setRl(0);
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }else{setRl(left);}
    };
    tr.current=setInterval(tick,500);
  };

  useEffect(()=>{
    const onVis=()=>{
      if(document.visibilityState==="visible"&&restEndRef.current>0){
        const left=Math.round((restEndRef.current-Date.now())/1000);
        if(left<=0){if(tr.current)clearInterval(tr.current);setRt(0);setRl(0);restEndRef.current=0;
          if(navigator.vibrate)navigator.vibrate([200,100,200]);
        }else{setRl(left);}
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[]);
  useEffect(()=>()=>{if(mobIvRef.current)clearInterval(mobIvRef.current);},[]);

  const finishWorkout=()=>{
    if(!workout)return;const nd={...data};
    nd.wk={...nd.wk,[t]:{day:workout.day,exercises:workout.exercises,dur:Math.round((Date.now()-workout.start)/6e4)}};
    const s=data.program[workout.day];
    workout.exercises.forEach((ex,i)=>{const pe=s.exercises[i];if(!pe||pe.inc===0)return;
      const cs=ex.sets.filter(s=>s.done);const hit=cs.length===pe.sets&&cs.every(s=>s.reps>=pe.rr[1]);
      const cw=gw(pe.id,pe.sw);
      nd.prog={...nd.prog,[pe.id]:{currentWeight:hit?cw+pe.inc:cw,lastReps:cs.map(s=>s.reps),lastDate:t,progressed:hit}};
    });
    setData(nd);sv(nd);setWorkout(null);if(tr.current)clearInterval(tr.current);setRt(0);setRl(0);restEndRef.current=0;
    setShowFinishConfirm(false);
  };

  const cancelWorkout=()=>{
    setWorkout(null);if(tr.current)clearInterval(tr.current);setRt(0);setRl(0);restEndRef.current=0;
    setShowCancelConfirm(false);
  };

  const logStp=()=>{const nd={...data,stp:{...data.stp,[t]:true}};setData(nd);sv(nd);setStpDone(true);};
  const startMob=()=>{mobStartRef.current=Date.now();setMobRunning(true);setMobTimer(0);setShowMob(true);
    mobIvRef.current=setInterval(()=>{setMobTimer(Math.floor((Date.now()-mobStartRef.current)/1000));},1000);};
  const finishMob=()=>{if(mobIvRef.current)clearInterval(mobIvRef.current);
    const dur=Math.floor((Date.now()-mobStartRef.current)/1000);
    const nd={...data,mob:{...data.mob,[t]:{done:true,dur}}};setData(nd);sv(nd);
    setMobDone(true);setMobRunning(false);setShowMob(false);svSB.mobility(t,dur);};
  const logCardio=(type,dur)=>{const nd={...data,cardio:{...data.cardio,[t]:{type,duration:dur,done:true}}};setData(nd);sv(nd);};

  const applyCoachActions=(actions)=>{
    if(!actions||!actions.length)return;
    const nd=JSON.parse(JSON.stringify(data));
    actions.forEach(c=>{
      try{
        if(c.type==="settings"&&c.field){
          nd.settings={...nd.settings,[c.field]:c.value};
          if(addToast)addToast(`${c.field}: updated to ${c.value}`,"success");
        }else if(c.type==="exercise"&&c.action==="update"&&c.exerciseId){
          for(const day of Object.values(nd.program)){
            const ex=day.exercises?.find(e=>e.id===c.exerciseId);
            if(ex&&c.fields){Object.assign(ex,c.fields);if(addToast)addToast(`Updated ${ex.name}`,"success");}
          }
        }else if(c.type==="exercise"&&c.action==="swap"&&c.oldExerciseId&&c.newExercise){
          for(const day of Object.values(nd.program)){
            const idx=day.exercises?.findIndex(e=>e.id===c.oldExerciseId);
            if(idx>=0){const old=day.exercises[idx].name;day.exercises[idx]=c.newExercise;if(addToast)addToast(`Swapped ${old} → ${c.newExercise.name}`,"success");}
          }
        }
      }catch(e){console.error("[coach] Failed to apply action:",e);}
    });
    setData(nd);sv(nd);
  };

  const askCoach=async(q,exIdx)=>{
    if(!q.trim()||aiLoading||aiCooldown)return;
    setAiLoading(true);setAiA("");
    const ex=workout&&exIdx!=null?data.program[workout.day]?.exercises[exIdx]:null;
    const cw=ex?gw(ex.id,ex.sw):null;
    try{
      const r=await fetch("/api/coach",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({question:q,exercise:ex?.name||"",weight:cw||0,
          reps:ex?ex.rr.join("-"):"",sets:ex?.sets||0,focus:data.program[workout?.day]?.focus||""})});
      const d=await r.json();
      setAiA(d.answer||d.error||"No response");
      if(d.actions&&d.actions.length)applyCoachActions(d.actions);
    }catch(e){setAiA("Error connecting to coach");}
    setAiLoading(false);setAiCooldown(true);
    setTimeout(()=>setAiCooldown(false),10000);
  };

  const dks=["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
  const [viewW,setViewW]=useState(null);
  const allWk=Object.entries(data.wk).sort((a,b)=>b[0].localeCompare(a[0]));
  const now=new Date();
  const [calMonth,setCalMonth]=useState(now.getMonth());
  const [calYear,setCalYear]=useState(now.getFullYear());

  if(workout){
    const s=data.program[workout.day];
    return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
      {showFinishConfirm&&<ConfirmModal title="Finish Workout?" message="This will log your workout and save all set data." onConfirm={finishWorkout} onCancel={()=>setShowFinishConfirm(false)} confirmText="Finish" confirmColor={C.g}/>}
      {showCancelConfirm&&<ConfirmModal title="Cancel Workout?" message="This will discard all data from this session. Nothing will be logged." onConfirm={cancelWorkout} onCancel={()=>setShowCancelConfirm(false)} confirmText="Discard" confirmColor={C.r}/>}

      <WorkoutTimerBar workout={workout} compact/>

      {workout.isDeload&&(<div style={{background:C.al,padding:"8px 12px",borderRadius:6,marginBottom:4}}>
        <div style={{fontSize:13,fontWeight:700,color:C.a}}>DELOAD WEEK — All weights at 50%. Keep reps the same. Focus on form.</div>
      </div>)}

      {rt>0&&(<div style={{position:"sticky",top:0,zIndex:50,background:rl<=0?C.g:C.p,padding:"10px 14px",borderRadius:6,textAlign:"center",transition:"background 0.3s"}}>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>{rl<=0?"Done! Go!":"Rest"}</div>
        <div style={{fontSize:36,fontWeight:700,color:"#fff",fontVariantNumeric:"tabular-nums"}}>{rl<=0?"0:00":`${Math.floor(rl/60)}:${String(rl%60).padStart(2,"0")}`}</div>
        <button onClick={()=>{if(tr.current)clearInterval(tr.current);setRt(0);setRl(0);restEndRef.current=0;}} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",padding:"4px 16px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginTop:4}}>{rl<=0?"Dismiss":"Skip"}</button>
      </div>)}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:C.t}}>{s.name}</div>
          <div style={{fontSize:13,color:C.t3}}>{s.focus}</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <B small outline onClick={()=>setShowCancelConfirm(true)} color={C.r}>Cancel</B>
          <B small onClick={()=>setShowFinishConfirm(true)} color={C.g}>Finish</B>
        </div>
      </div>

      {s.warmup&&!wuDone&&(<X style={{padding:10,borderLeft:`3px solid ${C.v}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:14,fontWeight:700,color:C.t}}>Warm-Up</div>
          <B small onClick={()=>setWuDone(true)} color={C.g}>Done</B>
        </div>
        <div style={{fontSize:13,fontWeight:600,color:C.p,marginBottom:s.warmup.moves.length?6:0}}>{s.warmup.cardio}</div>
        {s.warmup.note&&<div style={{fontSize:12,color:C.t2,marginBottom:4}}>{s.warmup.note}</div>}
        {s.warmup.moves.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderTop:i>0?`1px solid ${C.bl}`:"none"}}>
            <span style={{fontSize:13,fontWeight:600,color:C.t}}>{m.name}</span>
            <span style={{fontSize:12,color:C.t3}}>{m.rx}</span>
          </div>
        ))}
        {s.warmup.ramp&&<div style={{fontSize:12,color:C.v,fontWeight:600,marginTop:4}}>{s.warmup.ramp}</div>}
      </X>)}
      {s.warmup&&wuDone&&(<X style={{padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",opacity:0.6}}>
        <span style={{fontSize:13,fontWeight:600,color:C.t}}>Warm-Up</span>
        <span style={{fontSize:13,fontWeight:600,color:C.g}}>Done ✓</span>
      </X>)}

      {s.exercises.map((ex,ei)=>{
        const wuSets=workout.exercises[ei].wu;
        return(<X key={ex.id} style={{padding:10}}>
          <div style={{marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:C.t}}>{ex.name}</div>
                <div style={{fontSize:12,color:C.t3}}>{ex.sets}×{ex.rr.join("-")} — Rest {ex.rest}s — <span style={{color:C.v,fontWeight:600}}>1-2 RIR</span></div>
                <div style={{fontSize:12,color:C.p,marginTop:2}}>{ex.cue}</div>
                {workout.isDeload&&<div style={{fontSize:11,color:C.a,fontWeight:600,marginTop:2}}>DELOAD — 50% weight, same reps</div>}
              </div>
              <button onClick={()=>{setShowAi(true);setAiExIdx(ei);setAiQ("");setAiA("");}}
                style={{background:C.vl,border:"none",borderRadius:12,padding:"4px 8px",fontSize:10,fontWeight:600,color:C.v,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",marginLeft:6}}>AI</button>
            </div>
          </div>
          {wuSets.length>0&&(<div style={{marginBottom:6,paddingBottom:6,borderBottom:`1px solid ${C.bl}`}}>
            <div style={{fontSize:10,fontWeight:600,color:C.t3,textTransform:"uppercase",marginBottom:3}}>Warm-up</div>
            {wuSets.map((wu,wi)=>(<div key={wi} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",opacity:wu.done?0.3:0.7,fontSize:14}}>
              <span style={{color:C.t3,width:32}}>{wu.l}</span>
              <span style={{color:C.t2,flex:1}}>{wu.w} × {wu.r}</span>
              {!wu.done?<B small outline onClick={()=>dWU(ei,wi,ex.rest)} color={C.t3}>✓</B>:<span style={{color:C.g,fontSize:16}}>✓</span>}
            </div>))}
          </div>)}
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"2px 0",fontSize:10,color:C.t3,fontWeight:600}}>
            <span style={{width:18}}>#</span><span style={{width:68,textAlign:"center"}}>LBS</span><span style={{width:13}}></span><span style={{width:56,textAlign:"center"}}>REPS</span><span style={{width:42,textAlign:"center"}}>RIR</span><span style={{width:44}}></span>
          </div>
          {workout.exercises[ei].sets.map((s,si)=>(<div key={si} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",
            borderTop:si>0?`1px solid ${C.bl}`:"none",opacity:s.done?0.35:1}}>
            <span style={{fontSize:12,color:C.t3,width:18,fontWeight:600}}>{si+1}</span>
            <N value={s.weight||""} onChange={v=>uS(ei,si,"weight",Number(v))} placeholder="lbs" style={{width:68,fontSize:16}}/>
            <span style={{color:C.t3,fontSize:13}}>×</span>
            <N value={s.reps||""} onChange={v=>uS(ei,si,"reps",Number(v))} placeholder="reps" style={{width:56,fontSize:16}}/>
            <N value={s.rir} onChange={v=>uS(ei,si,"rir",v)} placeholder="RIR" max={5} style={{width:42,fontSize:14,color:C.v}}/>
            {!s.done?<B small onClick={()=>dS(ei,si,ex.rest)}>Log</B>:<span style={{color:C.g,fontSize:16}}>✓</span>}
          </div>))}
        </X>);
      })}

      {s.stepper&&(<X style={{padding:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:14,fontWeight:600,color:C.t}}>{workout.day==="monday"?"Stairmaster":"Stairstepper"}</div><div style={{fontSize:12,color:C.t3}}>{s.stepper} min — Zone 2</div></div>
        {stpDone?<span style={{fontSize:13,fontWeight:600,color:C.g}}>Done</span>:<B small onClick={logStp}>Complete</B>}
      </X>)}

      <X style={{padding:10,borderLeft:`3px solid ${C.v}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showAi?8:0}}>
          <div style={{fontSize:13,fontWeight:700,color:C.v}}>AI Coach</div>
          <button onClick={()=>{setShowAi(!showAi);setAiA("");}} style={{background:"none",border:"none",color:C.v,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>{showAi?"Hide":"Ask"}</button>
        </div>
        {showAi&&(<div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
            {[{l:"Substitute?",q:"What's a good substitute for this exercise with the equipment I have?"},{l:"Drop weight?",q:"Should I drop weight on this? I'm struggling with form."},
              {l:"Form check",q:"Give me the top form cue for this exercise."},{l:"Deload?",q:"My reps are dropping. Should I deload or push through?"}
            ].map((p,i)=>(
              <button key={i} onClick={()=>{setAiQ(p.q);setAiExIdx(null);askCoach(p.q,null);}} disabled={aiLoading||aiCooldown}
                style={{padding:"6px 10px",borderRadius:12,fontSize:12,fontWeight:600,cursor:aiLoading||aiCooldown?"not-allowed":"pointer",
                  background:C.vl,border:"none",color:C.v,fontFamily:"inherit",opacity:aiLoading||aiCooldown?0.4:1}}>{p.l}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:4}}>
            <input type="text" value={aiQ} onChange={e=>setAiQ(e.target.value)} placeholder="Ask about an exercise..."
              onKeyDown={e=>{if(e.key==="Enter")askCoach(aiQ,aiExIdx);}}
              style={{flex:1,background:"#fff",border:`1px solid ${C.bd}`,borderRadius:6,padding:"8px 10px",fontSize:14,color:C.t,fontFamily:"inherit",outline:"none"}}/>
            <B small onClick={()=>askCoach(aiQ,aiExIdx)} disabled={aiLoading||aiCooldown||!aiQ.trim()} color={C.v}>
              {aiLoading?"...":"Ask"}
            </B>
          </div>
          {aiCooldown&&!aiLoading&&<div style={{fontSize:10,color:C.t3,marginTop:4}}>Cooldown — wait a few seconds</div>}
          {aiA&&(<div style={{marginTop:8,padding:10,background:C.vl,borderRadius:6,fontSize:13,color:C.t,lineHeight:1.5}}>{aiA}</div>)}
        </div>)}
      </X>
    </div>);
  }

  const calDays=()=>{
    const first=new Date(calYear,calMonth,1);
    const last=new Date(calYear,calMonth+1,0);
    const startPad=first.getDay();
    const days=[];
    for(let i=0;i<startPad;i++)days.push(null);
    for(let d=1;d<=last.getDate();d++)days.push(d);
    return days;
  };
  const calKey=(d)=>`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  if(viewW){
    const [vDate,vData]=viewW;
    const vSess=data.program[vData.day];
    return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
      <button onClick={()=>setViewW(null)} style={{background:"none",border:"none",color:C.p,cursor:"pointer",fontSize:14,fontWeight:600,textAlign:"left",padding:0}}>← Back</button>
      <X style={{borderLeft:`3px solid ${C.g}`}}>
        <div style={{fontSize:17,fontWeight:700,color:C.t}}>{vSess?.name||vData.day}</div>
        <div style={{fontSize:13,color:C.t2}}>{fmt(vDate)} — {vData.dur||"?"}min</div>
      </X>
      {vData.exercises?.map((ex,ei)=>{
        const pe=vSess?.exercises[ei];
        return(<X key={ei} style={{padding:10}}>
          <div style={{fontSize:15,fontWeight:700,color:C.t,marginBottom:4}}>{pe?.name||ex.id}</div>
          {ex.sets?.map((s,si)=>(
            <div key={si} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderTop:si>0?`1px solid ${C.bl}`:"none",fontSize:14}}>
              <span style={{fontSize:12,color:C.t3,width:18,fontWeight:600}}>{si+1}</span>
              <span style={{fontWeight:600,color:C.t}}>{s.weight||"BW"}</span>
              <span style={{color:C.t3}}>×</span>
              <span style={{fontWeight:600,color:s.reps>=((pe?.rr||[])[1]||999)?C.g:C.t}}>{s.reps}</span>
              {s.rir!=null&&s.rir!==""&&<span style={{fontSize:11,color:C.v,fontWeight:600,marginLeft:4}}>RIR {s.rir}</span>}
              {s.done?<span style={{color:C.g,marginLeft:"auto"}}>✓</span>:<span style={{color:C.r,marginLeft:"auto",fontSize:12}}>skipped</span>}
            </div>
          ))}
        </X>);
      })}
    </div>);
  }

  return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div style={{fontSize:17,fontWeight:700,color:C.t}}>Training</div>

    <div style={{display:"flex",gap:3}}>
      {dks.map(dk=>(<button key={dk} onClick={()=>setSel(dk)} style={{flex:1,padding:"8px 2px",borderRadius:4,
        border:`1px solid ${sel===dk?C.p:C.bd}`,background:sel===dk?C.pl:"transparent",color:sel===dk?C.p:C.t3,
        fontSize:11,cursor:"pointer",fontWeight:700,textTransform:"uppercase",fontFamily:"inherit"}}>{dk.slice(0,3)}</button>))}
    </div>

    <X style={{padding:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:14,fontWeight:600,color:C.t}}>Evening Stretch</div><div style={{fontSize:12,color:C.t3}}>{mobRunning?fmtElapsed(mobTimer):"~10 min — hip & spine recovery"}</div></div>
      {mobDone?<span style={{fontSize:13,fontWeight:600,color:C.g}}>Done{(()=>{const d=data.mob?.[t];return d&&typeof d==="object"&&d.dur?` · ${fmtElapsed(d.dur)}`:""})()}</span>
        :mobRunning?<B small color={C.g} onClick={finishMob}>Done</B>
        :<div style={{display:"flex",gap:6}}>{!showMob&&<B small outline onClick={()=>setShowMob(true)}>View</B>}<B small onClick={startMob}>Start</B></div>}
    </X>
    {(showMob||mobRunning)&&!mobDone&&(<X style={{background:C.bg,padding:10}}>
      {PROG.mobility.map((m,i)=>(<div key={i} style={{padding:"6px 0",borderBottom:i<PROG.mobility.length-1?`1px solid ${C.bl}`:"none"}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:14,fontWeight:600,color:C.t}}>{m.name}</span><span style={{fontSize:12,color:C.t3}}>{m.dur}</span></div>
        <div style={{fontSize:12,color:C.p,marginTop:1}}>{m.cue}</div>
      </div>))}
      {!mobRunning&&<B full small outline style={{marginTop:8}} onClick={()=>setShowMob(false)}>Hide</B>}
    </X>)}

    {/* ═══ DELOAD BANNER ═══ */}
    {isDeload&&(<X style={{padding:10,background:C.al,border:`1px solid ${C.a}`}}>
      <div style={{fontSize:13,fontWeight:700,color:C.a}}>DELOAD WEEK {PROG.deload}</div>
      <div style={{fontSize:12,color:C.t2}}>All weights cut to 50%. Keep reps the same. Resume full weight next week.</div>
    </X>)}

    {/* ═══ STALL WARNINGS ═══ */}
    {(()=>{const stalls=getStalls(data.prog,data.wk,data.program);const weekAvg=getWeeklyRecoveryAvg(data.rec);
      return stalls.length>0?(<X style={{padding:10,borderLeft:`3px solid ${C.a}`}}>
        <div style={{fontSize:11,fontWeight:700,color:C.a,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Stalled Lifts (3+ sessions)</div>
        {stalls.map(s=>(<div key={s.id} style={{fontSize:12,color:C.t2,marginBottom:3}}>
          <span style={{fontWeight:600,color:C.t}}>{s.name}</span> @ {s.currentWeight} lbs — {weekAvg&&weekAvg>=65?
            <span style={{color:C.g}}>Recovery green — swap for a variation</span>:
            <span style={{color:C.a}}>Fix recovery first</span>}
        </div>))}
      </X>):null;})()}

    {/* ═══ PELOTON / CARDIO ═══ */}
    {(()=>{const dayName=dw(t);const isWeekend=["saturday","sunday"].includes(dayName);
      const cardioToday=data.cardio?.[t];
      if(!isWeekend)return null;
      return(<X style={{padding:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:14,fontWeight:600,color:C.t}}>Peloton (Zone 2)</div><div style={{fontSize:12,color:C.t3}}>30-45 min steady state</div></div>
        {cardioToday?.done?<span style={{fontSize:13,fontWeight:600,color:C.g}}>Done</span>
          :<B small onClick={()=>logCardio("peloton",35)}>Complete</B>}
      </X>);
    })()}

    {sess?(<>
      <X style={{borderLeft:`3px solid ${C.p}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:16,fontWeight:700,color:C.t}}>{sess.name}</div>
            <div style={{fontSize:13,color:C.t2}}>{sess.focus} — {sess.exercises.length} ex{sess.stepper?` — ${sess.stepper}m ${sel==="monday"?"stairmaster":"stepper"}`:""}</div></div>
          {data.wk[t]&&sel===dn?<span style={{fontSize:13,fontWeight:600,color:C.g}}>Done</span>:<B onClick={startW}>Start</B>}
        </div>
      </X>
      {sess.warmup&&(<S title="Warm-Up" collapsible>
        <X style={{padding:10}}>
          <div style={{fontSize:13,fontWeight:600,color:C.p,marginBottom:sess.warmup.moves.length?6:0}}>{sess.warmup.cardio}</div>
          {sess.warmup.note&&<div style={{fontSize:12,color:C.t2,marginBottom:4}}>{sess.warmup.note}</div>}
          {sess.warmup.moves.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderTop:i>0?`1px solid ${C.bl}`:"none"}}>
              <span style={{fontSize:13,fontWeight:600,color:C.t}}>{m.name}</span>
              <span style={{fontSize:12,color:C.t3}}>{m.rx}</span>
            </div>
          ))}
          {sess.warmup.ramp&&<div style={{fontSize:12,color:C.v,fontWeight:600,marginTop:4}}>{sess.warmup.ramp}</div>}
        </X>
      </S>)}
      <S title="Exercises" collapsible>
        {sess.exercises.map(ex=>{const prog=data.prog[ex.id],cw=gw(ex.id,ex.sw);
          return(<X key={ex.id} style={{padding:10,marginBottom:3}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:C.t}}>{ex.name}</div>
                <div style={{fontSize:12,color:C.t3}}>{ex.sets}×{ex.rr.join("-")} — Rest {ex.rest}s</div>
                <div style={{fontSize:12,color:C.p,marginTop:1}}>{ex.cue}</div>
              </div>
              <div style={{textAlign:"right",minWidth:48}}>
                <div style={{fontSize:20,fontWeight:700,color:C.p}}>{cw>0?cw:"BW"}</div>
                <div style={{fontSize:10,color:C.t3}}>{ex.unit}</div>
                {prog?.lastReps&&<div style={{fontSize:10,color:prog.progressed?C.g:C.t3,fontWeight:600}}>{prog.lastReps.join("/")}{prog.progressed?" ↑":""}</div>}
              </div>
            </div>
          </X>);})}
      </S>
    </>):<X><div style={{textAlign:"center",color:C.t3,padding:14,fontSize:14}}>Rest Day</div></X>}

    <X style={{padding:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(calYear-1);}else setCalMonth(calMonth-1);}}
          style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"4px 8px"}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:C.t}}>{monthNames[calMonth]} {calYear}</span>
        <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(calYear+1);}else setCalMonth(calMonth+1);}}
          style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"4px 8px"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
        {["S","M","T","W","T","F","S"].map((d,i)=>(
          <div key={i} style={{fontSize:10,fontWeight:700,color:C.t3,padding:"2px 0"}}>{d}</div>
        ))}
        {calDays().map((d,i)=>{
          if(!d)return <div key={`e${i}`}/>;
          const dk=calKey(d);
          const isToday=dk===t;
          const hasWorkout=!!data.wk[dk];
          const dayName=dw(dk);
          const isRestDay=["saturday","sunday"].includes(dayName);
          return(
            <div key={dk} onClick={hasWorkout?()=>setViewW([dk,data.wk[dk]]):undefined}
              style={{padding:"4px 2px",borderRadius:4,cursor:hasWorkout?"pointer":"default",
                background:isToday?C.pl:hasWorkout?C.gl:"transparent",
                border:isToday?`1px solid ${C.p}`:"1px solid transparent",
                position:"relative",minHeight:28,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:12,fontWeight:isToday?700:400,color:isRestDay?C.t3:C.t}}>{d}</span>
              {hasWorkout&&<div style={{width:5,height:5,borderRadius:3,background:C.g,marginTop:1}}/>}
            </div>
          );
        })}
      </div>
    </X>

    <S title={`Workout History (${allWk.length})`} collapsible>
      {allWk.length===0?<div style={{color:C.t3,fontSize:13,padding:8,textAlign:"center"}}>No workouts logged yet</div>
      :allWk.slice(0,15).map(([d,w])=>{
        const wSess=data.program[w.day];
        const totalSets=w.exercises?w.exercises.reduce((s,e)=>s+(e.sets?.filter(s=>s.done).length||0),0):0;
        return(
          <X key={d} onClick={()=>setViewW([d,w])} style={{padding:10,marginBottom:3,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:C.t}}>{wSess?.name||w.day}</div>
                <div style={{fontSize:12,color:C.t2}}>{fmt(d)} — {w.dur||"?"}min — {totalSets} sets</div>
              </div>
              <span style={{color:C.t3,fontSize:13}}>→</span>
            </div>
          </X>
        );
      })}
    </S>
  </div>);
};

// ═══ NUTRITION ═══
const MEAL_TYPES=["Breakfast","Lunch","Dinner","Snack"];

const Nutrition=({data,setData})=>{
  const t=td(),dn=dw(t);
  const [mode,setMode]=useState("ai");
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [selM,setSelM]=useState(null);
  const [mf,setMf]=useState({d:"",cal:"",pro:"",carb:"",fat:"",fib:""});
  const [mealType,setMealType]=useState("Lunch");

  const [viewDate,setViewDate]=useState(t);
  const viewNut=data.nut[viewDate]||{meals:[],totalCal:0,totalProtein:0,totalCarbs:0,totalFat:0,totalFiber:0};
  const tl=viewDate===t?viewNut:viewNut;
  const isViewingToday=viewDate===t;
  const st=data.settings||DEFAULTS;
  const calT=getDayCalTarget(viewDate,st),proT=getDayProTarget(viewDate,st);
  const viewDayType=getDayType(viewDate);
  const viewFatPct=tl.totalCal>0?Math.round(((tl.totalFat||0)*9/tl.totalCal)*100):0;
  const waterToday=data.water?.[t]||0;
  const waterGoal=st.water||128;
  const navDate=(dir)=>{const d=new Date(viewDate+"T12:00:00");d.setDate(d.getDate()+dir);const ds=d.toISOString().split("T")[0];if(ds<=t)setViewDate(ds);};

  const rc=ms=>({meals:ms,totalCal:ms.reduce((s,m)=>s+(m.cal||0),0),totalProtein:ms.reduce((s,m)=>s+(m.protein||0),0),
    totalCarbs:ms.reduce((s,m)=>s+(m.carbs||0),0),totalFat:ms.reduce((s,m)=>s+(m.fat||0),0),totalFiber:ms.reduce((s,m)=>s+(m.fiber||0),0)});
  const add=m=>{const ml={...m,mealType};if(ml.source==="ai"){ml.aiOriginal={cal:ml.cal,protein:ml.protein,carbs:ml.carbs,fat:ml.fat,fiber:ml.fiber};}const nl=rc([...tl.meals,ml]);const nd={...data,nut:{...data.nut,[viewDate]:nl}};setData(nd);sv(nd);};
  const rm=i=>{const nl=rc(tl.meals.filter((_,j)=>j!==i));const nd={...data,nut:{...data.nut,[viewDate]:nl}};setData(nd);sv(nd);setSelM(null);};
  const sq=m=>{const nd={...data,qm:[...(data.qm||[]),m]};setData(nd);sv(nd);};
  const addWater=(oz)=>{const nd={...data,water:{...data.water,[t]:(data.water?.[t]||0)+oz}};setData(nd);sv(nd);};
  const resetWater=()=>{const nd={...data,water:{...data.water,[t]:0}};setData(nd);sv(nd);};

  const [photo,setPhoto]=useState(null);
  const [photoPreview,setPhotoPreview]=useState(null);
  const [portionSize,setPortionSize]=useState("normal");
  const fileRef=useRef(null);
  const galRef=useRef(null);

  const handlePhoto=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setPhotoPreview(URL.createObjectURL(file));
    const reader=new FileReader();
    reader.onload=()=>{const b64=reader.result.split(",")[1];setPhoto({data:b64,mediaType:file.type});};
    reader.readAsDataURL(file);
  };
  const clearPhoto=()=>{setPhoto(null);setPhotoPreview(null);if(fileRef.current)fileRef.current.value="";if(galRef.current)galRef.current.value="";};

  const aiGo=async()=>{if(!input.trim()&&!photo)return;setLoading(true);
    const portionHint=portionSize!=="normal"?` (${portionSize} portion)`:"";
    const fullInput=input?(input+portionHint):null;
    try{const body={context:{calories:st.calories||2430,protein:st.protein||180,
      corrections:getRecentCorrections(data,10),recentMeals:getRecentMeals(data,10)}};
      if(fullInput)body.input=fullInput;
      if(photo)body.image=photo;
      const r=await fetch("/api/estimate",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body)});
      const parsed=await r.json();
      if(parsed.error){throw new Error(parsed.error);}
      add({...parsed,source:"ai",raw:input||"Photo estimate",components:parsed.components||[],confidence:parsed.confidence,notes:parsed.notes});setInput("");clearPhoto();
    }catch(e){console.error(e);add({description:input||"Photo estimate",cal:0,protein:0,carbs:0,fat:0,fiber:0,source:"manual",raw:input,components:[]});setInput("");clearPhoto();}
    setLoading(false);};

  const [editing,setEditing]=useState(null);
  const updateMeal=(idx,updates)=>{
    const newMeals=tl.meals.map((m,i)=>i===idx?{...m,...updates}:m);
    const nl=rc(newMeals);const nd={...data,nut:{...data.nut,[viewDate]:nl}};setData(nd);sv(nd);
  };

  if(selM!==null){
    const meal=tl.meals[selM];if(!meal){setSelM(null);return null;}
    const mt=(meal.protein||0)*4+(meal.carbs||0)*4+(meal.fat||0)*9;
    const pp=mt?Math.round(((meal.protein||0)*4/mt)*100):0,cp=mt?Math.round(((meal.carbs||0)*4/mt)*100):0,fp=100-pp-cp;
    const confColor=meal.confidence==="high"?C.g:meal.confidence==="low"?C.a:C.t3;
    return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
      <button onClick={()=>{setSelM(null);setEditing(null);}} style={{background:"none",border:"none",color:C.p,cursor:"pointer",fontSize:14,fontWeight:600,textAlign:"left",padding:0}}>← Back</button>
      <X><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:C.t}}>{meal.description}</div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {meal.confidence&&<span style={{fontSize:9,fontWeight:700,color:confColor,background:meal.confidence==="high"?C.gl:meal.confidence==="low"?C.al:"transparent",padding:"2px 6px",borderRadius:8,textTransform:"uppercase"}}>{meal.confidence}</span>}
            {meal.mealType&&<span style={{fontSize:11,fontWeight:600,color:C.p,background:C.pl,padding:"2px 8px",borderRadius:10}}>{meal.mealType}</span>}
          </div>
        </div>
        {meal.raw&&<div style={{fontSize:12,color:C.t3,marginTop:1}}>{meal.raw}</div>}
        {meal.notes&&<div style={{fontSize:11,color:C.a,marginTop:2,fontStyle:"italic"}}>{meal.notes}</div>}
        {meal.aiOriginal&&["cal","protein","carbs","fat"].some(k=>(meal[k]||0)!==(meal.aiOriginal[k]||0))&&
          <div style={{fontSize:10,color:C.v,marginTop:3}}>Corrected from AI estimate ({meal.aiOriginal.cal} cal → {meal.cal} cal) — improves future estimates</div>}
        {editing==="macros"?(<div style={{margin:"8px 0"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:3}}>
            {[{k:"cal",l:"Cal"},{k:"protein",l:"Pro"},{k:"carbs",l:"Carb"},{k:"fat",l:"Fat"},{k:"fiber",l:"Fib"}].map(f=>(
              <div key={f.k}><N value={meal[f.k]||0} onChange={v=>updateMeal(selM,{[f.k]:+v||0})} placeholder={f.l}/><div style={{fontSize:9,color:C.t3,textAlign:"center",fontWeight:600,marginTop:2}}>{f.l}</div></div>))}
          </div>
          <B full small style={{marginTop:6}} onClick={()=>setEditing(null)}>Done</B>
        </div>):(<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:3,textAlign:"center",margin:"10px 0"}}>
            {[{l:"Cal",v:meal.cal,c:C.p},{l:"Pro",v:`${meal.protein}g`,c:C.g},{l:"Carb",v:`${meal.carbs}g`,c:C.a},
              {l:"Fat",v:`${meal.fat}g`,c:C.r},{l:"Fib",v:`${meal.fiber||0}g`,c:C.v}].map((m,i)=>(
              <div key={i}><div style={{fontSize:17,fontWeight:700,color:m.c}}>{m.v}</div><div style={{fontSize:9,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>{m.l}</div></div>))}
          </div>
          <button onClick={()=>setEditing("macros")} style={{background:"none",border:`1px dashed ${C.bd}`,borderRadius:4,padding:"4px 10px",color:C.t2,fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"inherit",width:"100%"}}>Edit Macros</button>
        </div>)}
        <div style={{display:"flex",height:6,borderRadius:3,overflow:"hidden",marginTop:6,marginBottom:2}}>
          <div style={{width:`${pp}%`,background:C.g}}/><div style={{width:`${cp}%`,background:C.a}}/><div style={{width:`${fp}%`,background:C.r}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.t3}}><span>P {pp}%</span><span>C {cp}%</span><span>F {fp}%</span></div>
      </X>
      {meal.components?.length>0&&(<X><L>Components</L>
        {meal.components.map((c,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:i?`1px solid ${C.bl}`:"none",fontSize:13}}>
          <span style={{fontWeight:600,color:C.t}}>{c.item}</span>
          <span style={{color:C.t2,fontSize:12}}>{c.cal} · {c.protein}P · {c.carbs}C · {c.fat}F{c.fiber?` · ${c.fiber}Fib`:""}</span>
        </div>))}</X>)}
      <div style={{display:"flex",gap:6}}>
        {meal.source==="ai"&&!data.qm?.find(q=>q.description===meal.description)&&<B full outline onClick={()=>sq(meal)} color={C.a}>Save Quick</B>}

      </div>
    </div>);

  const grouped={};
  MEAL_TYPES.forEach(mt=>{grouped[mt]=[];});
  tl.meals.forEach((m,i)=>{const mt=m.mealType||"Snack";if(!grouped[mt])grouped[mt]=[];grouped[mt].push({...m,_idx:i});});

  return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:17,fontWeight:700,color:C.t}}>Food</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>navDate(-1)} style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"4px 8px"}}>‹</button>
        <span style={{fontSize:13,fontWeight:600,color:isViewingToday?C.p:C.t2,minWidth:80,textAlign:"center"}}>{isViewingToday?"Today":fmt(viewDate)}</span>
        <button onClick={()=>navDate(1)} disabled={isViewingToday} style={{background:"none",border:"none",color:isViewingToday?C.bd:C.t2,cursor:isViewingToday?"default":"pointer",fontSize:18,padding:"4px 8px"}}>›</button>
      </div>
    </div>

    <X style={{padding:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
        <div style={{fontSize:26,fontWeight:700,color:tl.totalCal>calT?C.a:C.p}}>{tl.totalCal}</div>
        <div style={{fontSize:13,color:C.t3}}>/ {calT} cal</div>
      </div>
      <Br v={tl.totalCal} max={calT} color={tl.totalCal>calT?C.a:C.p} h={7}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginTop:10}}>
        {[{l:"Protein",v:tl.totalProtein,x:proT,u:"g",c:tl.totalProtein>=proT?C.g:C.r},
          {l:"Carbs",v:tl.totalCarbs,x:null,u:"g",c:C.a},
          {l:"Fat",v:tl.totalFat,x:null,u:"g",c:viewFatPct>25?C.r:C.t2},
          {l:"Fiber",v:tl.totalFiber||0,x:st.fiber||30,u:"g",c:C.v}].map((m,i)=>(
          <div key={i} style={{textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,color:m.c}}>{m.v}{m.u}</div>
            {m.x?<div style={{fontSize:10,color:C.t3}}>/ {m.x}{m.u}</div>:<div style={{fontSize:10,color:C.t3}}>&nbsp;</div>}
            <div style={{fontSize:9,fontWeight:600,color:C.t3,textTransform:"uppercase",marginTop:1}}>{m.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.t3,marginTop:4}}>
        <span style={{fontWeight:600,color:C.t2}}>{viewDayType==="monday"?"Monday (Light)":viewDayType==="training"?"Training Day":"Weekend"}</span>
        <span>{calT} cal · {proT}g pro target</span>
      </div>
      {viewFatPct>25&&tl.totalCal>0&&(<div style={{marginTop:6,padding:"6px 8px",background:C.rl,borderRadius:4,fontSize:11,color:C.r,fontWeight:600}}>
        Fat at {viewFatPct}% of calories (target: 20-25%). Watch cooking oil, cheese, and sauces.
      </div>)}
    </X>

    {/* ═══ PROTEIN CHECKPOINTS ═══ */}
    {viewDayType==="training"&&isViewingToday&&(<X style={{padding:10}}>
      <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Protein Checkpoints</div>
      {PROTEIN_CHECKPOINTS.map((cp,i)=>{
        const hit=tl.totalProtein>=cp.target;
        return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderTop:i>0?`1px solid ${C.bl}`:"none"}}>
          <span style={{fontSize:14,color:hit?C.g:C.t3}}>{hit?"✓":"○"}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:hit?C.g:C.t}}>{cp.label}</div>
            <div style={{fontSize:10,color:C.t3}}>{cp.time} · {cp.target}g</div>
          </div>
          <div style={{width:60}}><Br v={Math.min(tl.totalProtein,cp.target)} max={cp.target} color={hit?C.g:C.a} h={4}/></div>
        </div>);
      })}
      {tl.totalProtein>0&&tl.totalProtein<100&&(<div style={{marginTop:6,padding:"6px 8px",background:C.al,borderRadius:4,fontSize:11,color:C.a,fontWeight:600}}>
        3 PM gut-check: {tl.totalProtein}g protein — load remaining meals with lean protein + carbs, minimal fat.
      </div>)}
    </X>)}

    <X style={{padding:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div>
          <span style={{fontSize:13,fontWeight:700,color:C.t}}>Water </span>
          <span style={{fontSize:18,fontWeight:700,color:waterToday>=waterGoal?C.g:C.p}}>{waterToday}</span>
          <span style={{fontSize:13,color:C.t3}}> / {waterGoal} oz</span>
        </div>

      </div>
      <Br v={waterToday} max={waterGoal} color={waterToday>=waterGoal?C.g:C.p} h={8}/>
      <div style={{display:"flex",gap:6,marginTop:8}}>
        {[12,24,36].map(oz=>(

            flex:1,padding:"10px 4px",borderRadius:6,fontSize:15,fontWeight:700,cursor:"pointer",
            background:C.pl,border:`1px solid ${C.p}`,color:C.p,fontFamily:"inherit",minHeight:44,
          }}>+{oz}oz</button>

          border:`1px solid ${mealType===mt?C.p:C.bd}`,background:mealType===mt?C.pl:"transparent",color:mealType===mt?C.p:C.t3,
        }}>{mt}</button>

    <div style={{display:"flex",gap:3}}>
      {[["ai","AI Estimate"],["manual","Manual"],["quick","Quick Add"]].map(([m,l])=>(<button key={m} onClick={()=>setMode(m)} style={{
        flex:1,padding:"8px",borderRadius:4,border:`1px solid ${mode===m?C.p:C.bd}`,background:mode===m?C.pl:"transparent",
        color:mode===m?C.p:C.t3,fontSize:12,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>{l}</button>))}
    </div>
    {mode==="ai"&&(<X style={{padding:10}}>
      <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder={`Describe your ${mealType.toLowerCase()}... (include portions for best accuracy)`}
        style={{width:"100%",minHeight:48,background:C.bg,border:`1px solid ${C.bd}`,borderRadius:4,padding:10,color:C.t,fontSize:14,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
      <input ref={galRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
      <div style={{display:"flex",gap:4,marginTop:6,alignItems:"center"}}>
        <button onClick={()=>fileRef.current?.click()} style={{padding:"8px 12px",borderRadius:4,border:`1px solid ${C.bd}`,background:photo?C.gl:C.bg,color:photo?C.g:C.t2,fontSize:13,cursor:"pointer",fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap"}}>
          📷 Camera
        </button>
        <button onClick={()=>galRef.current?.click()} style={{padding:"8px 12px",borderRadius:4,border:`1px solid ${C.bd}`,background:photo?C.gl:C.bg,color:photo?C.g:C.t2,fontSize:13,cursor:"pointer",fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap"}}>
          🖼 Gallery
        </button>
        {photo&&<button onClick={clearPhoto} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>✕</button>}
        <div style={{display:"flex",gap:2,flex:1}}>
          {["small","normal","large"].map(s=>(<button key={s} onClick={()=>setPortionSize(s)} style={{
            flex:1,padding:"7px 2px",borderRadius:3,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize",
            border:`1px solid ${portionSize===s?C.p:C.bd}`,background:portionSize===s?C.pl:"transparent",color:portionSize===s?C.p:C.t3,
          }}>{s}</button>))}
