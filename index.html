      </div>
      {photoPreview&&<div style={{marginTop:6,position:"relative"}}><img src={photoPreview} alt="Food" style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:4}}/></div>}
      <B full onClick={aiGo} disabled={loading||(!input.trim()&&!photo)} style={{marginTop:6}}>{loading?"Estimating...":"Estimate"}</B>
    </X>)}
    {mode==="manual"&&(<X style={{padding:10}}>
      <T value={mf.d} onChange={v=>setMf({...mf,d:v})} placeholder="What did you eat?" style={{marginBottom:6}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:3}}>
        <N value={mf.cal} onChange={v=>setMf({...mf,cal:v})} placeholder="Cal"/>
        <N value={mf.pro} onChange={v=>setMf({...mf,pro:v})} placeholder="Pro"/>
        <N value={mf.carb} onChange={v=>setMf({...mf,carb:v})} placeholder="Carb"/>
        <N value={mf.fat} onChange={v=>setMf({...mf,fat:v})} placeholder="Fat"/>
        <N value={mf.fib} onChange={v=>setMf({...mf,fib:v})} placeholder="Fib"/>
      </div>
      <B full style={{marginTop:6}} onClick={()=>{add({description:mf.d,cal:+mf.cal,protein:+mf.pro,carbs:+mf.carb,fat:+mf.fat,fiber:+mf.fib,source:"manual",components:[]});
        setMf({d:"",cal:"",pro:"",carb:"",fat:"",fib:""});}}>Add</B>
    </X>)}
    {mode==="quick"&&(<X style={{padding:10}}>
      {(data.qm||[]).length===0?<div style={{color:C.t3,fontSize:13,padding:8,textAlign:"center"}}>No saved meals</div>
      :(data.qm||[]).map((q,i)=>(<button key={i} onClick={()=>add({...q,source:"quick"})} style={{display:"flex",justifyContent:"space-between",
        alignItems:"center",width:"100%",background:C.bg,border:`1px solid ${C.bd}`,borderRadius:4,padding:"10px 12px",cursor:"pointer",
        marginBottom:3,textAlign:"left",fontFamily:"inherit",color:C.t,fontSize:14}}>
        <span style={{fontWeight:600}}>{q.description}</span><span style={{color:C.t3,fontSize:12}}>{q.cal} · {q.protein}gP</span></button>))}
    </X>)}

    {MEAL_TYPES.map(mt=>{
      const meals=grouped[mt];
      if(meals.length===0)return null;
      const mtCal=meals.reduce((s,m)=>s+(m.cal||0),0);
      return(
        <S key={mt} title={`${mt} (${meals.length}) — ${mtCal} cal`}>
          {meals.map((m)=>(<X key={m._idx} onClick={()=>setSelM(m._idx)} style={{padding:10,marginBottom:3,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:14,fontWeight:600,color:C.t}}>{m.description}</div>
                <div style={{fontSize:12,color:C.t2,marginTop:1}}>{m.cal} · {m.protein}gP · {m.carbs}gC · {m.fat}gF{m.fiber?` · ${m.fiber}gFib`:""}</div></div>
              <span style={{color:C.t3,fontSize:13}}>→</span>
            </div>
          </X>))}
        </S>
      );
    })}
    {tl.meals.length===0&&<div style={{color:C.t3,fontSize:13,padding:12,textAlign:"center"}}>No meals logged today</div>}
  </div>);
};

// ═══ WEIGHT ═══
const Weight=({data,setData})=>{
  const [nw,setNw]=useState("");const t=td();
  const entries=Object.entries(data.wt).sort((a,b)=>b[0].localeCompare(a[0]));
  const latest=entries[0]?.[1],oldest=entries[entries.length-1]?.[1];
  const tc=latest&&oldest?(latest-oldest).toFixed(1):null;
  const ch=entries.slice(0,14).reverse().map(([d,v])=>({v,d:d.slice(5)}));
  const wTrend=getWeightTrend(data.wt);
  const add=()=>{if(!nw)return;const nd={...data,wt:{...data.wt,[t]:Number(nw)}};setData(nd);sv(nd);setNw("");};
  return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{fontSize:17,fontWeight:700,color:C.t}}>Scale</div>
    {wTrend&&(<X style={{padding:10,borderLeft:`3px solid ${C.a}`}}>
      <div style={{fontSize:11,fontWeight:700,color:C.a,textTransform:"uppercase",letterSpacing:"0.06em"}}>
        {wTrend.direction==="gaining"?"Gaining":"Losing"} {Math.abs(wTrend.rate)} lbs/week
      </div>
      <div style={{fontSize:12,color:C.t2,marginTop:2}}>{wTrend.advice}</div>
    </X>)}
    <X style={{borderLeft:`3px solid ${C.p}`}}><L>Log — {fmt(t)}</L>
      <div style={{display:"flex",gap:6,marginTop:4}}><N value={nw} onChange={setNw} placeholder="185.0" style={{flex:1,fontSize:18}}/><B onClick={add}>Log</B></div>
      {data.wt[t]&&<div style={{fontSize:13,color:C.g,marginTop:4,fontWeight:600}}>Today: {data.wt[t]} lbs</div>}
    </X>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
      <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:C.t}}>{latest?latest.toFixed(1):"—"}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Current</div></X>
      <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:tc&&tc<0?C.g:C.a}}>{tc?`${tc>0?"+":""}${tc}`:"—"}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Total</div></X>
      <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:19,fontWeight:700,color:C.v}}>{entries.length}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Entries</div></X>
    </div>
    <Ch data={ch} color={C.p} label="Trend" yUnit=" lbs" empty="Log weight to see trend"/>
    <S title="History" collapsible>
      {entries.slice(0,20).map(([d,w],i)=>{const prev=entries[i+1]?.[1];const diff=prev?(w-prev).toFixed(1):null;
        return(<div key={d} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.bl}`,fontSize:14}}>
          <span style={{color:C.t2}}>{fmt(d)}</span>
          <span style={{fontWeight:600,color:C.t}}>{w.toFixed(1)} {diff&&<span style={{color:diff>0?C.r:C.g,fontSize:12}}>{diff>0?"+":""}{diff}</span>}</span>
        </div>);})}
    </S>
  </div>);
};

// ═══ RECOVERY ═══
const Recovery=({data,setData})=>{
  const t=td(),tr=data.rec[t]||{};
  const hasSaved=!!(tr.recoveryScore||tr.hrv||tr.rhr);
  const [editing,setEditing]=useState(!hasSaved);
  const [f,setF]=useState({rs:tr.recoveryScore||"",hrv:tr.hrv||"",rhr:tr.rhr||"",rr:tr.respiratoryRate||"",sh:tr.sleepHours||"",sp:tr.sleepPerformance||"",str:tr.strain||"",n:tr.notes||"",steps:data.steps?.[t]||""});
  const sc=s=>s>=67?C.g:s>=34?C.a:C.r;
  const saveR=()=>{const nd={...data,rec:{...data.rec,[t]:{recoveryScore:+f.rs,hrv:+f.hrv,rhr:+f.rhr,respiratoryRate:+f.rr,sleepHours:+f.sh,sleepPerformance:+f.sp,strain:+f.str,notes:f.n}},
    steps:{...data.steps,[t]:+f.steps}};setData(nd);sv(nd);setEditing(false);};
  const recent=Object.entries(data.rec).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
  const avgR=recent.filter(e=>e[1].recoveryScore).length?Math.round(recent.filter(e=>e[1].recoveryScore).reduce((s,e)=>s+e[1].recoveryScore,0)/recent.filter(e=>e[1].recoveryScore).length):null;
  const recCh=recent.filter(e=>e[1].recoveryScore).reverse().map(([d,v])=>({v:v.recoveryScore,d:d.slice(5)}));
  const hrvCh=recent.filter(e=>e[1].hrv).reverse().map(([d,v])=>({v:v.hrv,d:d.slice(5)}));

  return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div style={{fontSize:17,fontWeight:700,color:C.t}}>Whoop Recovery</div>
    <X style={{borderLeft:`3px solid ${C.p}`,opacity:editing?1:0.6}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <L>Log — {fmt(t)}</L>
        {!editing&&hasSaved&&<button onClick={()=>setEditing(true)} style={{background:C.pl,border:`1px solid ${C.p}`,borderRadius:4,padding:"4px 10px",fontSize:11,fontWeight:700,color:C.p,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>}
      </div>
      {!editing&&hasSaved?(
        <div style={{marginTop:6}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:4}}>
            {f.rs&&<div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:sc(+f.rs)}}>{f.rs}%</div><div style={{fontSize:10,color:C.t3}}>Recovery</div></div>}
            {f.hrv&&<div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:C.v}}>{f.hrv}</div><div style={{fontSize:10,color:C.t3}}>HRV</div></div>}
            {f.rhr&&<div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:C.p}}>{f.rhr}</div><div style={{fontSize:10,color:C.t3}}>RHR</div></div>}
          </div>
          <div style={{fontSize:12,color:C.g,marginTop:6,fontWeight:600,textAlign:"center"}}>Saved for today</div>
        </div>
      ):(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:4}}>
            <div><L>Recovery %</L><N value={f.rs} onChange={v=>setF({...f,rs:v})} placeholder="72" max={100}/></div>
            <div><L>HRV</L><N value={f.hrv} onChange={v=>setF({...f,hrv:v})} placeholder="68"/></div>
            <div><L>RHR</L><N value={f.rhr} onChange={v=>setF({...f,rhr:v})} placeholder="42"/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:6}}>
            <div><L>Resp Rate</L><N value={f.rr} onChange={v=>setF({...f,rr:v})} placeholder="15.2"/></div>
            <div><L>Sleep Hrs</L><N value={f.sh} onChange={v=>setF({...f,sh:v})} placeholder="7.5"/></div>
            <div><L>Sleep %</L><N value={f.sp} onChange={v=>setF({...f,sp:v})} placeholder="85" max={100}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
            <div><L>Strain</L><N value={f.str} onChange={v=>setF({...f,str:v})} placeholder="12.4"/></div>
            <div><L>Steps</L><N value={f.steps} onChange={v=>setF({...f,steps:v})} placeholder="8500"/></div>
          </div>
          <div style={{marginTop:6}}><L>Notes</L><T value={f.n} onChange={v=>setF({...f,n:v})} placeholder="Optional"/></div>
          <B full style={{marginTop:8}} onClick={saveR}>Save</B>
        </div>
      )}
    </X>
    {avgR!=null&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
      <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:sc(avgR)}}>{avgR}%</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Avg Recovery</div></X>
      <X style={{padding:8,textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:C.v}}>{recent.filter(e=>e[1].hrv).length?Math.round(recent.filter(e=>e[1].hrv).reduce((s,e)=>s+e[1].hrv,0)/recent.filter(e=>e[1].hrv).length):"-"}</div><div style={{fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase"}}>Avg HRV</div></X>
    </div>)}
    <Ch data={recCh} color={C.g} label="Recovery" yUnit="%" empty="Log recovery to see trend"/>
    <Ch data={hrvCh} color={C.v} label="HRV" yUnit=" ms" empty="Log HRV to see trend"/>
    <S title="Recent" collapsible>
      {recent.map(([d,r])=>(<div key={d} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.bl}`,fontSize:13}}>
        <span style={{color:C.t2,fontWeight:600}}>{fmt(d)}</span>
        <div style={{display:"flex",gap:6,color:C.t2}}>
          {r.recoveryScore&&<span style={{fontWeight:700,color:sc(r.recoveryScore)}}>{r.recoveryScore}%</span>}
          {r.hrv&&<span>HRV {r.hrv}</span>}{r.rhr&&<span>RHR {r.rhr}</span>}{r.sleepHours&&<span>{r.sleepHours}h</span>}
        </div>
      </div>))}
    </S>
  </div>);
};

// ═══ SETTINGS ═══
const Settings=({data,setData})=>{
  const t=td();
  const st=data.settings||DEFAULTS;
  const [f,setF]=useState({calories:""+st.calories,protein:""+st.protein,water:""+st.water,steps:""+st.steps,sleep:""+st.sleep,fiber:""+(st.fiber||30),
    mondayCal:""+(st.mondayCal||1300),trainingCal:""+(st.trainingCal||2600),weekendCal:""+(st.weekendCal||2500)});
  const [saved,setSaved]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [showDeleteQm,setShowDeleteQm]=useState(null);
  const isTravel=!!(data.travelDays||{})[t];

  const toggleTravel=()=>{
    const nd={...data,travelDays:{...data.travelDays,[t]:!isTravel}};
    setData(nd);sv(nd);
  };
  const logBodyComp=()=>{
    const nd={...data,bodyComp:{...data.bodyComp,[t]:true}};
    setData(nd);sv(nd);
  };

  const saveSettings=()=>{
    const nd={...data,settings:{calories:+f.calories||DEFAULTS.calories,protein:+f.protein||DEFAULTS.protein,
      water:+f.water||DEFAULTS.water,steps:+f.steps||DEFAULTS.steps,sleep:+f.sleep||DEFAULTS.sleep,fiber:+f.fiber||DEFAULTS.fiber,
      mondayCal:+f.mondayCal||1300,trainingCal:+f.trainingCal||2600,weekendCal:+f.weekendCal||2500}};
    setData(nd);sv(nd);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`health-hub-export-${td()}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  const deleteQm=(i)=>{
    const nd={...data,qm:(data.qm||[]).filter((_,j)=>j!==i)};setData(nd);sv(nd);setShowDeleteQm(null);
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{fontSize:17,fontWeight:700,color:C.t}}>Settings</div>

    <X style={{borderLeft:`3px solid ${C.p}`}}>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:8}}>Daily Targets</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><L>Avg Calories</L><N value={f.calories} onChange={v=>setF({...f,calories:v})} placeholder="2430"/></div>
        <div><L>Protein (g)</L><N value={f.protein} onChange={v=>setF({...f,protein:v})} placeholder="200"/></div>
        <div><L>Water (oz)</L><N value={f.water} onChange={v=>setF({...f,water:v})} placeholder="128"/></div>
        <div><L>Steps</L><N value={f.steps} onChange={v=>setF({...f,steps:v})} placeholder="10000"/></div>
        <div><L>Sleep (hrs)</L><N value={f.sleep} onChange={v=>setF({...f,sleep:v})} placeholder="7.5"/></div>
        <div><L>Fiber (g)</L><N value={f.fiber} onChange={v=>setF({...f,fiber:v})} placeholder="30"/></div>
      </div>
      <div style={{fontSize:12,fontWeight:700,color:C.t2,marginTop:10,marginBottom:4}}>Day-Type Calorie Targets</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        <div><L>Monday</L><N value={f.mondayCal} onChange={v=>setF({...f,mondayCal:v})} placeholder="1300"/></div>
        <div><L>Training</L><N value={f.trainingCal} onChange={v=>setF({...f,trainingCal:v})} placeholder="2600"/></div>
        <div><L>Weekend</L><N value={f.weekendCal} onChange={v=>setF({...f,weekendCal:v})} placeholder="2500"/></div>
      </div>
      <B full style={{marginTop:10}} onClick={saveSettings} color={saved?C.g:C.p}>{saved?"Saved!":"Save Targets"}</B>
    </X>

    {/* ═══ TRAVEL DAY ═══ */}
    <X style={{borderLeft:`3px solid ${C.a}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:C.t}}>Travel Day</div>
          <div style={{fontSize:12,color:C.t3}}>Toggle for travel/social weekends</div>
        </div>
        <button onClick={toggleTravel} style={{padding:"8px 16px",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
          background:isTravel?C.al:"transparent",border:`1px solid ${isTravel?C.a:C.bd}`,color:isTravel?C.a:C.t3}}>{isTravel?"ON":"OFF"}</button>
      </div>
      {isTravel&&(<div style={{marginTop:8,padding:8,background:C.al,borderRadius:4}}>
        <div style={{fontSize:11,fontWeight:700,color:C.a,textTransform:"uppercase",marginBottom:4}}>Travel Protocol</div>
        <div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>
          • Hydrate aggressively: 20-32 oz water + electrolytes before bed<br/>
          • Take magnesium glycinate regardless of time<br/>
          • Skip melatonin if drinking<br/>
          • Wake at 6 AM — get sunlight immediately<br/>
          • Prioritize protein when eating. Light movement &gt; nothing<br/>
          • Don't nap past 1 PM. Normal bedtime that night.
        </div>
      </div>)}
    </X>

    {/* ═══ BODY COMP ═══ */}
    <X>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:4}}>Progress Photos</div>
      <div style={{fontSize:12,color:C.t3,marginBottom:8}}>Take front + side photos in same lighting, same time. Repeat every 2-3 weeks. The mirror is your real measurement during recomp.</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          {(()=>{const photoDates=Object.entries(data.bodyComp||{}).filter(([_,v])=>v).sort((a,b)=>b[0].localeCompare(a[0]));
            const lastPhoto=photoDates[0]?.[0];
            const daysSince=lastPhoto?Math.round((new Date()-new Date(lastPhoto+"T12:00:00"))/864e5):null;
            return(<div style={{fontSize:12,color:daysSince&&daysSince>=14?C.a:C.t2}}>
              {lastPhoto?`Last: ${fmt(lastPhoto)} (${daysSince}d ago)`:"No photos logged yet"}
              {daysSince&&daysSince>=14?<span style={{color:C.a,fontWeight:600}}> — time for new photos</span>:null}
            </div>);
          })()}
        </div>
        {data.bodyComp?.[t]?<span style={{fontSize:13,fontWeight:600,color:C.g}}>Logged</span>
          :<B small onClick={logBodyComp}>Log Photo Taken</B>}
      </div>
    </X>

    <X>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:8}}>Quick Meals Library</div>
      {(data.qm||[]).length===0?<div style={{color:C.t3,fontSize:13,padding:8,textAlign:"center"}}>No saved quick meals</div>
      :(data.qm||[]).map((q,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bl}`}}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:C.t}}>{q.description}</div>
            <div style={{fontSize:12,color:C.t3}}>{q.cal} cal · {q.protein}gP · {q.carbs}gC · {q.fat}gF</div>
          </div>
          <button onClick={()=>setShowDeleteQm(i)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:16,padding:4}}>✕</button>
        </div>
      ))}
      {showDeleteQm!==null&&<ConfirmModal title="Delete Quick Meal?" message={`Remove "${(data.qm||[])[showDeleteQm]?.description}" from your library?`}
        onConfirm={()=>deleteQm(showDeleteQm)} onCancel={()=>setShowDeleteQm(null)} confirmText="Delete" confirmColor={C.r}/>}
    </X>

    <X>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:8}}>Data</div>
      <div style={{display:"flex",gap:6}}>
        <B full outline onClick={exportData}>Export Data (JSON)</B>
      </div>
      <div style={{fontSize:11,color:C.t3,marginTop:6}}>Download all your health data as a JSON file for backup.</div>
    </X>

    <X>
      <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:4}}>Program</div>
      <div style={{fontSize:13,color:C.t2}}>{PROG.name}</div>
      <div style={{fontSize:12,color:C.t3}}>Week {wkn(td())}/{PROG.weeks} · Started {fmt(PROG.start)}</div>
    </X>
  </div>);
};

// ═══ TOAST ═══
const ToastStack=({toasts})=>{
  if(!toasts.length)return null;
  return(<div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:6,maxWidth:440,width:"90%"}}>
    {toasts.map(t=>(<div key={t.id} style={{background:t.type==="success"?C.g:C.v,color:"#fff",padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,.15)",animation:"toastIn .3s ease"}}>{t.message}</div>))}
  </div>);
};

// ═══ APPLY PROGRAM UPDATES ═══
const applyProgramUpdates=async(currentData)=>{
  const applied=[];
  try{
    const rows=await sb.select("program_updates","created_at","asc",50);
    const pending=rows.filter(r=>!r.applied);
    if(!pending.length)return{data:currentData,applied:[]};
    const nd=JSON.parse(JSON.stringify(currentData));
    for(const row of pending){
      const c=typeof row.payload==="string"?JSON.parse(row.payload):row.payload;
      try{
        if(c.type==="settings"&&c.field){
          const old=nd.settings[c.field];
          nd.settings={...nd.settings,[c.field]:c.value};
          applied.push(`${c.field}: ${old||"unset"} → ${c.value}`);
        }else if(c.type==="exercise"){
          if(c.action==="update"&&c.exerciseId){
            for(const day of Object.values(nd.program)){
              const ex=day.exercises?.find(e=>e.id===c.exerciseId);
              if(ex&&c.fields){Object.assign(ex,c.fields);applied.push(`Updated ${ex.name}: ${Object.keys(c.fields).join(", ")}`);}
            }
          }else if(c.action==="swap"&&c.oldExerciseId&&c.newExercise){
            for(const day of Object.values(nd.program)){
              const idx=day.exercises?.findIndex(e=>e.id===c.oldExerciseId);
              if(idx>=0){const oldName=day.exercises[idx].name;day.exercises[idx]=c.newExercise;applied.push(`Swapped ${oldName} → ${c.newExercise.name}`);}
            }
          }else if(c.action==="add"&&c.day&&c.exercise){
            if(nd.program[c.day]){nd.program[c.day].exercises.push(c.exercise);applied.push(`Added ${c.exercise.name} to ${c.day}`);}
          }else if(c.action==="remove"&&c.day&&c.exerciseId){
            if(nd.program[c.day]){
              const idx=nd.program[c.day].exercises.findIndex(e=>e.id===c.exerciseId);
              if(idx>=0){const name=nd.program[c.day].exercises[idx].name;nd.program[c.day].exercises.splice(idx,1);applied.push(`Removed ${name} from ${c.day}`);}
            }
          }
        }
        // Mark applied in Supabase
        await fetch(`${SB_URL}/rest/v1/program_updates?id=eq.${row.id}`,{method:"PATCH",headers:{...sbh,"Prefer":"return=minimal"},body:JSON.stringify({applied:true})});
      }catch(e){console.error("[update] Failed to apply:",e);}
    }
    return{data:nd,applied};
  }catch(e){console.error("[update] Error fetching updates:",e);return{data:currentData,applied:[]};}
};

// ═══ APP ═══
window.App = function App(){
  const [tab,setTab]=useState("dashboard");
  const [data,setData]=useState(()=>{const raw=ld();return raw?migrate(raw):bl();});
  const [showD,setShowD]=useState(()=>!(data.debrief||{})[td()]);
  const [workout,setWorkoutRaw]=useState(()=>{try{const w=localStorage.getItem("dhub6_workout");return w?JSON.parse(w):null;}catch{return null;}});
  const setWorkout=(v)=>{setWorkoutRaw(v);try{if(v)localStorage.setItem("dhub6_workout",JSON.stringify(v));else localStorage.removeItem("dhub6_workout");}catch{}};
  const [sbLoaded,setSbLoaded]=useState(false);
  const [syncStatus,setSyncStatus]=useState("");
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((message,type="info")=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  },[]);

  useEffect(()=>{
    (async()=>{
      const sbData=await loadFromSB();
      let finalData;
      if(sbData){
        const local=ld();
        if(local){
          const merged=migrate(local);
          const final={...merged};
          Object.keys(sbData).forEach(k=>{
            if(typeof sbData[k]==="object"&&!Array.isArray(sbData[k])&&sbData[k]!==null){
              final[k]={...merged[k],...sbData[k]};
            }else if(Array.isArray(sbData[k])&&sbData[k].length>0){
              final[k]=sbData[k];
            }else if(sbData[k]&&(!merged[k]||Object.keys(merged[k]).length===0)){
              final[k]=sbData[k];
            }
          });
          finalData=final;
          const localHasData=Object.keys(merged.wk).length>0||Object.keys(merged.wt).length>0||Object.keys(merged.nut).length>0;
          const sbEmpty=Object.keys(sbData.wk).length===0&&Object.keys(sbData.wt).length===0;
          if(localHasData&&sbEmpty){
            setSyncStatus("Migrating local data...");
            await syncToSB(final);
            setSyncStatus("Migration complete");
            setTimeout(()=>setSyncStatus(""),3000);
          }
        }else{
          finalData=sbData;
        }
      }else{
        finalData=data;
      }
      // Apply pending program updates from Supabase queue
      const{data:updated,applied}=await applyProgramUpdates(finalData);
      setData(updated);sv(updated);
      applied.forEach(msg=>addToast(msg,"success"));
      setSbLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    sv(data);
    if(sbLoaded)syncToSB(data);
  },[data,sbLoaded]);

  return(
    <div style={{background:C.bg,color:C.t,minHeight:"100dvh",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,sans-serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}`}</style>
      {syncStatus&&<div style={{background:C.pl,padding:"6px 14px",fontSize:12,color:C.p,fontWeight:600,textAlign:"center"}}>{syncStatus}</div>}
      {showD&&<Debrief data={data} setData={setData} onClose={()=>setShowD(false)}/>}
      {workout&&tab!=="training"&&<WorkoutTimerBar workout={workout} onTap={()=>setTab("training")} programDays={data.program}/>}
      <div style={{flex:1,padding:14,overflowY:"auto",paddingBottom:80}}>
        {tab==="dashboard"&&<Dashboard data={data} setData={setData}/>}
        {tab==="training"&&<Training data={data} setData={setData} workout={workout} setWorkout={setWorkout} setTab={setTab} addToast={addToast}/>}
        {tab==="nutrition"&&<Nutrition data={data} setData={setData}/>}
        {tab==="weight"&&<Weight data={data} setData={setData}/>}
        {tab==="recovery"&&<Recovery data={data} setData={setData}/>}
        {tab==="settings"&&<Settings data={data} setData={setData}/>}
      </div>
      <TabBar active={tab} set={setTab} hasActiveWorkout={!!workout}/>
      <ToastStack toasts={toasts}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
