name: Auto-merge Claude branches
on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Auto-merging branch: $BRANCH"
          
          # Create PR
          PR_URL=$(gh pr create \
            --title "Auto-merge: $(git log -1 --pretty=%s)" \
            --body "Auto-merged from Claude Code session." \
            --head "$BRANCH" \
            --base main 2>&1) || true
          
          # If PR already exists, get its URL
          if echo "$PR_URL" | grep -q "already exists"; then
            PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url')
          fi
          
          echo "PR: $PR_URL"
          
          # Merge it
          gh pr merge --merge --delete-branch "$PR_URL" || echo "Merge failed"
# Auto-merge test
